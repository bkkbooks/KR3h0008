body:
  text: 法書要録卷六唐張彥逺撰述書賦下我巨唐之膺休一六合而闡幽武功定文德修髙祖運龍爪陳睿謀自我雄其神貌冠梁代之徽猷神堯皇帝隴西李氏諱淵仕隋官至殿內少監右驍衛將軍大丞相封唐王及受禪即位革隋為唐又王右軍書柱作爪形時觀者號為龍爪書髙祖師王褒得妙故有梁朝風格焉太宗則備集王書聖鑒旁啓雖躡閭井未登階陛質詎勝文貌能全體兼風骨總法禮文武皇帝諱世民神堯子當貞觀年中鳩集二王真迹徴求天下併充御府武后君臨藻翰時欽順天經而永保先業從人欲而不顧兼金則天皇后沛國武氏士彠女臨朝稱尊號曰大周金輪皇帝時鳳閣侍郎石泉王公方慶即晉朝丞相導十世孫有纍代祖父書迹保傳於家凡二十八人緝成一十一卷后墨制問方慶方慶因而獻焉后不欲奪志遂盡摸寫留內其本加寶飾錦繢歸還王氏人到于今稱之右史崔融撰王氏寶章集序具紀其事睿宗垂文規模尚古飛五雲而在天運三光以窺户睿宗皇帝天皇第四子性淳和好書史尚古質書法正體不樂浮華開元應乾神武聰明風骨巨麗碑版崢嶸思如泉而吐鳳筆為海而吞鯨諸子多藝天寶之際迹且師於翰林嗟源淺而波細開元天寶皇帝仁孝慈和兼負英斷好圖畫少工八分書及章草殊異英特自諸王殿下已下多效吳嗣李凃雖有工夫不能髙逺開元中八分書北京義堂西嶽華山東嶽封禪碑雖有當時院中學士共相摹勒然其風格大體皆出自聖心漢王童年自得書意夙承羲獻守法不二漢王元昌文皇帝弟惠文靡倦博好敦勸恨夫有始無終灰燼成空苟懼存而投閣徒榮沒而升宫尚可謂梁園筆壯樂府文雄纍聖重光之盛業六書一藝之精工非所以抑至人之徇已服勇士以雕蟲責繁聲於韶頀徴豔色於蒼穹者也岐王元範追册惠文太子開元皇帝弟時天府圖書為張昌宗竊換張氏誅後歸薛稷稷殁為王所得初不聞奏後慮焉乃盡焚之言樂府文雄者王多能好事有文詞特為歌者所唱爰有懷琳厥迹疏壯假他人之姓字作自己之形狀髙風甚少俗態尤多吠聲之輩或浸餘波李懷琳洛陽人國初時好為偽迹其大急就稱王書及七賢書假云薛道衡作敘及竹林敘事并衛夫人咄咄逼人嵇康絶交書並懷琳之偽迹也有姓謝名道士者能為繭紙嘗書大急就兩本各十紙言詞鄙下跋尾分明徐唐沈范蹤迹烜赫勞茹裝背持以質錢貞觀中敕頻搜尋彼之錢主封以詣闕太宗殊喜賜縑二百匹懷琳乃上别本因得待詔文林館故在內之本有貞觀印焉頃年在右相林甫家後本在張懷瓘處尋轉易與李起居若乃出自三公一家面首歐陽在焉不顧偏醜䫜翹縮爽了梟黝糾如地隔華戎屋殊户牖學有大小夏矦書有大小歐陽父掌邦禮子居廟堂隨運變化為龍為光歐陽詢長沙人紇之子幼孤陳中書令江總收飬書出于北齊三公郎中劉珉官至率更令太常少卿子通亦能繼美拜納言封渤海公永興超出下筆如神不落疏慢無慙世珍然則壯文幾而老成與貞白而德鄰如層臺緩步髙謝風塵纂煥嗣聖體多拘撿如彼碔玞亂其琬琰虞世南會稽人荔之子迹居四公之上官至祕書監贈禮部尚書封永興公子纂孫煥皆能繼世煥授武官在仗宿衛初隋有猛將來護兒子恆濟皆負才學入唐繼登三仕故陸元方所云來護兒兒把筆虞世南兒帶刀言物極則反一至於此也河南專精克儉克勤伏膺告誓鋭思猗文恐無成於畫虎將有類於效顰雖價重衣冠名髙內外澆漓後學而得無罪乎褚遂良河南人兼愛子尚書左僕射河南公兼愛名亮東都人柬之效虞疏薄不逮少保師褚菁華却倍超石鼠之效能愧隋珠之掩纇陸柬之吳郡人仁公子虞氏之出官為著作郎薛稷河東人太子少保房文昭則雅而和隱乃訛精神乏氣胸臆餘波若蘋萍異品共泛中河房喬字元齡清河人彥謙子官至司空贈太尉文昭公殷公王公兼正兼署大乃有則小非無據騏驎將騰鸞鳳欲翥題二榜而迹在歎百川而身去殷仲容陳郡人不害之孫令名之子奕世工書尤善書額官至禮部郎中書汴州安業寺額京師裒義開業資聖寺東京太僕寺靈州神馬觀額皆精妙曠古王知微太原人門傳孝義工正行善署書與殷同工而異曲兼草書弟知慎工圖畫兄官至祕書少監當時雙絶與仲容齊肩天后詔一人署一寺額仲容題資聖知敬題清禪俱為獨絶洛川長史德政二賈碑在修竹寺東南角即知敬之迹極峻利豐秀清禪資聖寺至今路人識者駐馬往觀普濟度寺即父令名手蹤皆為後代程式王祕監則首未全貞尊道重德或終紙而結字或重模而足道句反墨濩落風規雄壯氣力播清譽而祖述屢見賞於有識如曲圃鴻飛芳園桂植至紹宗琅琊人修禮子官至祕書少監虔禮凡草閭閻之風千紙一類一字萬同如見疑於冰冷甘沒齒於夏蟲孫過庭字虔禮富陽人右衛胄曹黎軍張長史則酒酣不羇逸軌神澄回眸而壁無全粉揮筆而氣有餘興若遺能於學知遂獨荷其顛稱張旭吳郡人左率府長史俗號張顛雖宜官售酒子敬運帚遐想邇觀莫能假手拘素屏及黃卷則多勝而寡負猶莊周之寓言於從政乎何有後漢師宜官工書嗜酒每遇酒肆輒書於壁顧觀酒因大售計價償足而滅之王子敬以帚泥書壁觀者如市已上皆言旭之可比湖山降禮狂客風流落筆精絶芳詞寡儔如春林之絢彩實一望而寫憂雍容省闥髙逸豁達解朝服而歸鄉斂霓裳而辭闕賀知章字維摩會稽永興人太子洗馬德仁之孫少以文詞知名工草𨽻書進士及第歷官太常少卿禮部侍郎集賢學士太子右庶子兼皇太子侍讀檢校工部侍郎遷祕書監太子賓客慶王侍讀知章性放善謔晚年尤縱無復規撿年八十六自號四明狂客每興酣命筆好書大字或三百言或五百言詩筆唯命問有幾紙報十紙紙盡語亦盡二十紙三十紙紙盡語亦盡忽有好處與造化相爭非人工所到也天寶二年以老年上表請入道歸鄉里特司詔許之重令入閣諸皇子以下拜辭上親製詩序令所供帳百寮餞送賜詩敘别知章表謝手詔答曰卿儒才舊業德著老成方欲乞言以光東序而乃髙蹈世表歸心妙門雖雅意難違良深耿歎眷言離祖是用贈詩宜保松喬慎行李也兒子等常所執經故令親别尊師之義何以謝焉仍拜其子典設郎曾子為朝散大夫本郡司馬以伸侍飬知章以羸老乘輿而往到會稽無幾老終元年冬十二月詔曰故越州千秋觀道士賀知章神清志逸學富才雄挺會稽之美箭藴崑岡之良玉故飛名仙省待詔龍樓願追二老之奇蹤充遂四明之狂客允協初志脫落朝衣駕青牛而不還狎白鷗而長往舟壑靡息人琴兩忘推舊之懷有深追悼宜加縟禮式展哀榮可贈兵部尚書者也廣平之子令範之首婭姹鍾門逶迤王後武都先覺翰墨泉藪子敬元常得門窺牖侍中簡穆異代同友於孔門而升堂惜顔子之不壽徐嶠之東海人廣平太守子浩中書舍人國子祭酒李造隴西人武都公言侍中簡穆即子雲僧虔韓常侍則八分中興伯喈如在光和之美古今逺代昭刻石而成名類神都之冠蓋韓擇木昌黎人工部尚書歷右散騎常侍赫赫許昌翰苑文房徴前賢而少對當聖代而難方田琦雁門人德平之孫工八分小篆署書圖畫寫洪崖子張氲雲樓并雪木行於世官厯陜令豫蘄許等州刺史兼裝背有孫栖梧尤妙其事德平武德功臣拜兵部尚書衛包蔡鄰功夫亦到出於人意乃近天造衛包京兆人工八分小篆通字學兼象緯之術官至尚書郎蔡有鄰濟陽人善八分本拙弱至天寶之間遂至精妙相衛中多其迹滎陽昆弟內外光華揮毫美麗自是一家幼弟曰逾丹青大誇信斫玉而剖石即揀金而披砂鄭遷及弟邁遇並工八分崔氏出中書令湜之甥遷官至浚儀尉季弟逾善山水天寶中知名梁宋溫良之德書畫兼美誠依仁以遊藝同上善之若水皇室李權工八分弟樞工小篆姪平鈞亦善小篆兼妙山水並冠絶一時淮安王神通曾孫權官厯金州刺史樞侍御史平鈞富詞學江陵掾詩興入神畫筆雄精李將軍世稱髙絶淵微已過薛少保時許美潤合極不如右丞王維字摩詰琅琊人詩通大雅之作山水之妙勝於李思訓弟太原少尹縉文筆泉藪善草𨽻書功超薛稷二公名望首冠一時時議論詩則曰王維崔皓論筆則曰王縉李雍祖詠張説不得預焉幼弟紞有兩兄之風閨門之內友愛之極史侍御惟則心優世業階乎籒篆古今折衷大小應變如因髙而矚逺俯川陸而必見史惟則廣陵人殿中侍御史即諫議大夫白之子白善飛白通家世業趙郡李君嶧山並騖宣父同群洞於字學古今通文家傳孝義意感風雲李陽氷趙郡人父雍門湖城令家世住雲陽承白門作尉冰兄弟五人皆負詞學工於小篆初師李斯嶧山碑後見仲尼吳季札墓志便變化開闔如虎如龍徑利豪爽風行雨集文字之本悉在心胸識者謂之蒼頡後身澥子騰冰子垍並詞場髙第幼子曰廣勤學孝義以通家之故皆同子弟也延安君則快速不滯若懸流得勢三原君則婉媚巧密似垂楊應律吾舅諱繪彭城人也延安都督姨兄明若山西平原人京兆三原縣尉大理評事宋儋李璆擅美中州李師王而意淺宋祖鍾而體流宋儋字藏諸廣平人髙尚不仕户部侍郎宇文融薦授祕書省校書郎作鍾體而側戾放縱迹不副名開元末舉場中後輩多師之李璆隴西人御史大夫傑之兄子性速達輕財重義筆路緊媚亦有聲於代為狄宇清李漸所師員外蕭公名成於薛安西變體光潤愈悅蕭公名誠蘭陵人梁之後起家奉禮郎開元初時尚褚薛公為之最拜右司員外郎善造班石文紙用西山野麻及虢州土穀五色光滑殊勝子彭張氏四龍名揚海內中有季弟功夫少對右軍風規下筆斯在張從中長史文場擢第弟從師監察御史從儀灼然有才從申志業精絶工正行書握管用筆其於結密近古所少恨於歷覽不多聞見遂寡右軍之外一步不窺意多拓書闕其真迹妙也吕公歐鍾相雜自是一調雖則筋骨乾枯終是精神嶮峭其於小楷尤更巧妙吕向東平人開元初上美人賦忤上時張説作相諫曰夫鬻拳脅君愛君也陛下縱不能用容可殺之乎使陛下後代有愎諫之名而向得敢諌之直與小子為便耳不如釋之於是承恩特拜補闕賜綵百假衣服銀章朱紱翰林待詔頻上賦頌皆在諷諫兼皇太子文章及書官至給事中中書舍人刑部侍郎文詞學業當代莫比有子曰廣聰利俊秀有吏才拜監察御史吾兄則書包雜體首冠衆賢手關目瞥瞬息彌年比夫得道家之深旨習閬風而欲仙家兄蒙字子全司議郎南安都護馬家劉氏臨效逼斥安西蘭亭貌奪真迹如宓妃遺形於巧素再見如在之古昔翰林書人劉秦妹歸馬氏押署縫尾則僧權似長松挂劍滿騫如盤石臥虎徐僧權中山人滿騫富陽人繁多乃懷充懷珍稀少乃延祖允祖唐懷充晉昌人姚懷珍武康人陳延祖長城人范允祖順陽人熾文時有何妥近覩雖正姓名美其傲古恨連書於至寶無尺牘之行伍沈熾文武康人何妥外國人翊子梁中書侍郎名作當時書證印驗則玉斫胡書太平公主武氏家玉印有四明書今多墨塗存者蓋寡又云三藐毋馱四字也金鐫篆字少能全一多不越四國署年名家標望地獨行龜益即魏王恭家印並設竇臮范陽功曹竇臮書印貞觀開元文止於二太宗玄宗所用印陶安東海徐李所祕徐祭酒嶠之印李起居造印萬言方寸未詳翰囿攸類延王友竇永書印張氏永保張懷瓌印任氏言事未詳古小雌文東朝周顗東晉僕射周顗印審定竇蒙議郎竇蒙書印亭矦襲貴未詳猗歟劉鄭未詳門承貂珥義仰彭城金部郎中劉繹書印鄴周印異相國鄴矦李泌印宣州長史周昉印或有慙於稽古諒無乏於雅致宋虞和表聞於明皇帝齊簡穆書答於竟陵王表稱委盡書乃備詳宋中書侍郎虞和上明皇帝表論古今妙迹正行草楷紙色標軸真偽卷數無不畢僃表本行于世真迹故起居舍人李造得之齊司空簡穆公琅琊王僧虔答景陵王子良書序古善書人評議無不至當本行於世其真迹今御史大夫黎翰得之藻鑒則梁髙祖巧而未博武帝時撰書評邵陵王博而未至蕭綸亦撰書評庾中庶失品格拘以文華梁庾肩吾撰書品論傅五兵比亡年廣於職位梁傅昭撰書法目録名録編於司馬隋蜀王府司馬姚最撰名書録善狀集於散騎左散騎常侍姚思亷集善書人名狀李亞相著藻飾之繁右御史大夫李嗣真撰書品張兵曹粗習玩之利率府兵曹鄂州長史張懷瓘撰十體書斷上中下考數公之著稱多約傳而立記余不敏於登髙豈虛言而求備敢直筆於親覩非偏譽於所嗜也我小司空韋公曰述職該藝府才同史筆茂族挺生聖朝間出若乃闡異聞之旨接片善之勤則必忘疲吐握不間風塵所談而改觀成市所寶而增價為珍小擅聲於自我大推美於其人彼凡百而馳名既往遇此公而其德唯新可謂千載一時孤標絶倫矣韋述京兆人尚書工部侍郎及乎驗德力之工拙知古今之優劣余稽古而玩能因假能而有説匪徒姓名記録面首超越相質披文虛空嵗月者矣是用相如慕藺撫新迹而忘懷豈甘賜也望回抱遐心而結舌終冀乘時出處備展名節其或萃傅巖鍾紹京南康人中書令光祿大夫聚寶捐金川流海納而會潁川家伯諱瓚邠王司馬耽玩逹旨固求不匱歸右史李造拂鏡旁通傾心善價而入補闕席巽安定人右補闕心專務得家業或遺祭酒徐浩法則道存徴求非利翰林之尋繹張懷瓘兄弟懷瓌盛王府司馬並翰林待詔俱好無厭亦能臆斷烏臺潘履慎滎陽人監察御史克遵能事採玩芳猷粉署之敦閲蔡希寂濟陽人金部郎中習學潤身假借盈􅀈欣給事之道𢎞族兄紹給事中志𢎞雅道不倦虛求仰議郎之區别家兄鋭思窮源增輝改觀韓生委輸韓滉潁川人給事中委質慮逺推誠道博滕子擁決滕升歙州婺源縣令取捨若流通利泉藪張氏旁求懷瓘海陵人皇鄂州司馬利無推斥道在專精陸家胥悅陸曜吳郡人卷緝餘芳事窮前志釋朏超彼岸東京福先寺僧良朏新羅人俗姓林氏遇捐衣鉢逸冠儕流梅仙行無轍髙志宜渤海人同官尉氣合古風利加能事溫播金聲溫朝太原人國子簿悉心景慕徒衆博求崔含氷潔崔曼倩清河人鄠縣尉浩汗經營見如不及若驚陳趙陳閎潁川人陳王府長史趙微明天水人或志敦習學或自悅古能習玩之無斁也賈勇徐薛徐守行東海人監察御史薛雍河東人郎中或推古招致或究能跧拔並求之不已關郭雙奮飛關偽隴西人郭暉太原人或規規耽好或楚楚傳寫潘袁兩傾竭潘淑會稽人袁明陳郡人或披尋治道或耽藉樂貧簮纓布素申道間設既輻輳而川流並觀光於後哲速珠玉之無脛可得略而言曰長安則穆聿聿咸陽寵店人少以販書為業後至德中因告訐徴搜古迹并強括石泉公家則天皇后所還書功白身受金吾長史改名祥乘危射利王昌遼東人詞荒智役導其源葉豐括州人貌恭性僻田穎長安人志凡識滯委其軀必拾遺市駿懷寶飛鳬洛陽則杜福河南人論熟行巧劉翌洛陽人節苦心亷窮彌固齊光河南人道寡業微趙晏河內人智専别識樂忘劬此四人者洛陽販書者皆誇目動利實繁有若無詩不云乎匪斧語有之曰反隅若或徴數子之運用甘千里之殊途則我雞犬而無來無往子衣裳而不曵不裾成一家之憬彼暌四海之友于言通貨利事符道因心與日親幾變灰律涉厯冬春互為賓主往返周秦左翊吾兄業窮幽逺名錫同州别駕龍興張揖道契貞淳與潘淑獻書拜官今任龍興縣尉雅興閉關以隨扣古風開卷以襲人不然者何窮獨而恣怡悅何市朝而貪隱淪言尚往來衆矣森然往哲來賢一朝而星羅入眼百代而雲披及肩身已沒兮若休迹遺芳而可傳彼金印玉璽豐碑貨泉蟲篆制而八分間矣正𨽻興而藁草行焉不可量乎所覩又何極乎備宣若乃流譽前代效績當年録軍機而羽括鷹隼述國命而發揮貂蟬通親友以感節啓咨謀以聞天接武波委嗣芳鱗連則余不讓於賦頌敢分媸而别妍恃乎幼好而晚知之至熟也曲察而直言之而無愧者將拭目而衆别輕言入掌而百憂寫其藤苔縑縠衡理蜀幅花麻黃絢緇赭紺緑淪壓而邇蠧亡文蓄非其人雖邇朝亦朽蠧保持而逺完緘卷處之得地雖逺古亦完全上智所以懸解直曉中庸所以交戰疑之取迷伊他貽笑鄙賤則有烏絲縹首紫璽露面好丹時更悲素色變狀玄豹之霧隱規雕虎之風扇雖置水彌旬移裝屢遍益深沈於直質乃容易於覽見嗟乎捨不疑於古疏髙取憑假於俗眩眩惑誘淺情於末興肆凡賞而留盻何其妄哉寧知立法而虧真作德而還淳忘情是悅代有其人言定是非必也易背以時時在正夏受彩無欺敏洽和之妙道得潤軟之成規用麵調適候隂以成疏密苦樂殊形異宜厚薄完蠧上約下豐始增末裨接上下前後例沽將實名位充合離改折署榜餘地或附卷均端足使其夷薄而蠧者或鳴砧妥帖然後呈姿厚而完者探尋源流志逸肥遁緝合翦截躬勞不悶明齊短長暗結分寸誠忽忽於或躁袪悢悢之遺恨至如虹縈絲帶鸞舞錦褾青間綾文出之衣表檀心鼊首金印銀絡舒囊貌妍撫卷香作多此飾類又難詳備並言撿討裝背也若乃見稀意欲雖可棄而崑山片玉玩久厭充雖可寶而紈扇秋風競捨兹而易彼誇視審而聽聰或芟穢於匿迹或喪真於矜工夥哉耳誤鮮矣目窮因既原乎識量遂懸别其淹通已分流而兹在徒並騖而爭雄言申博易假使作偽心勞亂真首出昧目童幼摧殘紙筆終令君子棄瑕以拔材壯士斷腕以全質期補勞於得喪勵採葑於始卒子猷之竹在焉曷可無其一日言務𢎞道夫喻大始於事卑方崇極於類聚况物著公器賞推善主異清白而非弓裘豈孫謀而紹宗祖仰如堯禪舜舜命禹道必貴乎聲同天無親而德輔歸可保於授受靡自私而禦侮故知乖其趨者則密戚而心捐合其軌者則舉儲而掌傳亮玉白之利末望吾徒之義先先言傳付後總樂成以終也至其罷琴間堂散帙虛牖閲新連之卷軸傾舊滿之樽酒暢懷古而遺形荷逢時以濡首炎涼所寄偃仰無咎煙積孤松春過五栁想薜蘿而在眼狎鸞鳳而盈手善鄰得朋知我益友暗遺名利卧度卯酉遂志願兮苟若斯生可憑兮死不朽雖金翠溢目陶匏聒耳徒潤色於多歡實無階於競美賢賢易色勿藥有喜茅居食貧陋巷飲水誓將敦素業而畢矣振清風而何已亂曰資樂道兮善莫大佐玄覽兮寄所賴芝蘭滿室兮遺美芳朋友忘言兮古人會想賢玩迹儼如在史册悠悠幾千載大厯四年七月點發行朱尋繹精嚴痛摧心骨其人已往其迹今存追想客輝涕淚嗚咽述書賦語例字格竇蒙吾第四弟尚輦君子靈長翰墨厠張王文章凌班馬詞藻雄贍草𨽻精深平生著碑志詩篇賦頌章表凡十餘萬言較其巨麗者有天寶所獻大同賦三殿蹴踘賦以諷興諫諍為宗以匡君救時為本帝乃咨爾可編策書中使王人榮曜戚里龍章鳳篆寵錫儒門及乎晚年又著述書賦總七千六百四十言精窮旨要詳辨祕義無深不討無細不因徴五典三墳九邱八索詩騷禮易文選詞林猶不盡所知故别結語立言曲申幽奧一字一句數義旁通尚輦君學究天人才通詁訓注解分析皆憑史傳注有未盡在此例中意有未窮出此格上凡古今時哲正文呼字尊貴長老各言其親或取便引官或因言稱爵句則兩字三字五言四言而於其以之間或六或八改時革命之際舉一相從慮學者致疑仍施朱點發此則語之理例别有字格存焉凡一百二十言并注二百四十句且褒且貶還同諡法披文感切撫已崩摧手迹宛然如向來之放筆天才卓爾成千載之分襟孝義銘心言笑在目一枝先折痛貫肝腸一眼先枯哀纒骨髓右語例述書賦凡七十四首六十言并注二百四十句不倫前濃後薄半敗半成枯稿欲北還南氣脈斷絶忘情鵬鶚向風自成鶱翥天然鴛鴻出水更好儀容質朴天仙玉女粉黛何施礲斫錯綜雕文方申巧妙體裁一舉一措盡有憑據意態回翔動靜厥趣相隨專成直師一家今古不雜有意志立乃就非工不精正衣冠踏拖若止若行行劍履趨鏘如步如驟草電掣雷奔龍蛇出沒章草中楷古蹴踏擺行神非意所到可以識知聖理絶名言潛以意得文經天緯地可大可久武回戈挽弩拉虎拏豹能千種風流曰能妙百般滋味曰妙精功業雙極曰精古除去常情曰古逸縱任無方曰逸髙超然出衆曰髙偉精彩照射曰偉老無心自逹曰老喇超能越妙曰喇嫩力不副心曰嫩薄闕於圓備曰薄強筋力露見曰強穩結構平正曰穩快興趣不停曰快沈深而意逺曰沈緊團合密緻曰緊慢舉思間詳曰慢浮若無所歸曰浮密間不容髮曰密淺涉於俗流曰淺豐筆墨相副曰豐茂字外精多曰茂實氣感風雲曰實輕筆道流便曰輕瘠瘦而有力曰瘠疏違犯隂陽曰疏拙不依緻巧曰拙重質勝於文曰重纎文過於質曰纎貞骨清神正曰貞豔少古多今曰豔峻頓挫頴逹曰峻潤旨趣調暢曰潤險不期而然曰險怯下筆不猛曰怯畏無端羞澀曰畏妍逶迤併行曰妍媚意居形外曰媚訛藏鋒隱迹曰訛細運用精深曰細熟過猶不及曰熟雄别負英威曰雄雌氣候不足曰雌飛若滅若沒曰飛爽肅穆飄然曰爽動如欲奔飛曰動成一家體度曰成禮動合典章曰禮法宣布周􅊀曰法典從師約法曰典則可以傳授曰則偏唯守一門曰偏乾無復光輝曰乾滑遂乏風彩曰滑駃波瀾驚絶曰駃間孤雲生逺曰間拔輕駕超殊曰拔放流浪不窮曰放鬱騰勢鋒起曰鬱秀翔集難名曰秀束興致不𢎞曰束穠五味皆足曰穠峭峻中徑利曰峭散有初無終曰散質自少妖妍曰質魯本宗淡泊曰魯肥龜臨洞穴沒而有餘瘦鶴立喬松長而不足壯力在意先曰壯寬疏散無撿曰寬麗體外有餘曰麗宏裁制絶壯曰宏右字格大厯十年龍集乙邜二月乙丑陜州大都督府夏縣尉竇士初校撿挍國子司業太原縣令竇蒙甫挍述書賦附論朝代自周至唐一十三代論工書史籀等一百九十八人論署證徐僧權等八人論印記太平公主等十一家論徴求保玩韋述等二十六人論利通貨易穆聿等八人法書要録卷六
