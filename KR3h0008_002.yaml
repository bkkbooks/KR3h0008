body:
  text: 法書要録卷二唐張彥逺撰梁虞和論書表梁武帝觀鍾繇書法十有二意梁武帝與陶隱居論書啓九首梁庾元威論書庾肩吾書品論梁袁昻古今書評陳釋智永題右軍樂毅論後後魏江式論書表梁中書侍郎虞和論書表臣聞爻畫既肇文字載興六藝歸其善八體宣其妙厥後羣能間出洎乎漢魏鍾張擅美晉末二王稱英羲之書云頃尋諸名書鍾張信為絶倫其餘不足存又云吾書比之鍾張當抗行張草猶當雁行羊欣云羲之便是小推張不知獻之自謂云何欣又云張字形不及右軍自然不如小王謝安嘗問子敬君書何如右軍答云故當勝安云物論殊不爾子敬答曰世人那得知夫古質而今妍數之常也愛妍而薄質人之情也鍾張方之二王可謂古矣豈得無妍質之殊且二王暮年皆勝於少父子之間又為今古子敬窮其妍妙固其宜也然優劣既微而會美俱深故同為終古之獨絶百代之楷式桓玄耽玩不能釋手乃撰二王紙迹雜有縑素正行之尤美者各為一帙常置左右及南奔雖甚狼狽猶以自隨擒獲之後莫知所在劉毅頗尚風流亦甚愛書傾意搜求及將敗大有所得盧循素善尺牘尤珍名法西南豪士咸慕其風人無長幼翕然尚之家贏金幣競逺尋求於是京師三吳之迹頗散四方羲之為會稽獻之為吳興故三吳之近地偏多遺迹也又是末年遒美之時中世宗室諸王尚多素嗤貴遊不甚愛好朝廷亦不搜求人間所祕往往不少新渝惠矦雅所愛重懸金招買不計貴賤而輕薄之徒鋭意摹學以茅屋漏汁染變紙色加以勞辱使類久書真偽相糅莫之能别故惠侯所蓄多有非真然招聚既多時有佳迹如獻之吳興二箋足為名法孝武亦纂集佳書都鄙士人多有獻奉真偽混雜謝靈運母劉氏子敬之甥故靈運能書而特多王法臣謝病東臯遊玩山水守拙樂靜求志林壑造次之遇遂紆雅顧預陟泛之遊參文咏之末其諸佳法恣意披覽愚好既深稍有微解及臣遭遇曲沾恩誘漸漬玄猷朝夕咨訓題勒美惡指示媸妍點畫之情昭若發蒙于時聖慮未存草體凡諸教令必應真正小不在意則偽謾難識事事留神則難為心力及飛龍之始戚藩告釁方事經略未遑研習及三年之初始玩寶迹既科簡舊祕再詔尋求景和時所散失及乞左右嬖幸者皆原往罪兼賜其直或有頑愚不敢獻書遂失五卷多是戲學伏惟陛下爰凝睿思淹留草法擬效漸妍賞析彌妙旬日之間轉求精祕字之美惡書之真偽剖判體趣窮微入神機息務間從容研玩乃使使三吳荆湘諸境窮幽測逺鳩集散逸及羣臣所上數月之間竒迹雲萃詔臣與前將軍巢尚之司徒參軍事徐希秀淮南太守孫奉伯科簡二王書評其品題除猥録美供御賞玩遂得遊目瓌翰展好寶法錦質繡章爛然畢覩大凡祕藏所録鍾繇紙書六百九十七字張芝縑素及紙書四千八百二十五字年代既久多是簡帖張昶縑素及紙書四千七十字毛𢎞八分縑素書四千五百八十八字索靖紙書五千七百五十五字鍾會書五紙四百六十五字是髙祖平秦川所獲以賜永嘉公主俄為第中所盜流播始興及泰始開運地無遁寶詔龎沈搜索遂乃得之又有范仰一作師恆獻上張芝縑素書三百九十八字希世之寶潛采纍紀隱迹於二王耀美於盛辰别加繕飾在新裝二王書所録之外繇是拓書悉用薄紙厚薄不均輒好皺起范曄裝治卷帖小勝猶謂不精孝武使徐爰治護隨紙長短參差不同具以數十紙為卷披視不便不易勞茹善惡正草不相分别今所治繕悉改其弊孝武撰子敬學書戲習十卷為帙傅云戲學而不題或真行章草雜在一紙或重作數字或學前輩名人能書者或有聊爾戲書既不留意亦殊猥劣徒聞則録曽不披簡卷小者數紙大者數十巨細差懸不相匹類是以更裁減以二丈為度亦取小王書古詩賦讃論或草或正言無次第者入戲學部其有惡者悉皆刪去卷既調均書又精好羲之所書紫紙多是少年臨川時迹既不足觀亦無取焉今拓書皆用大厚紙泯若一體同度翦截皆齊又補接敗字體勢不失墨色更眀凡書雖同在一卷要有優劣今此一卷之中以好者在首下者次之中者最後所以然者人之看書必鋭於開卷懈怠於將半既而略進次遇中品賞悅留連不覺終卷又舊書目帙無次第諸帙中各有第一至于第十脫落散亂卷帙殊等今各題其卷帙所在與目相應雖相涉入終無雜謬又舊以封書紙次相隨草正混糅善惡一貫今各隨其品不從本封條目紙行凡最字數皆使分眀一毫靡遺二王縑素書珊瑚軸二帙二十四卷紙書金軸二帙二十四卷又紙書玳瑁軸五帙五十卷皆互帙金題玉躞織成帶又有書扇二帙二卷又紙書飛白章草二帙十五卷並旃檀軸又紙書戲學一帙十二卷玳瑁軸此皆書之冠冕也自此以下别有三品書凡五十二帙五百二十卷悉旃檀軸又羊欣縑素及紙書亦選取其妙者為十八帙一百八十卷皆漆軸而已二王新入書各裝為六帙六十卷别充備預又其中入品之餘各有條貫足以聲華四宇價傾五都天府之名珍盛代之偉寶陛下淵昭自天觸理必鏡凡諸思制莫不妙極乃詔張永更製御紙緊潔光麗輝日奪目又合祕墨美殊前後色如點漆一點竟紙筆則一二簡毫専用白兔大管豐毛膠漆堅密草書筆悉使長毫以利縱舍之便兼使吳興郡作青石圓硯質滑而停墨殊勝南方瓦石之器縑素之工殆絶於昔王僧虔尋得其術雖不及古不減郗家所製二王書獻之始學父書正體乃不相似至於絶筆章草殊相擬類筆迹流懌宛轉妍媚乃欲過之羲之書在始未有竒殊不勝庾翼郗愔逮其末年乃造其極嘗以章草答庾亮亮以示翼翼歎服因與羲之書云吾昔有伯英章草書十紙過江亡失常痛妙迹永絶忽見足下答家兄書煥若神眀頓還舊觀舊説羲之罷會稽住蕺山下一老嫗捉十許六角竹扇出市王聊問一枚幾錢云直二十許右軍取筆書扇扇為五字嫗大悵惋云舉家朝餐惟仰於此何乃書壞王云但言王右軍書字索一百入市市人競市去姥復以十數扇來請書王笑不答又云羲之常自書表與穆帝帝使張翼寫效一毫不異題後答之羲之初不覺更詳看乃歎曰小人幾欲亂真又羲之性好鵝山隂曇􅙓一作釀村有一道士養好鵝十餘王清旦乘小船故往意大願樂乃告求市易道士不與百方譬説不能得道士乃言性好道久欲寫河上公老子縑素早辦而無人能書府君若能自屈書道德經各兩章便合羣以奉羲之便住半日為寫畢籠鵝而歸又嘗詣一門生家設佳饌供億甚盛感之欲以書相報見有一新棐牀一作材几至滑淨乃書之草正相半門生送王歸郡還家其父已刮盡生失書驚懊纍日桓玄愛重書法每宴集輒出法書示賔客客有食寒具者仍以手捉書大點汚後出法書輒令客洗手兼除寒具子敬常箋與簡文十許紙題最後云民此書甚合願存之此書為桓玄所寶髙祖後得以賜王武剛未審今何在謝奉起廟悉用棐材右軍取棐書之滿牀奉收得一大簀子敬後往謝為説右軍書甚佳而密已削作數十棐板請子敬書之亦甚合奉並珍録奉後孫履分半與桓玄用履為揚州主簿餘一半孫恩破會稽略以入海羲之為會稽子敬七八嵗學書羲之從後掣其筆不脫歎曰此兒書後當有大名子敬出戲見北館新泥堊壁白淨子敬取帚沾泥汁書方丈一字觀者如市羲之見歎美問所作答云七郎羲之作書與親故云子敬飛白大有意是因於此壁也有一好事年少故作精白紗裓著詣子敬子敬便取書之草正諸體悉備兩袖及褾略周年少覺王左右有凌奪之色掣裓而走左右果逐之及門外鬪爭分裂少年才得一袖耳子敬為吳興羊欣父不疑為烏程令欣時年十五六書已有意為子敬所知子敬往縣入欣亝欣衣白新絹裙晝眠子敬因書其裙幅及帶欣覺歡樂遂寶之後以上朝廷中乃零失子敬門生以子敬書種蠶後人於蠶紙中尋取大有所得謝安善書不重子敬每作好書必謂被賞安輒題後答之朝廷祕寶名書久已盈積太初狂迫乃欲一時燒除左右懷讓者苦相譬説乃止臣見衛恆古來能書人録一卷時有不通今隨事改正并寫諸雜勢一卷今新裝二王鎮書定目各六卷又羊欣書目六卷鍾張等書目一卷文字之部備矣謹詣省上表并上録勢新書以聞六年九月中書侍郎臣虞和上梁武帝觀鍾繇書法十二意平謂橫也直謂縱也均謂間也密謂際也鋒謂端也力謂體也輕謂屈也決謂牽掣也補謂不足也損謂有餘也巧謂布置也稱謂大小也字外之竒文所不書世之學者宗二王元常逸迹曽不睥睨羲之有過人之論後生遂爾雷同元常謂之古肥子敬謂之今瘦今古既殊肥瘦頗反如自省覽有異衆説張芝鍾繇巧趣精細殆同機神肥瘦古今豈易致意真迹雖少可得而推逸少至學鍾書勢巧形密及其獨運意疏字緩譬猶楚音習夏不能無楚過言不悒未為篤論又子敬之不逮逸少猶逸少之不逮元常學子敬者如畫虎也學元常者如畫龍也余雖不習偶見其理不習而言必慕之歟聊復自記以補其闕非欲眀解強以示物也儻有均思思盈半矣陶隱居與梁武帝論書啓奉旨左右中書復稍有能者惟周喜贊夫以含心之荄實俟夾鍾吐氣今既自上體妙為下理用成工每惟申鍾王論於天下進藝方興所恨微臣沉朽不能鑽仰髙深自懷歎慕前奉神筆三紙并今為五非但字字注目乃畫畫抽心日覺徑媚轉不可説以讐昔嵗不復相類正此即為楷式何復多尋鍾王臣心本自敬重今者彌增愛服俯仰悅豫不能自已啓適復蒙給二卷伏覽褾帖皆如聖旨既不顯垂允少留不敢久停已就摹素者一段未畢不赴今信紙卷先已經有兼多他雜無所復取亦請俟俱了日奉送兼此諸書是篇章體臣今不辨復得修習惟願細書如樂􅐧論太師針例依倣以寫經傳永存置題中精要而已梁武帝答書近二卷欲少留差不為異紙卷是出裝書既須見前所以付耳無正可取備於此及欲更須細書如論針例逸少迹無甚極細書樂􅐧論乃微粗健恐非真迹太師針小復方媚筆力過嫩書體乖異上二者已經至鑒其外便無可付也陶隱居又啓樂毅論愚心近甚疑是摹而不敢輕言今旨以為非真竊自信頗涉有悟針咏吟贊過為淪弱許靜素段遂蒙永給仰銘矜奬益無喻心此書雖不在法例而致用理均背間細楷兼復兩玩先於都下偶得飛白一卷云是逸少好迹臣不嘗别見無以能辨惟覺勢力驚絶謹以上呈於臣非用脫可充閣願仍以奉上臣昔於馬澄處見逸少正書目録一卷澄云右軍勸進洛神賦諸書十餘首皆作今體惟急就篇二卷古法緊細近脫憶此語當是零落已不復存澄又云帖注出裝者皆擬賚諸王及朝士臣近見三卷首帖亦謂久已分本不敢議此正復希於三卷中一兩條更得預出裝之例耳天旨遂復頓給完卷下情益深悚息近初見卷題云第二十三四已欣其多今者賜書卷第遂至二百七十惋訝無已天府如海非一瓶所汲量用息心前後都已蒙見大小五卷於野拙之分實已過幸若非殊恩豈可觖望愚固本博涉而不能精昔患無書可看乃願作主書令史晚愛隸法又羡典掌之人常言人生數紀之內識解不能周流天壤區區惟充恣五欲實可恥愧每以為得作才鬼亦當勝於頑仙至今猶然始欲翻然之自無射以後國政方殷山心兼默不敢復以間虛塵觸謹於此題事故遂成煩黷伏願聖慈照録誠慊梁武帝又答書又省别疏云故當宜微以著賞此既勝事風訓非嫌云云然則所習聊試略言夫運筆邪則無芒角執手寬則書緩弱點掣短則法擁腫點掣長則法離澌畫促則字勢橫畫疏則字形慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澀多墨笨鈍比並皆然任意所之自然之理也若抑揚得所趣舍無違值筆廉斷觸勢峯鬱揚波折節中規合矩分間下注濃纎有方肥瘦相和骨力相稱婉婉曖曖視之不足稜稜凛凛常有生氣適眼合心便為甲科衆家可識亦當復繇串耳六文可工亦當復繇習耳一聞能持一見能記且古且今不無其人大抵為論終歸是習程邈所以能變書體為之舊也張芝所以能善書工學之積也既舊既積方可以肆其談吾少來乃至不嘗畫甲子無論於篇紙老而言之亦復何謂正足見嗤於當今貽笑於後代遂有獨冠之言覽之背熱隱真於是乎纍真矣此直一藝之工非吾所謂勝事此道心之塵非吾所謂無欲也陶隱居又啓二卷中有雜迹謹疏注如别恐未允愚𠂻并竊所摹者亦以上呈近十餘日情慮悚悸無寧涉事遂至淹替不宜復待填畢餘條並非用惟叔夜威輦二篇是經書體式追以單郭為恨伏按卷上第數甚為不少前旨惟有四卷此書似是宋元嘉中撰集當繇自後多致散失逸少有名之迹不過數首黃庭勸進像讃洛神此等不審猶得存不第二十三卷今見有十二條在别紙按此卷是右軍書者惟有八條前樂毅論書乃極徑利而非甚用意故頗有壞字太師針大雅吟用意甚至而更成小拘束乃是書扇題屏風好體其餘五片無的可稱臣濤言一紙此書乃不惡而非右軍父子不識誰人迹又似是摹給事黃門一紙治廉瀝一紙凡二萹並是謝安衛軍參軍任靖書後又治廉瀝狸骨方一紙是子敬書亦似摹迹右四條非右軍書二十四卷今見有二十一條在按此卷是右軍書者惟有十一條並非甚合迹兼多漫抹於摹處難復委曲前黃初三年一紙是後人學右軍繆襲告墓文一紙是許先生書抱憂懷痛一紙是張澄書五月十一日一紙是摹王珉書被油尚想黃綺一紙遂結滯一紙凡二篇並後人所學甚拙惡不復展一紙是子敬書便復改月一紙是張翼書五月十五日繇白一紙亦是王珉書治咳方一紙是謝安書右一十條非右軍書伏恐未垂許以區别今謹上許先生書任靖書如别比方即可知王珉張澄謝安張翼書公家應有梁武帝又答書省區别諸書良有精賞所異所同所未可知悉可不耳給事黃門二紙為任靖書觀其送靖書諸字相附近彼二紙靖書體解離便當非靖書要復當以點畫波撇論極諸家之致此亦非可倉卒運於毫楮且保拙守中也許任二迹并摹者並付及右三紙正書二十六日至嗣公陶隱居又啓啓伏覽書用前意雖止二六而規矩必周後字不出二百亦褒貶大備一言以蔽便書情頓極使元常老骨更蒙榮造子敬懦肌不沉泉夜逸少得進退其間則玉科顯然可觀若非聖證品析恐愛附近習之風永遂淪迷矣伯英既稱草聖元常實自隸絶論旨所謂殆同璿璣神寶曠世以來莫繼斯理既眀諸畫虎之徒當日就輟筆反古歸真方𢎞盛世愚管見預聞喜佩無屆比世皆髙尚子敬子敬元常繼以齊名貴斯式略海內非惟不復知有元常於逸少亦然非排棄所可涅而無緇不過數紙今奉此論自舞自蹈未足逞泄日月願以所摹竊示洪逺思曠此二人皆是均思者必當贊仰踴躍有盈半之益臣與洪逺雖不相識從子詡以學業往來故因之有會但既在閣恐或以應聞知摹者所採字大小不甚均調熟看乃尚可恐竟意大殊此篇方傳千載故宜令迹隨名偕老益增美晚所奉三旨伏循字迹大覺徑密竊恐既以言發意則應言而新手隨意運筆與手會故意得諧稱下情歡仰寶奉愈至世論咸云江東無復鍾迹常以歎息比日佇望中原廓清太丘之碑可就摹採今論旨云真迹雖少可得而推是猶有存者不審可復幾字既無出見理冒願得工人摹填數行脫蒙見此實為過幸又逸少學鍾勢巧形密勝於自運不審此例復有幾紙垂旨以黃庭像讃等諸文可更有出給理自運之迹今不復希請學鍾法仰惟殊恩梁武帝又答書鍾書乃有一卷傳以為真意謂悉是摹學多不足論有兩三行許似摹微得鍾體逸少學鍾的可知近有二十許首此外字細畫短多是鍾法今始欲令人帖裝未便得付來月日有竟者當遣送也陶隱居又啓逸少自吳興以前諸書猶為未稱凡厥好迹皆是向在會稽時永和十許年中者從失郡告靈不仕以後略不復自書皆使此一人世中不能别也見其緩異呼為末年書逸少亡後子敬年十七八全放此人書故遂成與之相似今聖旨標題足使衆識頓悟於逸少無復末年之譏阮研近聞有一人學研書遂不復可别臣比郭摹所得雖粗寫字形而無復其用筆迹勢不審前後諸卷一兩條謹密者可得在出裝之例復蒙垂給至年末間不此澤自天直以啓審非敢必覬梁庾元威論書所學正書宜以殷鈞范懷約為主方正循紀修短合度所學草書宜以張融王僧虔為則體用得法意氣有餘章表箋書於斯足矣夫才能則關性分耽嗜殊妨大業但令緊快分眀屬辭流便字不須體語輒投聲若以巳巳莫分東柬相亂則兩王妙迹二陸髙才頃來非所用也王延之有言曰勿欺數行尺牘即表三種人身豈非一者學書得法二者作字得體三者輕重得宜意謂猶須言無虛出斯則善矣近何令貴隔勢傾朝野聊爾疏漏遂遭十穢之書今聊存兩事書曰有寒士自陳簡於掌選詩云伎能自寡薄支葉復單貧柯條濫垂景木石詎知晨狗馬雖難畫犬羊誠易馴效嚬終未似學步豈如真實云亂朝緒是曰斁彞倫俗作於兹混人途自此沌離合之詩由來久矣不知譏剝爰加稱贊是其第六穢也近來貴宰於二品清宦進不假手作書而筆迹過鄙無法度彼恭拜忽云永感答人借車還白不具真本流傳合朝恥辱是其第七穢也以此而言書何容易且梁制與平吉人箋書有增懷語者不得答書許乃告絶私弔答中彼此言感思乖錯者州望須刺大中正處入清議終身不得仕盛名年少宜留意勉之余見學阮研書者不得其骨力婉媚唯學攣拳委盡學薄紹之書者不得其批研淵微徒自經營嶮急晚途别法貪省愛異濃頭纎尾斷腰頓足一八相似十小難分屈等如勻變前為草咸言祖述王蕭無妨日有訛謬星不從生籍不從來許慎門徒居然嗢噱衛恆子弟寧不傷嗟詿誤衆家豈宜改習書字之興繇來尚矣沮誦蒼頡黃帝史也周宣王時柱下史史籀始著籀書今六八之法雖存十五之篇亡矣及秦相李斯破大篆為小篆造蒼頡七章中車府令趙髙造爰歷六章太史胡毋敬造博學七章後人分五十五章為三蒼上卷至哀帝元嘉中揚子雲作訓纂記滂喜為中卷和帝永元中賈升郎更續記彥盤音均為下卷皆是記字字出衙人故人稱為三蒼也夫蒼雅之學儒博所宗自景純注解轉加敦尚漢晉正史及古今字書並云蒼頡九篇是李斯所作今竊尋思必不如是其第九章論豨信京劉等郭云豨信是陳豨韓信京劉是大漢西土是長安此非讖言豈有秦時朝宰談漢家人物牛頭馬腹先達何以安之江左碩儒相係梁初復有任昉及沈約悉未有譏駁余忽橫議實不自許敬俟眀哲定其可否而字韻集方言廣雅凡録字者十有四家許慎穿鑿賈氏乃奏説文曹産開拓許矦爰成字苑説文則形聲具舉字苑則品類周悉追悟典墳字弗全體周禮以雞斯為笄纚禮記以相近為禳祈致令衆議叢殘音辭𩥫互蓋繇程邈變隸流傳未一鄭公詩譜頗顯其源且書文一反草木相從凡五百六十七部合一萬五千九百一十五字即曰世中所行十分裁一而今點畫失體深成怪也近有居士阮孝緒撰古今文字三卷窮搜正典次丹陽五官丘陵撰文字指要二卷精加擲發惟此兩書可稱要用余少值眀師留心字法所以坐右作午疆宇不依羲獻妙迹不逐陶葛名方作蓴羮不斆晉書不循韻集爰以淺見輕述字府自謂此文或均螢露齊末王融圖古今雜體有六十四書少年崇放家藏紙貴而鳯魚蟲鳥是七國時書元常皆作隸書故貽後來所詰湘東王遣沮陽令韋仲定為九十一種次功曹謝善勛增其九法合成百體其中以八卦書為一以太為兩法徑丈一字方寸千言大上止傳可爾鬼書惟有業殺刁斗出於古器爾㫭繇乎內典散隸露書終是飛白意謂此等並非通論今所不取余經為正階矦書十牒屏風作百體間以采墨當時衆所驚異自爾絶筆惟留草本而已其百體者懸針書垂露書秦望書汲冢書金鵲書玉文書鵠頭書虎爪書倒薤書偃波書幡信書飛白篆古頑書籀文書竒字繆篆制書列書日書月書風書雲書星隸填隸蟲食葉書科斗書署書胡書蓬書相書天竺書轉宿書一筆篆飛白書一筆隸飛白草古文隸橫書楷書小科隸此五十種皆純墨璽文書節文書真文書符文書芝英隸花草隸幡信隸鍾鼓隸鍾鼓隸釋作鍾鼎龍虎篆鳯魚篆騏驎篆仙人篆科斗蟲篆雲篆蟲篆魚篆鳥篆龍篆龜篆虎篆鸞篆龍虎隸鳯魚隸麒麟隸仙人隸科斗隸雲隸蟲隸魚隸鳥隸龍隸龜隸鸞隸蛇龍文隸書龜文書鼠書牛書虎書兔書龍草書蛇草書馬書羊書猴書雞書犬書豕書此十二時書已上五十種皆采色其外復有大篆小篆銘鼎摹印刻符石經象形篇章震書到書反左書等及宋中庶宗炳出九體書所謂縑素書簡奏書箋表書弔記書行狎書楫書藁書半草書全草書此九法極真草書之次第焉刪捨之外所存猶一百二十體張芝始作一筆飛白書此於井册等字為妙所以唯云一筆飛白書則無所不通矣反左書者大同中東宫學士孔敬通所創余見而達之於是座上酬答諸君無有識者遂呼為衆中清間法今學者稍多解者益寡敬通又能一筆草書一行一斷婉約流利特出天性頃來莫有繼者宗炳又造畫瑞應圖千古卓絶王元長頗加增定乃有虞舜獬豸周穆狻猊漢武神鳯衛君舞鶴五城九井螺杯魚硯金縢玉英玄圭朱草等凡二百一十物余經取其善草嘉禾靈禽瑞獸樓臺器服可為玩對者盈縮其形狀參詳其動植制一部焉此乃青出於藍而實世中未有復於屏風上作雜體篆二十四種寫凡百名將恐一筆鄣子凡百屏風傳者逾謬併懷歎息世本云史皇作圖黃帝臣也其唐虞之文章夏后之鼎象則圖畫之宗焉其後繪事逾精丹青轉妙乃有釘女心痛圖魚獺集敬君以之亡婦王嬙繇此失身近代陸綏足稱畫聖所聞談者一筆之外僅可蟬雀顧長康稱為三絶終是半癡人耳雜體既資於畫所以附乎書末梁庾肩吾書品論玄靜先生曰豫遍求邃古逖訪厥初書名起於玄洛字勢發於倉史故遣結繩取諸爻象諸形會諸人事未有廣此緘縢深兹文契是以一畫加大天尊可知二力增土地卑可審日以君道則字勢圓月以臣輔則文體缺及其轉注假借之流指事會意之類莫不狀範毫端形呈字表開篇玩古則千載共朝削簡傳今則萬里對面記善則惡自削書賢則過必改玉歷頒正而化俗帝載陳言而設教變通不極日用無窮與聖同功參神並運爰洎中葉捨繁從省漸失潁川之言竟逐雲陽之字若乃鳥迹孕於古文壁書存於科斗符陳帝璽摹調蜀漆署表宫門銘題禮器魚猶捨鳯鳥已分蟲仁義起於麒麟威形發於龍虎雲氣時飄五色仙人還作兩童龜若浮溪蛇如赴穴流星疑燭垂露似珠芝英轉車飛白掩素參差倒薤既思種栁之謡長短懸針復想定情之製蚊腳傍低鵠頭仰立填飄板上繆起印中波回墮鏡之鸞楷顧雕陵之鵲並以篆籀重復見重昔時或巧能售酒或妙令鬼哭信無味之竒珍非趣時之急務且具録前訓今不復兼論惟草正疏通専行於世其或繼之者雖百代可知尋隸體發源秦時隸人下邽程邈所作始皇見而重之以奏事繁多篆字難製遂作此法故曰隸書今時正書是也草勢起於漢時解散隸法用以赴急本因草創之義故曰草書建初中亰兆杜操始以善草知名今之草書是也余自少迄長留心兹藝敏手謝於臨池鋭意同於削板而蕺山之扇竟未增錢凌雲之臺無因誡子求諸故迹或有淺深輒刪善草隸者一百二十八人伯英以稱聖居首法髙以追駿處末推能相越小例而九引類相附大等而三復為略論總名書品張芝伯英鍾繇元常王羲之逸少右三人上之上論曰隸既發源秦史草乃激流齊相跨七代而彌遵將千載而無革誠開博者也均其文總六書之要指其事籠八體之竒能拔篆籀於繁蕪移楷真於重密分行紙上類出繭之蛾結畫篇中似聞琴之鶴峰崿間起瓊山慙其斂霧漪瀾遞振碧海愧其下風抽絲散水定其下筆倚刀欠尺驗於成字真草既分於星芒烈火復成於珠佩或橫牽竪掣或濃點輕拂或將放而更留或因挑而還直敏思藏於胸中巧意發於毫銛詹君端䇿故以迷其變化英韶傾耳無以察其音聲殆善射之不注妙斫輪之不傳是以鷹爪含利出彼兔毫龍管潤霜遊兹蠆尾學者鮮能具體窺者罕得其門若探妙測深盡形得勢煙華落紙將動風彩帶字欲飛疑神化之所為非人世之所學惟張有道鍾元常王右軍其人也張工夫第一天然次之衣帛先書稱為草聖鍾天然第一工夫次之妙盡許昌之碑窮極鄴下之牘王工夫不及張天然過之天然不及鍾工夫過之羊欣云貴越羣品古今莫二兼撮衆法備成一家若孔門以書三子入室矣允為上之上崔瑗子玉杜度伯度師宜官張昶文舒王獻之子敬右五人上之中論曰崔子玉擅名北中迹罕南度世有得其摹者王子敬見之稱美以為功類伯英杜度濫觴於草書取竒於漢帝詔復奏事皆作草書師宜官鴻都為最能大能小文舒聲劣於兄時云亞聖子敬泥帚早驗天骨兼以掣筆復識人工一字不遺兩葉傳妙此五人允為上之中索靖幼安梁鵠孟皇韋誕仲將皇象休眀胡昭孔眀鍾會士季衛瓘伯玉荀輿長胤阮研文幾右九人上之下論曰幼安斂蔓舅氏抗名衛令孟皇功盡筆力字入帳中仲將不妄染毫須張筆左紙孔眀動見模楷所為胡肥而鍾瘦休眀斟酌二家驅駕八絶士季之範元常猶子敬之稟逸少而功拙兼效真草皆成伯玉遠慕張芝近參父迹長胤狸骨方擬而難逮阮研居今觀古盡窺衆妙之門雖復師王祖鍾終成别搆一體此九人允為上之下張超子並郭伯道劉德升君嗣崔實子真衛夫人茂猗李式景則庾翼稚恭郗愔方回謝安安石王珉季琰桓玄敬道羊欣敬元王僧虔孔琳之彥琳殷鈞右十五人中之上論曰子並崔家州里頗相倣效可謂醬鹹於鹽氷寒於水伯道里居朝廷逺討其迹德升之妙鍾胡各採其美子真俊才門法不墜李妻衛氏自出華宗景則毫素流靡稚恭聲彩遒越郗愔安石草正並驅季琰桓玄筋力俱駿羊欣早隨子敬最得王體孔琳之聲髙宋氏王僧虔雄發齊代殷鈞頗耽著愛好終得肩隨此一十五人允為中之上魏武帝曹操孟德孫皓吳主元宗衛覬伯儒左子邑伯字子邑衛恆巨山杜預元凱王廙世將張彭祖任靖韋昶文休王修敬仁張永范懷約吳休尚施方泰右十五人中之中論曰魏帝筆墨雄贍吳主體裁綿密伯儒兼敘隸草子邑分鐮梁邯巨山三世元凱纍葉王廙為右軍之師彭祖取羲之之道任靖矯名文休題柱敬仁清舉致畏逼之詞張范遞時俱東南之美施吳鄴下同年後萃此十五人允為中之中羅暐叔景趙襲元嗣劉輿張昭陸機士衡朱誕王導庾亮元規王洽敬和郗超景興張翼宋文帝姓劉名義隆康昕徐希秀謝朓玄暉劉繪陶隱居名𢎞景字通眀王崇素右十八人中之下論曰叔景元嗣並稱四州劉輿之筆札張昭之無懈陸機以𢎞才掩迹朱誕以偏藝流聲王導則列聖推能庾亮則羣公挹功王洽以下並通諸法郗超以晚年取譽張翼善效宋帝康昕希秀孤生謝朓劉繪文宗書範近來少前陶隱居仙才翰彩狀於山谷王崇素繪靡篇書筆傳於里閭此十八人允為中之下薑詡梁宣魏徴玄成韋秀鍾輿向泰羊忱晉元帝景文識道人范曄蔚宗宋炳謝靈運蕭思話薄紹之敬叔齊髙帝庾黔婁費元瑶孫奉伯王薈羊祜叔子右二十人下之上論曰此二十人並擅毫翰動成楷則殆逼前良見希後彥允為下之上楊經諸葛融楊潭張炳岑淵張輿王濟李夫人劉穆之道和朱齡石庾景休張融思光褚元眀孔敬通王籍文海右十五人下之中論曰此十五人雖未窮字奧書尚文情披其藂薄非無香草視其涯岸皆有潤珠故遺斯紙以為世玩允為下之中衛宣李韞陳基傅廷堅張紹隂光韋熊張暢曹任宋嘉裴邈羊固傅夫人辟閭訓謝晦徐羡之孔閭顔寶光周仁皓張欣泰張熾僧嶽道人法髙道人右二十三人下之下論曰此二十三人皆五味一和五色一彩視其雕文非特刻鵠人人下筆寧止追嚮遺迹見珍餘芳可折誠以驅馳並駕不逮前鋒而中權後殿各盡其美允為下之下今以九例該此衆賢猶如玄圃積玉炎洲聚桂其中實相推謝故有兹多品然終能振此鱗翼俱上龍門儻後之學者更隨點曝云爾袁昻古今書評王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖有充悅而舉體沓拖殊不可耐羊欣書如大家婢為夫人雖處其位而舉止羞澀終不似真徐淮南書如南岡士大夫徒好尚風範終不免寒乞阮研書如貴胄失品次叢悴不復排突英賢王儀同書如晉安帝非不處尊位而都無神眀施肩吾書如新亭傖父一往見似揚州人共語便音態出陶隱居書如吳興小兒形容雖未成長而骨體甚駿快殷鈞書如髙麗使人抗浪甚有意氣滋韻終乏精味袁嵩書如深山道士見人便欲退縮蕭子雲書如上林春花逺近瞻望無處不發曹喜書如經論道人言不可絶崔子玉書如危峰阻日孤松一枝有絶望之意師宜官書如鵬羽未息翩翩自逝韋誕書如龍威虎振劍拔弩張蔡雍書骨氣洞達爽爽有神鍾司徒書字十二種意意外殊妙實亦多竒邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥乍飛梁鵠書如太祖忘寢觀之喪目皇象書如歌聲繞梁琴人捨徽衛恆書如插花美女舞笑鏡臺孟光祿書如崩崖人見可畏李斯書世為冠蓋不易施平張芝經竒鍾繇特絶逸少鼎能獻之冠世四賢共類洪芳不滅羊真孔草蕭行范篆各一時絶妙右二十五人自古及今皆善能書奉敕遣臣評古今書臣既愚短豈敢輒量江海但聖旨委臣斟酌是非謹品字法如前伏願照覽謹啓普通四年二月五日內侍中尚書令哀昻啓敕旨具之如卿所評臣謂鍾繇書意氣密麗若飛鴻戲海舞鶴遊天行間茂密實亦難過蕭思話書走墨連綿字勢屈強若龍跳天門虎卧鳯閣薄紹之書字勢蹉跎如舞女低腰仙人嘯樹乃至揮毫振紙有疾閃飛動之勢臣淺見無聞暗於眀滅寧敢謬量山海以聖命自天不得斟酌過失是非如獲湯炭智永題右軍樂􅐧論後樂毅論者正書第一梁世模出天下珍之自蕭阮之流莫不臨學陳天嘉中人得以獻文帝帝賜始興王王作牧境中即以見示吾昔聞其妙今覩其真閲玩良久匪朝伊夕始興薨後仍屬廢帝廢帝既殁又屬餘杭公主公主以帝王所重恆加寶愛陳世諸王皆求不得及天下一統四海同文處處追尋纍載方得此書留意運工特盡神妙其間書誤兩字不欲點除遂雌黃治定然後用筆陶隱居云大雅吟樂毅論太師針等筆力鮮媚紙墨精新斯言得之矣釋智永記後魏江式論書表臣聞庖犧氏作而八卦列其畫軒轅氏興而靈龜彰其彩古史倉頡覽二象之文觀鳥獸之迹别創文字以代結繩用書契以紀事宣之王庭則百工以敘載之方册則萬品以眀迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八嵗入小學保氏教國子以六書一曰指事二曰諧聲三曰象形四曰會意五曰轉注六曰假借蓋倉頡之遺法也及宣王太史籀著大篆十五萹與古文或同或異時人即謂之籀書孔子修六經左丘眀述春秋皆以古文厥意可得而言其後七國殊軌文字乖别暨秦兼天下丞相李斯乃奏罷不合秦文者斯作倉頡篇中車府令趙髙作爰歷篇太史胡毋敬作博學篇皆取史籀大篆或頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趨約易始用隸書古文由此息矣隸書者始皇時衙吏下邽程邈附於小篆所作也世人以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書漢興有尉律學復教以籀書又習以八體試之課最以為尚書史書或有字不正輒舉劾焉又有草書莫知誰始考其形畫雖無厥誼亦是一時之變通也孝宣時召通倉頡篇者張敞從受之涼州刺史杜鄴沛人爰禮講學大夫秦近亦能言之孝平時徴禮等百餘人説文字於未央以禮為小學元士黃門侍郎揚雄採以作訓纂篇及亡新居攝自以運應制作使大司空甄豐挍文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也壁中書者魯共王壞孔子宅而得尚書春秋論語孝經也又北平矦張蒼獻春秋左氏傳書體與孔氏壁中書又類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古學之師也後慎嗟時人之好竒歎俗儒之穿鑿惋文毁於凡譽痛字敗於庸説詭更任情變亂於世故撰説文解字十五篇首一終亥各有部居苞括六藝羣書之詁評釋百代諸子之訓天地山川草木鳥獸昆蟲雜物竒怪珍異王制禮儀世間人事莫不畢載可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎將陳留蔡雍採李斯曹喜之法為古今雜形詔於太學立石碑刋載五經題書楷法多是雍書也後開鴻都書盡其能莫不雲集于時諸方獻篆無出雍者魏初博士清河張揖著埤倉廣雅古今字詁究諸埤廣綴拾遺漏增長事類抑亦於文為益者也然其字詁方之許篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博開古藝特善倉雅許氏字指八體六書精究間理有名於揖以書教諸皇子又建三字石經於漢碑之西其文蔚煥三體復宣挍之説文篆隸大同而古字少異又有京兆韋誕河東衛覬二家並號能篆當時樓觀榜題寶器之銘悉是誕書咸傳之子孫世稱其妙晉世義陽王典詞令任誠吕忱表上字林六卷尋其况趣附託許慎説文而按偶章句隱别古籀竒惑之字文得正隸不差篆意忱弟靜别倣故左挍令李登聲類之法作韻集五卷使宫商角徴羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯隸體失真俗學鄙習復加虛造巧談辨士以意為疑炫惑於時難以釐改傳曰以衆非非行正言信哉得之於斯情矣乃曰追來為歸巧言為辨小兔為䨲神蟲為蠶如斯甚衆皆不合孔氏古書史籀大篆許氏説文石經三字也凡所開卷莫不惆悵為之咨嗟夫文字者六藝之宗王教之始前人所以垂後今人所以識古故曰本立而道生孔子曰必也正名又曰述而不作書曰豫欲觀古人之象皆言遵循舊文而不敢穿鑿也臣六世祖瓊家世陳留往晉之初與從父應元俱受學於衛覬古篆之法埤倉雅言説文之誼當時並收善譽而祖至太子洗馬出為馮翊郡值洛陽之亂避地河西數世傳習斯業所以不墜世祖太延中皇風西被牧􅛳內附臣亡祖文威杖䇿歸國奉獻五世傳掌之書古篆八體之法時蒙褒録敘列於儒林官班文省家號世業暨臣暗短識學庸薄漸漬家風有忝無顯但逢時來恩出願外得承澤雲津側霑漏潤驅馳文閣參預史官題篆宫禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎説文為主爰採孔氏尚書五經音注籀篇爾雅三倉凡將方言通俗文字埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者以類編聫文無重復統為一部其古籀竒字俗隸諸體咸使班於篆下各有區别詁訓假借之誼各隨文而解音讀楚夏之聲並逐字而注其所不知者則闕如也脫蒙許冀省百氏之觀而周文字之域典書祕書所須之書乞垂敕給付並學士五人嘗習文字者助臣披覽書生五人専令招寫付中書黃門國子祭酒一月一監評議疑隱庶無訛謬所撰名目伏聽眀旨詔曰可如所請并就太常兼教八分書史也其有所須依請給之名目待書成重聞式於是撰集字書號曰古今文字凡四十篇大體依許氏為本上篆下隸法書要録卷二
