body:
  text: 法書要録卷一唐張彦逺撰後漢趙一非草書晉王羲之論書晉王羲之教子敬筆論不録晉衛夫人筆陣圖王羲之題筆陣圖後宋羊欣采能書人名齊王僧䖍荅太祖書王僧䖍論書宋王愔文字志目齊蕭子雲啟後漢趙一非草書余郡士有梁孔達姜孟穎者皆當世之彦哲也然慕張生之草書過於希顔孔焉孔達寫書以示孟穎皆口誦其文手楷其篇無怠倦焉於是後學之徒競慕二賢守令作篇人撰一卷以為秘玩余懼其背經而趨俗此非所以𢎞道興世也又想羅趙之所見嗤沮故為説草書本末以慰羅趙息梁姜焉竊覽有道張君所與朱使君書稱正氣可以銷邪人無其釁妖不自作誠可謂信道抱真知命樂天者也若夫褒杜崔沮羅趙忻忻有自臧之意者無乃近於矜伎賤彼貴我哉夫草書之興也其於近古乎上非天象所垂下非河洛所吐中非聖人所造盖秦之末刑峻網宻官書煩冗戰攻並作軍書交馳羽檄紛飛故為𨽻草趣急速耳示簡易之指非聖人之業也但貴刪難省煩損複為單務取易為易知非常儀也故其讚曰臨事從宜而今之學草書者不思其簡易之㫖直以為杜崔之法龜龍所見也其􅀈扶柱桎詰屈叐乙不可失也齔齒以上苟任渉學皆廢倉頡史籀競以杜崔為楷私書相與庶獨就書云適廹遽故不及草草本易而速今反難而遲失指多矣凡人各殊氣血異筋骨心有疏密手有巧拙書之好醜在心與手可强為哉若人顔有美惡豈可學以相若耶昔西施心疹捧胷而顰衆愚效之秪増其醜趙女善舞行歩媚蠱學者弗獲失節匍匐夫杜崔張子皆有超俗絶世之才博學餘暇遊手于斯後世慕焉専用為務鑚堅仰髙忘其罷勞夕惕不息仄不暇食十日一筆月數丸墨領袖如皁唇齒常黒雖處衆坐不遑談戲展指畫地以草劌壁臂穿皮刮指爪摧折見䚡出血猶不休輟然其為字無益於工拙亦如効顰者之増醜學歩者之失節也且草書之人盖伎藝之細者耳鄉邑不以此較能朝廷不以此科吏博士不以此講試四科不以此求備徴聘不問此意考績不課此字徒善字既不達於政而拙草無損於治推斯言之豈不細哉夫務内者必闕外志小者必忽大俯而捫蝨不暇見天天地至大而不見者方鋭精於蟣蝨乃不暇焉第以此篇研思鋭精豈若用之於彼七經稽歴協律推歩期程探賾鉤深幽贊神眀鑒天地之心推聖人之情析疑論之中理俗儒之諍依正道於邪説儕雅樂於鄭聲興至徳之和睦𢎞大倫之𤣥清窮可以守身遺名達可以尊主致平以兹命世永鑒後生不以淵乎晉王右軍自論書吾書比之鍾張當抗行或謂過之張草猶當雁行張精熟過人臨池學書池水盡墨若吾耽之若此未必謝之後達解者知其評之不虚吾盡心精作亦久尋諸舊書惟鍾張故為絶倫其餘為是小佳不足在意去此二賢僕書次之湏得書意轉深㸃畫之間皆有意自有言所不盡得其玅者事事皆然平南李式論君不謝平南即右軍叔平南將軍王廙也李式晉侍中晉衛夫人筆陣圖夫三端之玅莫先乎用筆六蓺之奥莫匪乎銀鉤昔秦丞相斯見周穆王書七日興歎患其無骨蔡尚書入鴻都觀碣十旬不返嗟其出羣故知達其源者少闇於其理者多近代以来殊不師古而縁情弃道纔記姓名或學不該贍聞見又寡致使成功不就虚費精神自非通靈感物不可與談斯道今刪李斯筆玅更加潤色總七條并作其形容列事如左貽諸子孫永為模範庶將来君子時復覽焉筆要取崇山絶仭中兔毛八九月收之其筆頭長一寸管長五寸鋒齊腰强者其硯取煎涸新石潤澀相兼浮津耀墨者其墨取廬山之松煙代郡之鹿膠十年已上强如石者為之紙取東陽魚卵虚柔滑浄者凡學書字先學執筆若真書去筆頭二寸一分若行草書去筆頭三寸一分執之下筆㸃墨畫芟波屈曲皆湏盡一身之力而送之若初學先大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力者多肉多骨㣲肉者謂之筋書多肉㣲骨者謂之墨猪多力豐筋者聖無力無筋者病一一從其消息而用之一如千里陣雲隠隠然其實有形如髙峰墜石磕磕然實如崩也丿陸斷犀象百鈞弩發丨萬嵗枯藤乀崩浪雷奔􅗵勁弩筋節右七條筆陣出入斬斫圖執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能𦂳者心手不齊意後筆前者敗若執筆遠而急意前筆後者勝又有六種用筆結構圓備如篆法飄颺灑落如章草㓙險可畏如八分窈窕出入如飛白耿介特立如鶴頭鬱拔縱横如古𨽻然心存委曲每為一字各象其形斯造玅矣書道畢矣永和四年上虞製記王右軍題衛夫人筆陣圖後夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結構者謀畧也颺筆者吉㓙也出入者號令也屈折者殺戮也夫欲書者先乾研墨凝神静思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字若平直相似狀如算子上下方整前後齊平此不是書但得其㸃畫爾昔宋翼常作此書翼是鍾繇弟子繇乃叱之翼三年不敢見繇即潛心改迹每作一波常三過折筆每作一㸃常隠鋒而為之每作一横畫如列陣之排雲每作一戈如百鈞之弩發每作一㸃如髙峰墜石屈折如鋼鉤每作一牽如萬嵗枯藤每作一放縱如足行之趣驟翼先来書惡晉太康中有人於許下破鍾繇墓遂得筆勢論翼乃讀之依此法學名遂大振欲真書及行書皆依此法若欲學草書又有别法湏緩前急後字體形勢狀等龍蛇相鉤連不斷仍湏稜側起復用筆亦不得使齊平大小一等每作一字湏有㸃處且作餘字摠竟然後安㸃其㸃湏空中遥擲筆作之其草書亦復湏篆勢八分古隸相雜亦不得急令墨不入紙若急作意思淺薄而筆即直過惟有章草及章程行狎等不用此勢但用擊石波而已其擊石波者缺波也又八分更有一波謂之隼尾波即鍾公泰山銘及魏文帝受禪碑中已有此體夫書先湏引八分章草入隸字中發人意氣若直取俗字不能先發羲之少學衛夫人書將謂大能及渡江北遊名山比見李斯曹喜等書又之許下見鍾繇梁鵠書又之洛下見蔡邕石經三體書又於從兄洽處見張昶華岳碑始知學衛夫人書徒費年月耳羲之遂改本師仍於衆碑學習焉遂成書爾時年五十有三或恐風燭奄及聊遺教於子孫耳可藏之千金勿傳宋羊欣采古来能書人名齊王僧䖍錄臣僧䖍啟昨奉敕湏古来能書人名臣所知局狭不辦廣悉輒條疏上呈羊欣所撰錄一卷尋案未得續更呈聞謹啟秦丞相李斯秦中車府令趙髙右二人善大篆秦獄吏程邈善大篆得罪始皇囚於雲陽獄増减大篆體去其繁複始皇善之出為御史名書曰隸書扶風曹喜後漢人不知其官善篆隸篆小異李斯見師一時陳留蔡邕後漢左中郎將善篆隸採斯喜之法真定宜父碑文猶傳於世篆者師焉杜陵陳遵後漢人不知其官善篆隷每書一座皆驚時人謂為陳驚座上谷王次仲後漢人作八分楷法師宜官後漢不知何許人何官能為大字方一丈小字方寸千言耿球碑是宜官書甚自矜重或空至酒家先書其壁觀者雲集酒因大售俟其飲足削書而退安定梁鵠後漢人官至選部尚書得師宜官法魏武重之常以鵠書懸帳中宫殿題署多是鵠手陳留邯鄲淳為魏臨淄侯文學得次仲法名在鵠後毛𢎞鵠弟子今祕書八分皆傳𢎞法又有左子邑與淳小異亦有名亰兆杜度為魏齊相始有草名安平崔瑗後漢濟北相亦善草書平苻堅得摹崔瑗書王子敬云極似張伯英瑗子實官至尚書亦能草書𢎞農張芝髙尚不仕善草書精勁絶倫家之衣帛必先書而後練臨池學書池水盡墨每書云囱囱不暇草書人謂為草聖芝弟昶漢黄門侍郎亦能草今世云芝草者多是昶作也姜詡梁宣田彦和及司徒韋誕皆英弟子並善草誕書最優誕字仲將京兆人善楷書漢魏宫館寳器皆是誕手寫魏眀帝起凌雲臺誤先釘牓而未題以籠盛誕轆轤長絙引之使就牓書之牓去地二十五丈誕甚危懼乃擲其筆以下焚之仍誡子孫絶此楷法著之家令官至鴻臚少卿誕子少季亦有能稱羅暉趙襲不詳何許人與伯英同時見稱西州而矜許自與衆頗惑之伯英與朱寛書自叙云上比崔杜不足下方羅趙有餘河間張超亦善草不及崔張劉徳昇善為行書不詳何許人潁川鍾繇魏太尉同郡胡昭公車徴二子俱學於徳昇而胡書肥鍾書瘦鍾書有三體一曰銘石之書最妙者也二曰章程書傳祕書教小學者也三曰行狎書相聞者也三法皆世人所善繇子會鎮西將軍絶能學父書改易鄧艾上事皆莫有知者河東衛覬字伯儒魏尚書僕射善草及古文畧盡其玅草體㣲瘦而筆跡精熟覬子瓘字伯玉為晉太保採張芝法以覬法叅之更為草藁草藁是相聞書也瓘子恒亦善書博識古文燉煌索靖字㓜安張芝姊之孫晉征南司馬亦善草書陳國何元公亦善草書吳人皇象能草世稱沉著痛快滎陽陳暢晉秘書令史善八分晉宫觀城門皆暢書也滎陽楊肇晉荆州刺史善草隸潘岳誄曰草隸兼善尺牘必珍足無輟行手不釋文翰動若飛紙落如雲肇孫經亦善草隷京兆杜畿魏尚書僕射子恕東郡太守孫預荆州刺史三世善草藁晉齊王攸善草行書泰山羊忱晉徐州刺史羊固晉臨海太守並善行書江夏李式晉侍中善隷草弟定子公府能名同式晉中書院李充母衛夫人善鍾法王逸少之師瑯琊王廙晉平南將軍荆州刺史能章楷傳鍾法晉丞相王導善藁行廙從兄也王恬晉中將軍會稽内史善隷書導第二子也王洽晉中書令領軍將軍衆書通善尤能𨽻行從兄羲之云弟書遂不减吾恬弟也王珉晉中書令善隷行洽少子也王羲之晉右將軍㑹稽内史博精羣法特善草隷羊欣云古今莫二廙兄子也王獻之晉中書令善隷藁骨勢不及父而媚趣過之羲之第七子也兄𤣥之徽之兄子淳之並善草行王允之衛軍將軍㑹稽内史亦善草行舒子也太原王濛晉司徒左長史能草隷子脩瑯琊王文學善隷行與羲之善故殆窮其玅早亡未盡其美子敬每省修書云咄咄逼人王綏晉冠軍將軍㑹稽内史善隷行髙平郗愔晉司空㑹稽内史善章草亦能隷郗超晉中書郎亦善草愔子也潁川庾亮晉太尉善草行庾翼晉荆州刺史善隷行時與羲之齊名亮弟也陳郡謝安晉太傅善隷行髙陽許静民鎮軍叅軍善隷草羲之髙足晉穆帝時有張翼善學人書寫羲之表表出經日不覺後云㡬欲亂真會稽隠士謝敷胡人康昕並攻隷草飛白本是宫殿題八分之輕者全用楷法吳時張𢎞好學不仕常著烏巾時人號為張烏巾此人特善飛白能書者鮮不好之自秦至晉凡六十九人傳授筆法人名蔡邕受於神人而傳之崔瑗及女文姬文姬傳之鍾繇鍾繇傳之衛夫人衛夫人傳之王羲之王羲之傳之王獻之王獻之傳之外甥羊欣羊欣傳之王僧䖍王僧䖍傳之蕭子雲蕭子雲傳之僧智永智永傳之虞世南世南傳之授於歐陽詢詢傳之陸柬之柬之傳之姪彦逺彦逺傳之張旭旭傳之李陽冰陽冰傳徐浩顔真卿鄔彤韋玩崔邈凡二十有三人文傳終於此矣僧䖍答太祖書僧䖍啓恩眷罔已賜示古迹十一帙或其人可想或其法可學愛玩彌日暫得忘其沉疴輒率短見並述舊聞具如别牋民間所有帙中所無者或有不好今奉别目二十三卷追懼乖誤伏深悚息吳大皇帝書吳景帝書吳歸命矦孫皓晉安帝亡髙祖丞相導亡曽祖領軍洽亡從祖中書令珉韋仲將張芝索靖張翼衛伯儒右十二巻故州民王僧䖍奉南齊王僧䖍論書宋文帝書自謂不減王子敬時議者云天然勝羊欣功夫不及欣王平南廙是右軍叔自過江東右軍之前惟廙為最畫為晉眀帝師書為右軍法亡曽祖領軍洽與右軍書云俱變古形不爾至今猶法鍾張右軍云弟書遂不減吾亡從祖中書令珉筆力過於子敬書舊品云有四疋素自朝操筆至暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸恒欲度驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不忿在荆州與都下書云小兒輩乃賤家雞皆學逸少書湏吾還當比之張翼書右軍自書表晉穆帝令翼寫題後荅右軍右軍當時不别久方覺云小子㡬欲亂真張芝索靖韋誕鍾會二衛並得名前代古今既異無以辨其優劣惟見筆力驚絶耳張澄書當時亦呼有意郗愔章草亞於右軍晉齊王攸書京洛以為楷法李式書右軍云是平南之流可比庾翼王濛書亦可比庾翼陸機書吳士書也無以較其多少庾亮書亦能入録亡髙祖丞相導亦甚有楷法以師鍾衛好愛無厭䘮亂狼狽猶以鍾繇尚書宣示帖衣帶過江後在右軍處右軍借王敬仁敬仁死其母見脩平生所愛遂以入棺郗超草書亞於二王緊媚過其父骨力不及也桓𤣥書自比右軍議者未之許云可比孔琳之謝安亦入能流殊亦自重乃為子敬書嵇中散詩得子敬書有時裂作挍紙羊欣丘道䕶並親授於子敬欣書見重一時行草尤善正乃不稱孔琳之書天然絶逸極有筆力規矩恐在羊欣後丘道䕶與羊欣俱靣授子敬故當在欣後丘殊在羊欣前范曄與蕭思話同師羊欣然范後背叛皆失故歩名亦稍退蕭思話全法羊欣風流趣好殆當不减而筆力恨弱謝靈運書乃不倫遇其合時亦得入流昔子敬上表多於中書雜事中皆自書竊易真本相與不疑元嘉初方就索還上謝太傅殊禮表亦是其例親聞文皇説此謝綜書其舅云緊潔生起實為得賞至不重羊欣欣亦憚之書法有力恨少媚好顔騰之賀道力並便尺牘康昕學右軍草亦欲亂真與南州識道人作右軍書貨孔琳之書放縱快利筆道流便二王後略無其比但工夫少自任故未得盡其玅故當劣於羊欣謝静謝敷並善寫經亦入能境居鍾毫之美邁古流今是以征南還有所得辱告並五紙舉體精雋靈奥執翫反覆不能釋手雖太傅之婉媚翫好領軍之静逖荅緒方之蔑如也昔杜度殺字甚安而筆體㣲瘦崔瑗筆勢甚快而結字小疎居處二者之間亦猶仲尼方於季孟也夫工欲善其事必先利其器伯喈非流紈體素不妄下筆若子邑之紙研染輝光仲將之墨一㸃如漆伯英之筆窮神静思玅物逺矣邈不可追遂令思挫於弱毫數屈於陋墨言之使人於邑若三珍尚存四寳斯覿何但尺素信札動見模式將一字徑丈方寸千言也承天凉體豫復欲繕寫一賦傾遲暉采心目俱勞承閲覽秘府備覩羣跡崔張歸美於逸少雖一代所宗僕不見前古人之跡計亦無以過於逸少既玅盡深絶便當得之實録然觀前世稱目竊有疑焉崔杜之後共推張芝仲將謂之筆聖伯玉得其筋巨山得其骨索氏自謂其書銀鈎蠆尾談者誠得其宗劉得昇為鍾胡所師兩賢並有肥瘦之斷元鳴獲釘壁之翫師宜致酒簡之多此亦不能止長𦙍狸骨右軍以為絶倫其功不可及繇此言之而向之論或至投杖聊呈一笑不妄言耳鍾公之書謂之盡玅鍾有三體一曰銘石書最玅者也二曰章程書世傳秘書教小學者也三曰行狎書行書是也三法皆世人所善張超字子並河間人衛覬字伯儒河東人為魏尚書僕射謚敬矦善草及古文略盡其玅草體如傷瘦而筆跡精殺亦行於代子瓘字伯玉晉司空太保為楚王所害瓘採張芝草法取父書㕘之更為草藁世傳其善瓘子恒字巨山亦能書索靖字㓜安燉煌人散騎常侍張芝姊之孫也傳芝草而形異甚矜其書名其字勢曰銀鉤蠆尾韋誕字仲將京兆人善楷書漢魏宫觀題署多是誕手魏眀帝起凌雲臺先釘牓未題籠盛誕轆轤長絙引上使就牓題牓去地將二十五丈誕危懼誡子孫絶此楷法又著之家令官至鴻臚宋王愔文字志三卷未見此書今録其目上卷目古書有三十六種古文篆大篆象形篆科斗篆小篆刻小篆摹篆隷書署書書繆篆鳥書尚方篆鳯篆魚書龍書騏驎書龜書虵書仙人書雲書芝英書金錯書十二時書垂露篆倒薤篆偃波篆蚊脚篆草書楷書飛書填書藁書行書古今小學三十七家一百四十七人書勢五家中卷目秦吳六十人李斯程邈胡毋敬趙髙司馬相如張敞嚴延年漢元帝史游劉向孔光爰禮揚䧺陳遵杜林劉睦衛寵劉黨曹喜杜度王次仲班固徐幹賈魴賈逵左姬許填唐綜曹夀崔寔尹珍羅暉趙襲崔瑗皇甫規妻蔡邕張芝蘇班劉得昇師宜官張超李巡張昶梁鵠張紘毛𢎞左伯姜詡梁宣鍾繇張昭蘇林張揖胡昭魏武帝邯鄲淳衛規杜恕諸葛融下卷目魏宋六十人韋誕張揖郭淮韋熊来敏鍾㑹皇象何曽傅𤣥韋𢎞辛曠魏徽諸葛瞻楊肇岑泉張𢎞朱育江偉司馬攸陳暢滿爽楊經吕悦衛恒衛宣裴興孫皓杜預向秦裴邈張柄張越羊忱索靖牽秀羊固辟閭訓王導庾翼王濛荀輿王廙李式劉劭王循王裕王羲之衛夫人李欽王怡郗愔任靖王獻之李韞張彭祖謝安王珉桓𤣥梁蕭子雲啟蕭子雲自云善効鍾元常王逸少而㣲變字體常荅勅云臣子雲奉勅使臣寫千字文今已上呈臣昔不能拔賞隨世所貴規模子敬多歴年所三十六著晉史一部至二王列傳欲作論草隷法言不盡意遂不能成止論飛白一勢而已十餘年来始見勑㫖論書一卷商略筆勢洞達字體又以逸少不及元常猶子敬不及逸少因此研思方悟隷式始變子敬全法元常迨今以来自覺功進此禀自天論臣先来猶恨已無臨池之勤又不㕘聖㫖之奥仰延眀詔伏増悚息侍中國子祭酒南徐州太守臣子雲啟上法書要録卷一
