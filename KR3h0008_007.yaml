body:
  text: 法書要録卷七唐張彥逺撰張懷瓘書斷上并序昔庖犧氏畫卦以立象軒轅氏造字以設教至於堯舜之世則煥乎有文章其後盛于商周備夫秦漢固夫所由逺矣文章之為用必假乎書書之為徴期合乎道故能發揮文者莫近乎書若乃思賢哲于千載覽陳迹于縑簡謀猷在覿作事粲然言察深𠂻使百代無隱斯可尚也及夫身處一方含情萬里標拔志氣黼藻精靈披封覩迹欣如㑹面又可樂也爾其初之微也蓋因象以曈曨眇不知其變化範圍無體應㑹無方考沖漠以立形齊萬殊而一貫合冥契吸至精資運動於風神頤浩然於潤色爾其終之彰也流芳液於筆端忽飛騰而光赫或體殊而勢接若雙樹之交葉或區分而氣運似兩井之通泉庥䕃相扶津澤潜應離而不絶曳獨繭之絲卓爾孤標竦危峰之石龍騰鳳翥若飛若驚電烻㸌穫禾火離披爛熳翕如雲布曵若星流朱熖緑烟乍合乍散飄風驟雨雷怒霆激呼吁可駭也信足以張皇當世軌範後人矣至若磔髦竦骨裨短截長有似夫忠臣抗直補過匡主之節也矩折規轉却密就疏有似夫孝子承順慎終思逺之心也耀質含章或柔或剛有似夫哲人行藏知進知退之行也固其發迹多端觸變成態或分鋒各讓或合勢交侵亦猶五常之與五行雖相尅而相生亦相反而相成豈物類之能象賢實則微妙而難名詩云鐘鼓欽欽鼓瑟鼓琴笙磬同音是之謂也使夫觀者玩迹探情循由察變運思無已不知其然瓌寶盈矚坐啓東山之府明珠曜掌頓傾南海之資雖彼迹已緘而遺情未盡心存目想欲罷不能非夫妙之至者何以及此且其學者察彼規模采其𤣥妙技由心付暗以目成或筆下始思困於鈍滯或不思而製敗於脫略心不能授之於手手不能受之於心雖自己而可求終杳茫而無獲又可怪矣及乎意與靈通筆與冥運神將化合變出無方雖龍伯挈鼇之勇不能量其力雄圖應籙之帝不能抑其髙幽思入于毫間逸氣彌於宇內鬼出神入追虛捕微則非言象筌蹄所能存亡也夫幼童而守一藝白首而後能言固不可恃才曜識以為率爾可知也且知之不易得之有難千有餘年數人而已昔之評者或以今不逮古質於醜妍推察疵瑕妄增羽翼自我相物求諸合已悉為鑒不圓通也亦由蒼黃者唱首冥昧者唱聲風議混然罕詳孰是及兼論文字始祖各執異端臆說蜂飛竟無稽古蓋眩如也懷瓘質蔽愚蒙識非通敏承先人之遺訓或紀録萬一輒欲芟夷浮議揚榷古今拔狐疑之根解紛拿之結考窮乖謬敢無隱於昔賢探索幽微庶不欺於𤣥匠爰自黃帝史籀蒼頡迄於皇明黃門侍郎盧藏用凡三千二百餘年書有十體源流學有三品優劣今敘其源流之異著十贊一論較其優劣之差為神妙能三品人為一𫝊亦有隨事附者通為一評究其臧否分成上中下三卷名曰書斷其目録如此庶儒流君子知小學亦務焉卷上古文大篆籀文小篆八分𨽻書章書行書飛白草書作書九人附者四人讚十首論一首卷中三品總目優劣神品十二人𫝊附九人妙品三十九人卷下能品三十五人𫝊附二十九人凡一百七十四人評一首古文案古文者黃帝史蒼頡所造也頡首四目通於神明仰觀奎星圓曲之勢俯察龜文鳥跡之象博采衆美合而為字是曰古文孝經援神契云奎主文章蒼頡倣象是也夫文字者總而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則謂之文因而滋蔓母子相生形聲㑹意之屬則謂之字字者言孳乳寖多也題之竹帛謂之書書者如也舒也著也記也著明萬事記往知來名言諸無宰制羣有何幽不貫何往不經實可謂事簡而應博豈人力哉易曰上古結繩以治後世聖人易之以書契夫至德之道化其性於未然之前結繩之教懲其罪於已然之後故大道衰而有書利害萌而有契契為信不足書為言立徴書契者決斷萬事也凡文書相約束皆曰契契亦誓也諸侯約信曰誓故春秋傳曰王叔氏不能舉其契是知契者書其信誓之言而盟之濫觴君臣之大約也亦謂刻木剖而分之君執其左臣執其右即昔之銅竹虎使今之銅魚並契之遺象也皇甫謐曰黃帝史蒼頡造文字記言行策藏之名曰書契故知黃帝導其源堯舜揚其波是有虞夏商周之書神化典謨垂範萬世及周公相成王申明禮樂以加朝祭服色尊卑之節又造爾雅宣尼卜商增益潤色釋言暢物略盡訓詁及秦用小篆焚燒先典古文絶矣漢文帝時秦博士伏勝獻古文尚書時又有魏文侯樂人竇公年二百八十歲獻古文樂書一篇以今文考之乃周官之大司樂章也及武帝時魯恭王壞孔子宅壁內石函中得孝經尚書等經宣帝時河內女子壞老子屋得古文二篇晉咸寧五年汲郡人不凖盜發魏安釐王冢得册書千餘萬言或寫春秋經傳易經論語夏書周書瑣語大厯梁邱藏穆天子傳及魏史至安釐王二十年其書隨世變易已成數體其周書論楚事者最妙於是古文備矣甄酆刪定舊文制為六書一曰古文即此也以壁中書為正周幽王時又有省古文者今汲冢書中多有是也滕公冢內得石銘人無識者惟叔孫通云此古文科斗書也科斗者即上古之别名也衛恆古文贊云黃帝之史沮誦蒼頡眺彼鳥跡始作書契紀綱萬事垂法立制觀其措筆綴墨用心精専中正循撿矩折規旋其曲如弓其直如絃矯然特出若龍騰於川渺爾下隤若雨墜于天信黃唐之遺跡為六藝之範先篆籀蓋其子孫𨽻草乃其曾𤣥蒼頡即古文之祖也贊曰邈邈蒼公軒轅之始創製文字代彼繩理粲若星辰鬱為綱紀千齡萬類如掌斯視生人盛德莫斯之美神章靈篇自兹而起大篆案大篆者周宣王太史史籀所作也或云柱下史始變古文或同或異謂之為篆篆者𫝊也𫝊其物理施之無窮甄酆定六書三曰篆書八體書法一曰大篆又漢書藝文志云史籀十五篇並此也以史官製之用以教授謂之史書凡九千字秦趙髙善篆教始皇少子胡亥書又漢文帝王遵嚴延年並工史書是也秦焚書惟易與史篇得全吕氏春秋云蒼頡造大篆非也若蒼頡造大篆則置古文何地所謂籀篆蓋其子孫是也蔡雍大篆讚云體有大篆巧妙入神或象龜文或比龍鱗紆體放尾長翅短身延頸負翼狀似凌雲史籀即大篆之祖也贊曰古文𤣥𦙍太史神書千類萬象或龍或魚何詞不録何物不儲懌思通理從心所如如彼江海大波洪濤如彼音樂干戚羽旄籀文案籀文者周太史史籀之所作也與古文大篆小異後人以名稱書謂之籀文七略曰史籀者周時史官教學童書也與孔氏壁中古文異體甄酆定六書二曰奇字是也其跡有石鼓文存焉蓋諷宣王畋獵之所作今在陳倉李斯小篆兼采其意史籀即籀文之祖也贊曰體象卓然殊今異古落落珠玉飄飄纓組蒼頡之嗣小篆之祖以名稱書遺跡石鼓小篆案小篆者秦始皇丞相李斯所作也增損大篆異同籀文謂之小篆亦曰秦篆始皇二十年始并六國斯時為廷尉乃奏罷不合秦文者於是天下行之畫如鐵石字若飛動作楷𨽻之祖為不易之法其銘題鐘鼎及作符印至今用焉則離之六二黃離元吉得中道也斯雖草創遂造其極矣蔡雍小篆贊云龜文叙列擳比龍鱗隤若黍稷之垂頴藴若蟲蛇之棼緼若絶若連似露緣絲垂下端逺而望之象鴻鵠群遊絡繹遷延研桑不能數其詰曲離婁不能覩其隙閒般垂揖讓而辭巧籀誦拱手而韜翰摛華豔於紈素為六藝之範先也李斯即小篆之祖也贊曰李君創法神慮精微鐵為肢體虬作驂騑江海渺漫山嶽巍巍長風萬里鸞鳳于飛八分案八分者秦羽人上谷王次仲所作也王愔云次仲始以古書方廣少波勢建初中以𨽻草作楷法字方八分言有模楷又蕭子良云靈帝時王次仲飾𨽻為八分二家俱言後漢而兩帝不同且靈帝之前工八分者非一而云方廣殊非𨽻書既言古書豈得稱𨽻若驗方廣則篆籀有之變古為方不知其謂也案序仙記云王次仲上谷人少有異志少年入學屢有靈奇年未弱冠變蒼頡書為今𨽻書始皇時官務煩多得次仲文簡略赴急疾之用甚喜遣使召之三徴不至始皇大怒制檻車送之於道化為大鳥出在檻外翻然長引至於西山落二翮於山上今為大翮小翮山山上立祠水旱祈焉又魏土地記云沮陽縣城東北六十里有大翮小翮山又楊固北都賦云王次仲匿術於秦皇落雙翮而冲天案數家之言明次仲是秦人既變蒼頡書即非效程邈𨽻也案蔡雍勸學篇上谷王次仲初變古形是也始皇之世出其數書小篆古形猶存其半八分已减小篆之半𨽻又减八分之半然可云子似父不可云父似子故知𨽻不能生八分矣本謂之楷書楷者法也式也模也孔子曰今世行之後世以為楷式或云後漢亦有王次仲為上谷太守非上谷人又楷𨽻初制大範幾同故後人惑之學者務之蓋其歲深漸若八字分散又名之為八分時人用寫篇章或寫法令亦謂之章程書故梁鵠云鍾繇善章程書是也夫人才智有所偏工取其長而捨其短諺曰韓詩鄭易挂著壁且二王八分即挂壁之類唯蔡伯喈乃造其極焉王次仲即八分之祖也贊曰仙客遺範靈姿秀出奮研揚波金相玉質龍騰虎踞兮勢非一交㦸橫戈兮氣雄逸楷之為妙兮備華實𨽻書案𨽻書者秦下邽人程邈所造也邈字元岑始為衙縣獄吏得罪始皇幽繫雲陽獄中覃思十年益大小篆方圓而為𨽻書三千字奏之始皇善之用為御史以奏事繁多篆字難成乃用𨽻字以為𨽻人佐書故名𨽻書蔡雍聖皇篇云程邈删古立𨽻文甄酆六書其四曰佐書是也秦造𨽻書以赴急速為官司刑獄用之餘尚用小篆焉漢亦因循至和帝時賈魴撰滂喜篇以蒼頡為上篇訓纂為中篇滂喜為下篇所謂三蒼也皆用𨽻字寫之𨽻法由兹而廣酈道元水經曰臨淄人發古冢得銅棺前版外隱起為字言齊太公六世孫胡公之棺也惟三字是古餘同今𨽻書證知𨽻字出古非始於秦時若爾則𨽻法當先於大篆矣案胡公者齊哀公之弟靖胡公也五世六公計一百餘年當周穆王時也又二百餘歲至宣王之朝大篆出矣又五百餘載至始皇之世小篆出焉不應𨽻書而效小篆然程邈所造書籍共𫝊酈道元之說未可憑也案八分則小篆之捷𨽻亦八分之捷漢陳遵字孟公京兆杜陵人哀帝之世為河南太守善𨽻書與人尺牘主皆藏之以為榮此其創開𨽻書之善也爾後鍾元常王逸少各造其極焉蔡雍𨽻書勢曰鳥跡之變乃惟佐𨽻蠲彼繁文崇兹簡易修短相副異體同勢煥若星陳鬱若雲布纎波濃㸃錯落其間若鍾簴設張庭燎飛煙似崇臺重宇層雲冠山逺而望之若飛龍在天近而察之心亂目眩成公綏𨽻書勢曰蟲篆既繁草藁近僞適之中庸莫尚於𨽻程邈即𨽻書之祖也贊曰𨽻合文質程君是先乃備風雅如聆管絃長毫秋徑素體霜妍摧鋒劍折落㸃星懸乍發紅焰旋凝紫煙金芝瓊草萬世方傳章草案章草者漢黃門令史游所作也衛恆李誕並云漢初而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史游作急就章解散𨽻體粗書之漢俗簡墮漸以行之是也此乃存字之梗槩損𨽻之規矩縱任奔逸赴俗急就因草創之義謂之草書惟君長告令臣下則可後漢北海敬王劉穆善草書光武器之明帝為太子尤見親幸甚愛其法及穆臨病明帝令為草書尺牘十餘首此其創開草書之善也至建初中杜度善草見稱於章帝上貴其迹詔使草書上事魏文帝亦令劉廣通草書上事蓋因章奏後世謂之章草惟張伯英造其極焉韋誕云杜氏傑有骨力而字畫微瘦惟劉氏之法書體甚濃結字工巧時有不及張芝喜而學焉轉精其巧可謂草聖超然絶後獨步無雙崔瑗草書勢云書契之興始自頡皇寫彼鳥跡以定文章章草之法蓋又簡略應時諭指周旋卒迫兼功并用愛日省力絶險之變豈必古式觀其法象俯仰有儀方不中矩圓不副規抑左揚右望之若崎鸞企鳥峙志意飛移狡獸暴駭將奔未馳狀似連珠絶而不離畜怒怫鬱放逸生奇螣蛇赴穴頭沒尾垂機要微妙臨時從宜懷瓘案章草之書字字區别張芝變為今草如其流速拔茅其茹上下牽連或借上字之下而為下字之上奇形離合數意兼包若懸猿飲澗之象鉤鎖連環之狀神化自若變態不窮呼史游草為章因張伯英草而謂也亦猶篆周宣王時作及有秦篆分别而有大小之名魏晉之時名流君子一槩呼為草惟知音者乃能辨焉章草即𨽻書之捷草亦章草之捷也案杜度在史游後一百餘年即解散𨽻體明是史游創焉史游即章草之祖也贊曰史游製草始務急就婉若廽鸞攖如舞袖遲回縑簡勢欲飛透敷華垂實尺牘尤奇并功惜日學者為宜行書案行書者後漢潁川劉德升所作也即正書之小僞務從簡易相間流行故謂之行書王愔云晉世以來工書者多以行書著名昔鍾元常善行狎書是也爾後王羲之獻之並造其極焉獻之常白父云古之章草未能宏逸頓異真體合窮僞略之理極草縱之致不若藁行之間於往法固殊也大人宜改體觀其騰煙煬火則回祿喪精覆海傾河則𤣥冥失馭天假其魄非學之功若逸氣縱橫則羲謝於獻若簮裾禮樂則獻不繼羲雖諸家之法悉殊而子敬最為遒拔夫古今人民狀貌各異此皆自然妙有萬物莫比惟書之不同可庶幾也故得之者先禀於天然次資於功用而善學者乃學之於造化異類而求之固不取乎似本而各挺之自然王珉行書狀云邈乎嵩岱之峻極爛若列宿之麗天緯字挺特奇書秀出揚波騁藝餘好宏逸虎踞鳳峙龍伸蠖屈資胡氏之壯傑兼鍾公之精密總二妙之所長盡要蔑乎文質詳覽字體究尋筆跡粲乎偉乎如圭如璧宛若盤螭之仰勢翼若翔鸞之舒翮或乃放手飛筆雨下風馳綺靡婉娩縱橫流離劉德升即行書之祖也贊曰非草非真發揮柔翰星劍光芒雲虹照爛鸞鶴嬋娟風行雨散劉子濫觴鍾胡彌漫飛白案飛白者後漢左中郎將蔡雍所作也王隱王愔並云飛白變楷製也本是宫殿題署勢既徑丈字宜輕微不滿名為飛白王僧䖍云飛白八分之輕者雖有此說不言起由按漢靈帝熹平年詔蔡雍作聖皇篇篇成詣鴻都門上時方修飾鴻都門伯喈待詔門下見役人以堊帚成字心有悅焉歸而為飛白之書漢末魏初並以題署宫閣其體有二創法於八分窮微於小篆自非蔡公設妙豈能詣此可謂勝寄冥通縹眇神仙之事也張芝草書得易簡流速之極蔡雍飛白得華豔飄蕩之極字之逸越不復過此二途邇後羲之獻之並造其極其為狀也輪囷蕭索則虞頌以嘉氣非雲離㑹飄流則曹風以麻衣似雪盡能窮其神妙也衛恆祖述飛白而造散𨽻之書開張𨽻體微露其白拘束於飛白蕭灑於𨽻書處其季孟之間也劉彥祖飛白贊云蒼頡觀鳥悟迹興文名繁類殊有革有因世絶常妙索草鍾真爰有飛白貌艷藝珍若乃較㭊毫芒纎微和惠素翰氷鮮蘭墨電製直凖箭飛屈擬蠖勢梁武帝謂蕭子雲言頃見王獻之書白而不飛卿書飛而不白可斟酌為之令得其𠂻子雲乃以篆文為之雅合帝意既括鏇而羽則逺而益深雖創法於八分實窮微於小篆其後歐陽詢得之蔡伯喈即飛白之祖也贊曰妙哉飛白祖自八分有美君子潤色斯文絲縈箭激電繞雪氛淺如流霧濃若屯雲舉衆仙之奕奕舞群鶴之紛紛誰其覃思於戲蔡君草書案草書者後漢徴士張伯英之所造也梁武帝草書狀曰蔡雍云昔秦之時諸侯爭長簡檄相𫝊望烽走驛以篆𨽻之難不能救速遂作赴急之書蓋今草書是也余疑不然創制之始其間者鮮且此書之約略既是蒼黃之世何粗魯而能識之又云杜氏之變𨽻亦由程氏之改篆其先出自杜氏以張為祖以衛為父索為伯叔二王為兄弟薄為庶息羊為僕𨽻者懷瓘以為諸侯爭長之日則小篆及楷𨽻未生何但於草蔡公不宜至此誠恐後誣案杜度漢章帝時人元帝朝史游已作草又評羊薄等未曰知書也歐陽詢與楊駙馬書章草千文批後云張芝草聖皇象八絶並是章草西晉悉然逮乎東晉王逸少與從弟洽變章草為今草韻媚宛轉大行於世章草幾將絶矣懷瓘案右軍之前能今草者不可勝數諸君之說一何孟浪欲杜衆口亦猶躡履滅跡扣鐘銷音也又王愔云藁書者若草非草草行之際者非也案藁亦草也因草呼藁正如真正書寫而又塗改亦謂之草藁豈必草行之際謂之草者蓋取諸渾沌天造草昧之意也文而為本法此也故孔子曰裨諶草創之是也楚懷王使屈原造憲令草藁未成上官氏見欲奪之又董仲舒欲言災異草藁未上主父偃竊而奏之並是也如淳曰所作起草為藁姚察曰草猶粗也粗書為本曰藁蓋草書之文祖出於此草書之先因於起草自杜度妙於章草崔瑗崔實父子繼能羅暉趙襲亦法此藝襲與張芝相善芝自云上比崔杜不足下方羅趙有餘然伯英學崔杜之法溫故知新因而變之以成今草轉精其妙字之體勢一筆而成偶有不連而血脉不斷及其連者氣候通而隔行唯王子敬明其深指故行首之字往往繼前行之末世稱一筆書者起自張伯英即此也實亦約文該思應指宣言列缺施鞭飛廉縱轡也伯英雖始草創遂造其極索靖草書狀云聖皇御世隨時之宜蒼頡既工書契是為損之草𨽻以崇簡易草書之狀也宛若銀鉤飄若驚鸞舒翼未發若舉復安於是多才之英篤藝之彥役心精微耽思文憲守道兼權觸類生變離㭊八體靡形不判騁辭放手雨行冰散髙音翰厲溢越流漫著絶藝於紈素垂百代之殊觀張伯英即草書之祖也贊曰草法簡略省繁録微譯言宣事如矢應機霆不暇發電不及飛徴士已沒道愈光輝明神在享其靈有歇斯藝漫流終古無絶論曰夫卦象所以隂隲其理文字所以宣載其能卦則渾天地之窈冥祕鬼神之變化文能以發揮其道幽贊其功是知卦象者文字之祖萬物之根衆學分鑣馳騖不息或安其所習毁所不見終以自蔽也固須原心反本無漫學焉今欲稽其濫觴不可遵諸子之非弃聖人之是先賢說文字所起與八卦同作又云八卦非伏羲自重夫易者太古之書夫子之文章可得而聞也彌綸乎天地錯綜乎四時究極人神盛德大業也子曰學以聚之問以辨之蓋欲討論根源悉其枝派自仲尼沒而微言絶諸儒之說是或不經左邱明恥之愧無獨斷之明以釋天下之惑孔安國云宓羲造書契代結繩非也厥初生人君道尚矣應而不求為而不恃執大象也逮乎伏羲氏作始定人道辨乎臣子伏而化之結繩而治故孔子曰三皇伯世叶神無文洛乙糾命頡字胥合又班固云庖犧繼天而王為百王先並是也易曰庖犧氏之王天下也作結繩而為網罟以畋以漁蓋取諸離離者麗也日月麗乎天百榖草木麗乎地重明以麗乎正乃化成天下離也者明也萬物皆相見南方之卦也聖人南面而聽天下向明而理蓋取諸此也庖犧神農氏沒軒轅氏作始造圖書禮樂度數甲子律厯自開闢之事皆先聖傳流於口黃帝已後紀録言之無幾故春秋國語唯發明五帝太史公敘黃帝顓頊以下事孔子撰書始自堯舜尚年月闕然詩人所述起乎虞氏其可知也巢燧之時淳一無教故言上古昔者俱是伏羲神農之時言後世聖人者即黃帝堯舜之際易曰上古結繩以理後世聖人易之以書契此猶太陽一照衆星沒矣史記及漢書皆云文王重八卦為六十四卦又帝王世紀及孫盛等以為神農夏禹重之並非也夫八卦雖理象已備尚隱神功引而伸之始通變吉凶成其妙用觸類而長天下之能事畢矣故易曰聖人立象以盡意設卦以盡情八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣伏羲自重之驗也又曰昔者聖人之作易也觀變於隂陽而立卦發揮於剛柔而生爻是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦六位而成章又伏羲自重之驗也若以後世聖人易之以書契謂伏羲即昔者聖人之作易也謂誰矣則知伏羲自重八卦不造書契煥乎可明不至疑惑也又曰河出圖洛出書聖人則之孔安國云河圖八卦是洛之九疇馬融王肅姚信等並云得河圖而作易禮含文嘉曰伏羲則龜書乃作八卦並乘流而逝不討其源滋誤後生深可歎息去聖久矣百家衆言自古非一正史之書不經宣尼筆削則未可全是况儒者臆說耶悠悠萬載是非㸦起一犬吠形百犬吠聲一人措虛百人傳實按龍圖出河龜書出洛今或云法龍圖而作卦或云則龜書而畫之假欲遵之何者為是案左傳庖犧氏有龍瑞以龍紀官非得八卦八卦若先列於河圖又文王等重之則伏羲何功於易也又夫子不言因圖而畫卦自黃帝堯舜及周公攝政時皆得圖書河以通乾出天包雒以流川吐地符是知有聖人膺運則河洛出圖書何必八卦九疇九疇者天始錫禹而黃帝已獲洛書易曰著龜神物聖人則之然伏羲豈則蓍龜而作易言聖人者通謂後世易經三古不獨指伏羲也夫蓍龜者或悔吝有憂虞之象或得失有吉凶之徴或否泰有隂陽之辭或剛柔有變通之理若河圖洛書者或天地彞倫之法或帝王興亡之數或山川品物之制或治化合神之符故聖人則之而已孔子曰河不出圖洛不出書吾已矣夫是也故知文字之作確乎權輿十體相沿㸦明創革萬事皆始自微漸至于昭著春秋則寒暑之濫觴爻畫則文字之兆朕其十體內或先有萌牙今取其昭彰者為始祖夫道之將興自然𤣥應前聖後聖合矩同規雖千萬年至理斯㑹天或垂範或授聖哲必然而出不在考其甲之與乙耶案道家相傳則有天皇地皇人皇之書各數百言其文猶在像如符印而不傳其音指審爾則八卦未為雲孫矣况古文乎且戎狄異音各貌㑹於文字其指不殊禽獸之情悉應若是觀其趣向不逺於人其有知方來辨音節非智能而及復何所學哉則知凡庶之流有如草木鳥獸之類或藴文章又霹靂之下乃時有字或錫貺之瑞往往銘題以古書考之皆可識也夫豈學之於人乎又詳釋典或沙劫已前或他方怪俗云為事况與即意無殊是知天之妙道施於萬類一也但所感有淺深耳豈必在乎羲軒周孔捋釋老之教乎况論篆籀捋草𨽻之後先乎縷而分之則如彼總而言之其若此也法書要録卷七
