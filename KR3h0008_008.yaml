body:
  text: 法書要録卷八唐張彥逺撰張懷瓘書斷中我唐四聖髙祖神堯皇帝太宗文武聖皇帝髙宗天皇大聖皇帝鴻猷大業列乎冊書多才能事俯同人境翰墨之妙資以神功開草𨽻之規模變張王之今古盡善盡美無得而稱今天子神武聰明制同造化筆精墨妙思極天人或頌德銘勛函耀金石或恩崇惠縟載錫侯王赫矣光華懸諸日月然猶進而不已惟奧惟𤣥非區區小臣所敢揚述神品二十五人大篆一人史籀籀文一人史籀小篆一人李斯八分一人蔡雍𨽻書三人鍾繇王羲之王獻之行書四人王羲之鍾繇王獻之張芝章草八人張芝杜度崔瑗索靖衛瓘王羲之王獻之皇象飛白三人蔡雍王羲之王獻之草書三人張芝王羲之王獻之妙品九十八人古文四人杜林衛密邯鄲淳衛恆大篆四人李斯趙髙蔡雍邯鄲淳小篆五人曹喜蔡雍邯鄲淳崔瑗衛瓘八分九人張昶皇象邯鄲淳韋誕鍾繇師宜官梁鵠索靖王羲之𨽻書二十五人張芝鍾㑹蔡雍邯鄲淳衛瓘韋誕荀輿謝安羊欣王洽王珉薄紹之蕭子雲宋文帝衛夫人胡昭曹喜謝靈運王僧䖍孔琳之陸柬之褚遂良虞世南釋智永歐陽詢行書十六人劉德升衛瓘王珉謝安王僧䖍胡昭鍾㑹孔琳之虞世南阮研王洽羊欣薄紹之歐陽詢陸柬之褚遂良章草八人張昶鍾㑹韋誕衛恆郗愔張華魏武帝釋智永飛白五人蕭子雲張𢎞韋誕歐陽詢王廙草書二十二人索靖衛瓘嵇康張昶鍾繇羊欣薄紹之鍾㑹衛恆荀輿桓𤣥謝安孔琳之王珉王洽謝靈運張融阮研王僧䖍歐陽詢虞世南釋智永能品一百七人古文四人張敞衛覬衛瓘韋昶大篆五人胡昭嚴延年韋昶班固歐陽詢小篆十二人衛覬班固皇象張𢎞許慎韋誕傅𤣥蕭子雲劉紹張𢎞范曄歐陽詢八分三人毛𢎞左伯王獻之𨽻書二十三人衛恆張昶王廙庾翼郗愔王濛衛覬張彭祖阮研陶𢎞景王修王褒王恬李式傅𤣥楊肇王承烈庾肩吾薛稷孫過庭髙正臣釋智果盧藏用行書十八人宋文帝司馬攸釋智永蕭子雲蕭思話齊髙帝陶𢎞景漢王元昌王導王承烈孫過庭髙正臣裴行儉王知敬王修盧藏用薛稷釋智果章草十五人羅暉趙襲徐幹庾翼張超王濛衛覬崔實蕭子雲杜預陸柬之歐陽詢王承烈王知敬裴行儉飛白一人劉紹草書二十五人王導何曽楊肇郗愔庾翼司馬攸李式宋文帝蕭子雲陸柬之宋令文齊髙帝謝朓庾肩吾蕭思話范曄孫過庭梁武帝王知敬裴行儉釋智果盧藏用髙正臣王廙王愔右包羅古今不越三品工拙倫次逮至數百且妙之企神非徒步驟能之仰妙又甚規隨每一書之中優劣為次一品之內復有兼并至如神品則李斯杜度崔瑗皇象衛瓘索靖各惟得其一史籀蔡雍鍾繇得其二張芝得其三逸少子敬竝各得其五考多之類少妙之况神又上下差降昭然可悉也他皆倣此後所傳則當品之內時代次之或有紀名而不評迹者蓋古有其傳今絶其書粗為斟酌列於品第但備其本傳無别商榷然十書之外乃有龜蛇麟虎雲龍蟲鳥之書既非世要悉所不取也神品周史籀宣王時為史官善書師模蒼頡古文夫蒼頡者獨藴聖心啓冥演幽稽諸天意功侔造化德被生靈可與三光齊懸四序終始何敢抑居品列始籀以為聖跡湮滅失其真夲今所傳者才髣佛而已故損益而廣之或同或異謂之為篆亦曰史書加之銛利鉤殺自然機發信為篆文之權輿非至精孰能與於此窮物合數變類相召因而以化成天下也故其稱謂無方亦難得而備舉今妙跡雖絶于世考其遺法肅若神明故可特居神品又作籀文其狀邪正體則石鼓文存焉乃開闔古文暢其戚鋭但折直徑迅有如鏤鐡而端姿旁逸又婉潤焉若取於詩人則雅頌之作也亦所謂楷𨽻曽髙字書淵藪使放小學者漁獵其中籀大篆籀文入神秦李斯楚上蔡人少從荀卿學帝王術西入秦位至丞相胡亥立趙髙譖之要斬夷三族斯妙大篆始省改之以為小篆著蒼頡七篇雖帝王質文世有損益終以文代質漸就澆漓則三皇結繩五帝畫象三王肉刑斯可況也古文可為上古大篆為中古小篆為下古三古為實草𨽻為華妙極於華者羲獻精窮於實者籀斯始皇以和氏之璧琢而為璽令斯書其文今泰山嶧山秦望等碑竝其遺迹亦謂傳國之偉寶百代之法式斯小篆入神大篆入妙也後漢杜度字伯度京兆杜陵人御史大夫延年曽孫章帝時為齊相善章草雖史遊始草書傳不紀其能又絶其迹創其神妙其唯杜公韋誕云杜氏傑有骨力而字畫微瘦崔氏法之書體甚濃結字工巧時有不及張芝喜而學焉轉精其巧可謂草聖超前絶後獨步無雙張芝自謂上比崔杜不足下方羅趙有餘誠則尊師之辭亦其心肺間語伯英損益伯度章草亦猶逸少增减元常真書雖潤色精於斷割意則美矣至若髙深之意質素之風俱不及其師也然各為今古之獨步蕭子良云夲名操為魏武帝諱改為度非也案蔡雍勸學篇云齊相杜度美守名篇漢中郎不應預為武帝諱也崔瑗字子玉安平人曽祖蒙父駰子玉官至濟北相文章蓋世善章草師於杜度㸃畫之間莫不調暢伯英祖述之其骨力精熟過之也索靖乃越制特立風神凛然其雄勇過之也以此有謝於張索一夲云師於杜度媚趣過之㸃畫精微神變無礙利金百錬美玉天姿可謂氷寒於水也袁昂云如危峰阻日孤松一枝王隱謂之草賢晋平苻堅得摹子玉書王子敬云張伯英極似之其遺跡絶少又妙小篆今有張平子碑以順帝漢安二年卒年六十六子玉章草入神小篆入妙張芝字伯英燉煌人父奐為太常徙居𢎞農華隂伯英名臣之子幼而髙操勤學好古經明行修朝廷以有道徵不就故時稱張有道實避世潔白之士也好書凡家之衣帛皆書而後練尤善章草書出諸杜度崔瑗云龍驤豹變青出於藍又創為今草天縱尤異率意超曠無惜是非若清澗長源流而無限縈回崕谷任於造化至於蛟龍駭獸奔騰拏攫之勢心手隨變窈冥而不知其所如是謂達節也已精熟神妙冠絶古今則百世不易之法式不可以智識不可以勤求若達士遊乎沉默之鄉鸞鳳翔乎大荒之野韋仲將謂之草聖豈徒言哉遺迹絶少故褚遂良云鍾繇張芝之迹不盈片素韋誕云崔氏之肉張氏之骨其章草金人銘可謂精熟至極其草書急就章字皆一筆而成合於自然可謂變化至極羊欣云張芝皇象鍾繇索靖時並號書聖然張徑骨豐肌德冠諸賢之首斯為當矣其行書則二王之亞也又善𨽻書以獻帝初平中卒伯英章草草行入神𨽻書入妙蔡雍字伯喈陳留圉人父稜徐州刺史有清行諡直定伯喈官至左中郎將封髙陽侯儀容奇偉篤孝博學能畫又善音律明天文數術災變卒見問無不對工書絶世尤得八分之精微體法百變窮靈盡妙獨步今古又創造飛白妙有絶倫動合神功真異能之士也董卓用天下名士而雍一日七遷光照榮顯顧寵彰著王允誅卓收伯喈付廷尉以獻帝初平三年死於獄中年六十一搢紳諸儒莫不流涕伯喈八分飛白入神大篆小篆𨽻書入妙女琰甚賢明亦工書魏鍾繇字元常潁川長社人祖皓至德髙世父迪黨錮不仕元常才思通敏舉孝廉尚書郎纍遷尚書僕射東武亭侯魏國建遷相國明帝即位遷太傅繇善書師曹喜蔡雍劉德升真書絶世剛柔備焉㸃畫之間多有異趣可謂幽深無際古雅有餘秦漢以來一人而已雖古之善政遺愛結于人心未足多也尚德哉若人其行書則羲之獻之之亞草書則衛索之下八分則有魏受禪碑稱此為最太和四年薨八十矣元常𨽻行入神八分入妙吳皇象字休明廣陵江都人也官至侍中工章草師於杜度先是有張子並於時有陳良輔並稱能書然陳恨瘦張恨峻休明斟酌其間甚得其妙與嚴武等稱八絶世謂沉著痛快抱朴云書聖者皇象懷瓘以為右軍𨽻書以一形而衆相萬字皆别休明章草雖相衆而形一萬字皆同各造其極則實而不朴文而不華其寫春秋最為絶妙八分雄才逸力乃相亞於蔡雍而妖冶不逮通議傷於多肉矣休明章草入神八分入妙小篆入能晋衛瓘字伯玉河東安邑人父覬魏侍郎瓘弱冠仕魏為尚書郎入晋為尚書令善諸書引索靖為尚書郎號一臺二妙時議放手流便過索而法則不如之嘗云我得伯英之筋恆得其骨靖得其肉伯玉采張芝法取父書參之遂至神妙天姿特秀若鴻雁奮六翮飄飄乎清風之上率情運用不以為難後為侍中司空楚王瑋矯詔害之元康元年卒年七十二章草入神小篆𨽻行草入妙索靖字幼安燉煌龍勒人張伯英之𨽻孫父湛北地太守幼安善章草書出於韋誕峻險過之有若山形中裂水勢懸流雪嶺孤松氷河危石其堅徑則古今不逮或云楷法則過於衛瓘然窮兵極勢揚威耀武觀其雄勇欲陵於張何但於衛王隱云靖草書絶世學者如雲是知趣者皆然勸不用賞時人云精熟至極索不及張妙有餘姿張不及索蕭子良云其形甚異又善八分韋鍾之亞毌丘興碑是其遺跡也太安二年卒年六十贈太常章草入神草入妙王羲之字逸少琅琊臨沂人祖正尚書郎父曠淮南太守逸少骨鯁髙爽不顧常流與王承王沉為王氏三少起家祕書郎纍遷右軍將軍㑹稽內史初度浙江便有終焉之志升平五年卒年五十九贈金紫光祿大夫加常侍尤善書草𨽻八分飛白章行備精諸體自成一家法千變萬化得之神功自非造化發靈豈能登峰造極然割析張公之草而濃纖折衷乃愧其精熟損益鍾君之𨽻雖運用增華而古雅不逮至研精體勢則無所不工亦猶鐘鼓云乎雅頌得所觀夫開襟應務若養由之術百發百中飛名蓋世獨映將來其後風靡雲從世所不易可謂冥通合聖者也𨽻行草書章草飛白俱入神八分入妙妻郗氏甚工書有七子獻之最知名元之凝之徽之操之竝工草𨽻凝之妻謝道韞有才華亦善書甚為舅所重獻之字子敬逸少第七子纍遷中書令卒初娶郗曇女離婚後尚新安愍公主無子唯一女後立為安僖皇后后亦善書以后父追贈侍中特進光祿大夫太宰尤善草𨽻幼學于父次習于張後改變制度别創其法率爾私心冥合天矩觀其逸志莫之與京至於行草興合如孤峰四絶迥出天外其峭峻不可量也爾其雄武神縱靈姿秀出臧武仲之智卞莊子之勇或大鵬摶風長鯨噴浪懸崕墜石驚電遺光察其所由則意逸乎筆未見其止蓋欲奪龍蛇之飛動掩鍾張之神氣惜其陽秋尚富縱逸不羈天骨未全有時而瑣人有求書罕能得者雖權貴所逼了不介懷偶其興㑹則觸遇造筆皆發於𠂻不從于外亦由或默或語即銅鞮伯華之行也初謝安請為長史太康中新起太極殿安欲使子敬題榜以為萬世寶而難言之乃說韋仲將題凌雲臺事子敬知其指乃正色曰仲將魏之大臣寧有此事使其若此知魏德之不長安遂不之逼子敬五六嵗時學書右軍潛於後掣其筆不脫乃歎曰此兒當有大名遂書樂毅論與之學竟能極小真書可謂窮微入聖筋骨緊密不減於父如大則尤直而少態豈可同年唯行草之間逸氣過也及論諸體多劣于右軍總而言之季孟差耳子敬𨽻行草章草飛白五體俱入神八分入能或謂小王為小令非也子敬為中書令太康十一年卒於官年四十三族弟珉代居之至十三年而卒年三十八時謂子敬為大令珉為小令妙品秦胡毋敬本櫟陽獄吏為太史令博識古今文字亦與程邈李斯省改大篆著博學篇七章覃思舊章博采衆訓時趙髙為中車府令善史書教始皇少子胡亥書及獄律法令亥私幸之作爰歷篇六章漢興總合為蒼頡篇後漢杜林字北山扶風茂陵人涼州刺史鄴之子位至司空尤工古文過於鄴也故世言小學由杜公嘗於西河得漆書古文尚書一卷寶玩不已每困厄自以為不能濟於亂世常抱經嘆曰古文之學將絶於此初衛密方造林未見則暗然而服及㑹面林以漆書示密曰常以此道將絶何意東海衛君復能傳之是道不墜於地矣子曰德不孤必有鄰豈虛也哉光武建平中卒靈帝時劉陶刪定古文今文尚書號中文尚書以北山本為正陶亦工古文是謂就有道而正焉衛密字次仲東海人官至給事中修古學善屬文作尚書訓指師於杜林後之學者古文皆祖杜林衛密也曹喜字仲則扶風平陵人明帝建初中為祕書郎篆𨽻之工收名天下蔡雍云扶風曹喜建初稱善衛恆云喜善篆小異於李斯邯鄲淳師焉略究其妙韋誕師淳而不及也善懸針垂露之法後世行之仲則小篆𨽻書入妙雖賀彥先沉潛乃青雲之士也劉德升字君嗣潁川人桓靈之時以造行書擅名雖以草創亦豐研美風流婉約獨步當時胡昭鍾繇並師其法世謂鍾繇行押書是也而胡書體肥鍾書體瘦亦各有君嗣之美師宜官南陽人靈帝好書徴天下工書於鴻都門至數百人八分稱宜官為最大則一字徑丈小乃方寸千言甚矜其能性嗜酒或時空至酒家書其壁以售之觀者雲集酤酒多售則鏟去之後為袁術將命巨鹿耿球碑術所立是宜官書也梁鵠字孟皇安定烏氏人少好書受法於師宜官以善八分知名舉孝亷為郎靈帝重之亦在鴻都門下遷幽州刺史魏武甚愛其書常懸帳中又以釘壁以為勝宜官也時邯鄲淳亦得次仲法淳宜為小字鵠宜為大字不如鵠之用筆盡勢也張昶字文舒伯英季弟為黃門侍郎尤善章草家風不墜奕葉清華書類伯英時人謂之亞聖至如筋骨天姿實所未逮若華實兼美可以繼之衛恆云姜孟頴梁孔達田彥和及韋仲將之徒皆張之弟子各有名於世並不及文舒又極工八分況之蔡公長幼差耳華嶽廟前一碑建安十年刋也祠堂碑昶造並書後鍾繇鎮關中題此碑後云漢故給事黃門侍郎華隂張府君諱昶字文舒造此文又題碑頭云時司𨽻挍尉侍中東武亭侯潁川鍾繇字元常書又善𨽻以建安十一年卒文舒章草入妙𨽻入能魏武帝姓曹氏諱操字孟德沛國譙人尤工章草雄逸絶倫年六十六薨張華云漢安平崔瑗子實𢎞農張芝弟昶竝善書而魏武亞焉子植字子建亦工書邯鄲淳字子淑潁川人志行清潔才學通敏初為臨淄王傅纍遷給事中書則八體悉工師於曹喜尤精古文大篆八分𨽻書自杜林衛密以來古文泯絶由淳復著衛恆云魏初傳古文者出於邯鄲淳蔡雍采斯喜之法為古今雜形然精密間理不如淳也梁鵠云淳得次仲法韋誕師淳而不及也袁昂云應規入矩方圓乃成張華云邯鄲淳善𨽻書子淑古文小篆八分𨽻書並入妙胡昭字孔明潁川人少而博學不槩榮利有夷皓之莭甚能史書真行又妙衛恆云昭與鍾繇並師於劉德升俱善草行而胡肥鍾瘦書牘之迹也動見模楷羊欣云胡昭得其骨索靖得其肉韋誕得其筋張華云胡昭善𨽻書茂先與荀勗共整理記籍立書博士置弟子教習以鍾胡為法嘉平二年公車徴㑹卒年八十九孔明𨽻行入妙大篆入能韋誕字仲將京兆人太僕端之子官至侍中服膺於張芝兼邯鄲淳之法諸書並善尤精題署明帝時凌雲臺初成令誕題榜髙下異好宜就加㸃正因致危懼頭鬢皆白既以下戒子孫無為大字楷法袁昂云仲將書如龍拏虎踞劔拔弩張張華云京兆韋誕子熊潁川鍾繇子㑹並善𨽻書初青龍中洛陽許鄴三都宫觀始成詔令仲將大為題署以為永制給御茟墨皆不任用因曰蔡雍自矜能書兼斯喜之法非流紈體素不妄下筆夫工欲善其事必先利其器若用張芝筆左伯紙及臣墨兼此三具又得臣手然後可以建徑丈之勢方寸千言然真迹之妙亞乎索靖也嘉平五年卒年七十五八分𨽻章飛白入妙小篆入能兄康字元將亦工書子熊字少季亦善書時人云名父之子不有二事世所美焉嵇康字叔夜譙國銍人官至中散大夫奇才不羣身長七尺八寸而土木形骸不自藻飾未嘗見其疾聲朱顔人以為龍章鳳姿天質自然恬靜寡欲學不師受博覽該通以為君子無私心不惜乎是非而行不違乎道叔夜善書妙於草製觀其體勢得之自然意不在乎筆墨若髙逸之士雖在布衣有傲然之色故知臨不測之水使人神清登萬仞之巖自然意逺鍾㑹譖康就刑年四十四太學生三千人請為師不許鍾㑹字士季元常少子官至司徒咸熙元年衛瓘誅之年四十書有父風稍備筋骨美兼行草尤工𨽻書遂逸致飄然有凌雲之志亦所謂劔則干將莫耶焉㑹嘗詐為荀朂書就勗母鍾夫人取寶劒㑹兄弟以千萬造宅未移居勗乃潛畫元常形像㑹兄弟入見便大感慟勗畫亦㑹之類也㑹𨽻行草章草入妙吳處士張𢎞字敬禮吳郡人篤學不仕恆著烏巾時號張烏巾并善篆𨽻其飛白妙絶當時飄若雲遊激如驚電飛仙舞鶴之態有類焉自作飛白序勢備說其美也歐陽詢曰飛白張烏巾冠世其後逸少子敬亦稱妙絶敬禮飛白入妙小篆入能晋張華字茂先范陽人父平後漢漁陽太守茂先官至司空壯武公博涉羣書盈萬餘卷髙才達識天文數術無所不精善章草書體勢尤古度德比義嵇叔夜之倫也衛恆字巨山瓘之仲子官至黃門侍郎瓘嘗云我得伯英之筋恆得其骨巨山善古文得汲冡古文論楚事者最妙恆嘗玩之作四體書勢并造散𨽻書元康中楚王瑋害之年四十古文章草草書入妙𨽻入能弟宣善篆及草名亞父兄宣弟庭亦工書子仲寶叔寶俱有書名四世家風不墜也衛夫人名鑠字茂猗廷尉展之女弟恆之從女汝隂太守李矩之妻也𨽻書猶善規矩鍾公云碎玉壺之氷爛瑶臺之月婉然芳樹穆若清風右軍少常師之永和五年卒年七十八子充為中書郎亦工書先有扶風馬夫人大司農皇甫規之妻也有才學工𨽻書夫人寡董卓聘以為妻夫人不屈卓殺之王廙字世將琅琊臨沂人祖覽父正尚書郎導從父之弟也官至平南將軍荆州刺史侍中逸少之叔父工於草𨽻飛白祖述張衛遺法自過江右軍之前世將書與荀勗畫為明帝師其飛白志氣極古垂雕鶚之翅羽類旌旗之卷舒時人云王廙飛白右軍之亞永昌元年卒年四十七世將飛白入妙𨽻入能郗愔字方回髙平金鄉人父鍳太尉草書卓絶古而且徑方回官至司空善衆書雖齊名庾翼不可同年其法遵於魏氏尤長於章草纖能得中意態無窮筋骨亦勝王僧䖍云郗愔章草亞於右軍太元六年卒年七十二方回章草入妙草𨽻入能妻傅氏善書子超字景興小字嘉賔亦善書王洽字敬和導第四子理識明敏拜駙馬都尉纍遷中書令書兼諸法於草尤工落簡揮毫有郢匠乘風之勢雖卓然孤秀未至運用無方而右軍云弟書遂不減吾飾之過也升平三年卒年四十四敬和𨽻行草入妙妻荀氏亦善書謝安字安石陳郡陽夏人十八徴著作郎辭疾寓居㑹稽與王逸少許詢桑門支遁等遊處十年纍遷尚書僕射太元十年卒贈太傅諡文靖公年六十六人皆比之王導謂文雅過之學草正於右軍右軍云卿是解書者然知解書者尤難安石尤善行書亦猶衛洗馬風流名士海內所瞻王僧䖍云謝安得入能書品録也安石𨽻行草入妙兄尚字仁祖弟萬字萬石竝工書王珉字季琰洽之少子官至中書令工𨽻及行草金劒霜斷崎嶔歷落時謂小王之亞也自導至珉三世善書時人方之杜衛二氏嘗書四匹素自朝操筆至暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸欲度驊騮前斯可謂弓善矢良兵利馬疾突圍破的難與爭鋒𨽻行入妙妻汪氏善書兄珣亦善書桓𤣥者溫之子為義興太守篡晋伏誅嘗慕小王善於草法譬之於馬則肉翅已就蘭筋初生畜怒而馳日可千里洸洸赳赳實亦武哉非王之武臣即世之刺客列缺吐火共工觸山尤剛健倜儻夫水火之性各有所長火能外光不能內照水能內照不能外光若色五行之性則可謂通矣嘗與顧愷之論書至夜不倦愷之字長康善書小名虎頭時人號為三絶癡書畫也彥逺案長康三絶者才絶畫絶癡絶書非癡數也宋文帝姓劉諱義隆彭城人武帝第三子善𨽻書次及行草規模大令自謂不减於師雖庶幾德音引領長望尚遼逺矣然才位發揮亦可謂倬彼雲漢為章于天時論以為天然勝羊欣工夫恨少是亦天然可尚道心唯微探索幽逺若泠泠水行有巖石間真聲帝𨽻書入妙行草入能羊欣字敬元泰山南城人官至中散大夫義興太守師資大令時亦衆矣非無雲塵之逺若親承妙㫖入於室者唯獨此公亦猶顔回與夫子有步驟之近摵若嚴霜之林婉似流風之雪驚禽走獸絡繹飛馳亦可謂王之藎臣朝之元老沈約云敬元尤善於𨽻書子敬之後可以獨步時人云買王得羊不失所望今大令書中風神怯者往往是羊也元嘉十九年卒年七十三敬元𨽻行草入妙時有邱道護親師於子敬殊劣於羊欣謝綜亦善書不重敬元亦憚之云力少媚好又有義興康昕與南州惠式道人俱學二王轉以已書貨之世人或謬寶此迹亦或謂為羊歐陽通云式道人右軍之甥與王無别薄紹之字敬叔丹陽人官至給事中善書憲章小王風格秀異若干將出匣光芒射人魏武臨戎縱橫制敵其行草倜儻時越羊欣若用力取之則真正懸隔敬叔𨽻行草入妙謝靈運㑹稽人祖𤣥父煥靈運官至祕書監侍中康樂侯模憲小王真草俱美石藴千年之色松低百尺之柯雖不逮師歙風吐雲簸蕩川嶽其亦庶幾虞和云靈運子敬之甥故能書特多王法王僧䖍云子敬上表多在中書雜事中靈運竊寫易其真本相與不疑元嘉初帝就索始進親聞文皇說此元嘉十年年四十九以罪棄廣州市𨽻草入妙孔琳之字彥琳㑹稽山隂人父廞彥琳官至祠部尚書善草行師於小王稍露筋骨飛流懸勢則吕梁之水焉時稱曰羊真孔草又以縱快比於桓𤣥王僧䖍云孔琳之放縱快利筆迹流便二王已後略無其比但工夫少太自任故當劣於羊欣斯言俞矣景平元年卒年五十五行草入妙妻謝氏亦善書齊王僧䖍琅琊臨沂人曽祖洽父曇首官至司空善書宋文帝見其書素扇嘆曰非唯迹逾子敬方當器雅過之後孝武欲擅書名僧䖍不敢顯跡大明之世常用拙筆書以此見容虞和云僧䖍尋得書術雖不及古不减郤家所制然述小王尤尚古宜有豐厚淳朴稍乏妍華若溪澗含氷岡巒被雪雖甚清肅而寡於風味子曰質勝文則野是之謂乎永明三年卒僧䖍𨽻行入妙草入能一本云𨽻行草入妙子慈亦善𨽻書謝超宗嘗問慈曰卿書何當及虔公慈曰我之不得仰及猶雞之不及鳳時人以為名答張融字思光吳郡人祖禕父暢思光官至司徒左長史博涉經史早標孝行書兼諸體於草尤工而時有稽古之風寬博有餘嚴峻不足可謂有文德而無武功然齊梁之際殆無以過或有鑑不至深見其有古風多誤寶之以為張伯英書也而搨夲大行于世梁蕭子雲字景喬晋陵人父嶷景喬官至侍中少善草行小篆諸體兼備而創造小篆飛白意趣飄然㸃畫之際若有騫舉妍妙至極難與比肩但少乏古風抑居妙品故歐陽詢云張烏巾冠世其後逸少子敬又稱絶妙爾飛而不白蕭子雲輕濃得中蟬翼掩素遊霧崩雲可得而語其真草少師子敬晚學元常及其暮年筋骨亦備名蓋當世舉朝效之其肥鈍無力者悉非也今之謬賞十室九焉梁武帝擢與二王並迹則若牝雞仰於鸞鳳子貢賢於仲尼雖絶唱於彼朝未曰陽春白雪以太清三年卒景喬𨽻書飛白入妙小篆行草章草入能子特字世達亦善書位至太子舍人先景喬卒阮研字文幾陳留人官至交州刺史善書其行草出於大王甚精熟若飛泉交注奔競不息時稱蕭陶等各得右軍一體而此公筋力最優比之於勇則被堅執鋭所向無前喻之於談則緩頰朵頤離堅合異有李信王離之攻伐無子貢魯連之變通其𨽻則習於鍾公風神稍怯庾肩吾云阮居今觀古窺衆妙之門雖師王祖鍾終成别搆一法矣然遲速之對可方於陸柬之則意此公性急亦猶枚臯文章敏疾長卿製作淹遲各一時之妙也行草入妙𨽻書入能陳永興寺僧智永㑹稽人師逺祖逸少歷記専精攝齊升堂真草唯命夷途良轡大海安波微尚有道之風半得右軍之肉兼能諸體於草最優氣調下於歐虞精熟過於羊薄智永章草草書入妙𨽻入能兄智楷亦工草丁現亦善𨽻書時人云丁真楷草皇朝歐陽詢長沙汨羅人官至銀青光祿大夫率更令八體盡能筆力徑險篆體尤精髙麗愛其書遣使請焉神堯嘆曰不意詢之書名逺播夷狄彼觀其迹固謂其形魁梧耶飛白冠絶峻於古人有龍蛇戰鬭之象雲霧輕濃之勢風旋電激掀舉若神真行之書雖於大令亦别成一體森森焉若武庫矛㦸風神嚴於智永潤色寡於虞世南其草書迭蕩流通視之二王可為動色然驚竒跳駿不避危險傷於清雅之致自羊薄以後略無勍敵唯永公特以訓兵精練議欲旗鼓相當歐以猛鋭長驅永乃閉壁固守以貞觀十五年卒年八十五飛白𨽻行草入妙大小篆章草入能子通亦善書瘦怯於父薛純陀亦效詢草傷於肥鈍乃通之亞也虞世南字伯施㑹稽餘姚人祖儉梁始興王咨議父荔陳太子中庶子世南受業於吳郡顧野王門下讀書十年國朝拜銀青光祿大夫祕書監永興公太宗詔曰世南一人有出世之才遂兼五絶一曰忠讜二曰友悌三曰博文四曰詞藻五曰書翰有一於此足為名臣而世南兼之其書得大令之宏規含五方之正色姿榮秀出智勇在焉秀嶺危峰處處間起行草之際尤所偏工及其暮齒加以遒逸臭味羊薄不亦宜乎是則東南之美㑹稽之竹箭也貞觀十二年卒年八十一伯施𨽻行書入妙然歐之與虞可謂智均力敵亦猶韓盧之追東郭㕙也論其衆體則虞所不逮歐若猛將深入時或不利虞若行人妙選罕有失辭虞則內含剛柔歐則外露筋骨君子藏器以虞為優族子纂書有叔父體則而風骨不繼楊師道上官儀劉伯莊竝立師法虞公過於纂矣張志遜又纂之亞也褚遂良河南陽翟人父亮銀青光祿大夫太常卿遂良官至尚書左僕射河南公博學通識有王佐才忠讜之臣也善書少則服膺虞監長則祖述右軍真書甚得其媚趣若瑶臺青鎖窅映春林美人嬋娟不任羅綺增華綽約歐虞謝之其行草之間即居二公之後顯慶四年卒年六十四遂良𨽻行入妙亦嘗師授史陵然史有古直傷於疏瘦也陸柬之吳郡人官至朝散大夫太子司議郎虞世南之甥少學舅氏臨寫所合亦猶張翼換羲之表奏蔡雍為平子後身而晚習二王尤尚其古中年之迹猶有怯懦總章已後乃備筋骨殊矜質朴恥夫綺靡故欲暴露疵同乎馬不齊髦人不櫛沐雖為時所鄙回也不愚拙於自媒有若通人君子尤善運筆或至興㑹則窮理極趣矣調雖古澀亦猶文王嗜昌蒲葅孔子蹙頞而嘗之三年乃得其味一覽未窮沉研始精然工於效倣劣於獨斷以此為少也𨽻行入妙章草書入能一本云𨽻行草章草並入能法書要録卷八
