body:
  text: 法書要録卷五唐張彦逺撰述書賦上前檢校刑部員外郎竇臮撰檢校國子司業竇蒙注定古者造書契代結繩初假逹情浸乎競美自時厥後迭代沿革樸散務繁源流遂廣漸備楷法區别妍蚩洎于我唐天寶末國有宼難府庫傾覆散墜閭閻而興復京都所司徴購得其歸者盖寡矣余至徳中徃徃偶見袪積年之遐想該此生之新觀雖欣鄙夫之幸遇實為吾君之痛惜恨沉草莽上逹無階因記彼而固求願沽諸而善價然為監臨動静公私貿遷徒暫披翫終歸他室今記前後所親見者并今朝自武徳以來迄于乾元之始翰墨之妙可入品流者咸亦書之周一人史籒秦一人李斯漢二人蔡邕杜操魏五人韋誕虞松司馬師司馬昭鍾㑹吳二人皇象賀邵晉六十三人齊獻王元帝成帝康帝孝武帝武陵王會稽王楊肇山濤嵇康張翰蔡克顧榮劉琨孔侃孔瑜陶侃熊逺應詹卞壼劉超謝藻庾亮庾懌庾翼庾凖郗鑒郗愔郗曇郗超郗儉之郗恢謝尚謝奕謝安王導王劭王珉王羲之王獻之王廞王濛王述丁潭何充劉訥劉惔張澄劉璞張翼桓温桓𤣥江灌沈嘉劉瓌之劉廞范汪范寗諸葛長民劉穆之温放之楊羲宋珽宋二十五人武帝文帝孝武帝明帝南平王海陵王謝靈運謝方明張茂度張永羊欣孔琳之薄紹之王敬𢎞王思𤣥顔竣垣護之駱簡蕭思話龎秀之巢尚之裴松之徐爰江僧安賀道力齊十五人齊髙帝武帝竟陵王褚淵褚賁徐孝嗣王僧䖍王慈王志王儉劉撝顧寶光胡諧之徐希秀張融梁二十一人武帝簡文帝邵陵王孝元帝蕭確蕭子雲王克陸杲任昉傅昭朱异王籍殷鈞阮研王褒蕭特庾肩吾陶𢎞景江蒨周𢎞讓范懐約陳二十一人武帝文帝煬帝沈后新蔡王廬陵王永陽王桂陽王釋智永智果江總徐陵沈君理袁憲毛喜蔡景厯蔡徴顧野王伏知道謝嘏賀朗北齊一人外五代祖劉珉隋五人劉𤣥平房彦謙盧昌衡趙文深趙孝逸唐四十五人神堯皇帝文武聖皇帝則天武后睿宗開元皇帝漢王元昌岐王元範李懐琳歐陽詢歐陽通虞世南虞纂虞煥褚遂良陸東之薛稷房𤣥齡殷仲容王知敬王紹宗孫過庭張旭賀知章徐嶠之徐浩李造韓擇木田琦衛包蔡有隣鄭遷李權李樞李平鈞王維王縉史惟則李陽冰家舅繪姨兄明若山宋璆蕭誠張從申吕向長兄蒙馬氏妻劉秦妹等應親見者所言並錯綜優劣直道公論或理盡名言即外假興喻雖闕標舊品而畢寄斯文刋訛誤於形聲定目存於指掌其所不覩空居名額并世所𫝊搨者不敢憑推一皆略焉其詞曰嘗考古而閲史病賤目而貴耳述勲庸而任人揮翰墨而由己則知親矚延想如見君子量風雅之足憑奚卷舒之能己古猶今也斯得美矣雖六藝之末曰書而四人之首曰士書資士以為用士假書而有始豈特長光價於一朝適容貎於千里王羲之書蕺山姥竹角扇五字字索百錢人競買去梁元帝書亦云千里之面首轉覺為能矣篆則周史籒秦李斯漢有蔡邕當代稱之俱遺芳刻石永播清規籒之狀也若生動而神憑通自然而無涯逺則虹紳結絡邇則瓊樹離披斯之法也馳妙思而變古立後學之宗祖如殘雪滴溜映朱檻而垂氷蔓木含芳貫緑林以直繩伯喈三體八分二篆棨㦸彎弧電轉星散纎逾植髪峻極層巘周秦漢之三賢余目驗之所先石雖貞而云亡紙可寄而保𫝊史籒周宣王時史官著大篆教學童岐州雍城南有周宣王獵碣十枚並作鼓形上有篆文今見打本吏部侍郎蘇朂敘記卷首云世咸言筆蹟存者李斯最古不知史籒之迹近在闗中即其文也李斯上蔡人終秦丞相作小篆書嶧山碑後其石毁失土人刻木代之與斯石上本差稀又至徳中安史敗後四從弟沼于河陽清水渠下得傳國璽其文曰受命于天既夀永昌㸃書皆隠起作龍鳥狀側文小篆曰魏所受漢傳國璽背上蟠螭一角折鼻尖有黄疵瑕按騐譜牒乃無差舛云斯所書蔡邕字伯喈陳留人終後漢左中郎將今見打本三體石經四紙石既尋毁其本最稀惟稜雋及光和等碑時時可見草分章體肇起伯度時君重而立名自我存而作故掣波循利創質畜怒杜操字伯度京兆人終後漢齊相章帝貴其蹟詔上章表故號章草今見章草書五行魏之仲將奮藻獨歩或迸泉湧溢或錯玉班賦蹟遺情忘契入神悟然而負才藝履危懼膏明自煎鬢髪改素生非其代痛惜不過名徴格髙復見叔茂體裁簡約肌骨豐嫮如空凝斷雲水泛連鷺韋誕字仲將京兆人終魏光禄大夫時凌雲臺成先誤釘牓明帝使誕坐籠以鹿盧引上就書去地二十五丈及下鬢髪皓然虞松字叔茂會稽人終魏中書令大司農今見𨽻紙草書具姓名一紙十一行也挹子元之瓌蹟髙子上之雄神量藴文儒才苞古真或寄詞達禮任道懐仁或仰則鍾繇平視衛臻如晴郊駟馬維岳降神司馬師字子元河内人終魏録尚書事大司馬忠武公及炎受禪追尊曰景皇帝今見正書帶名一紙一十二行弟昭字子上終魏相國録尚書事封文王追尊文皇帝今見正書具姓名兩紙共一十二行觀士季之軌轍審鍾家之超越將遺古而偕能與象賢而蹈拙如後生之可畏實氣盖於前哲鍾㑹字士季潁川人繇子終魏征西將軍今見帶名行書一紙八行吳則廣陵休明朴質古情難以窮真非可學成似龍蠖蟄啓伸盤復行皇象字休明廣陵人終侍中吳青州刺史今見帶名章草帖一表七行并寫春秋哀公上第二十九卷首元年餘自二年至十三年盡尾足其紙每一大幅有一縫線聫合之六元凱押尾云此是蠒紙𦂳薄有脉似樺皮以諸蠒比類殊有異者也賀氏興伯同時共體瘠而不疎逸而寘禮等殊皇賀品類兄弟賀邵字興伯吳興人終吳太子太傅見章草書帶名一帖五行司馬氏之受禪炎為帝祖偉哉齊王手蹟目覩翰墨之外仁賢是優重則突兀嵩華輕則參差斗牛司馬攸字大猷文帝第二子武帝弟封齊獻王官至侍中大司馬今見正書帶名凡四叚共三紙書有痛惜羊祜之言晉姓司馬國犯先諱不言晉也逮乎龍化東遷景文興嗣天然俊傑毫翰英異元帝之用筆可觀世瑜之呈規仰似如發硎刃虎駭鶚眙懦夫䘮精劍客得志元帝諱睿字景文東朝中興之主當東遷謡曰五馬浮渡江一馬化為龍即其人也今見潜潤正書具姓名一紙七行兼雜批約有十處成帝則生知草意頴悟通諳光使畏魄青疑過藍勁力外爽古風内含若雲開而乍覩旭日泉落而懸歸碧潭成帝諱衍字世禄元帝孫明帝子庾氏内今見草批謝草張澄啓七行康帝則幼少閑慢迥出凡境駟馬安車不尚馳騁康帝諱岳字世同成帝弟今見行書批劉訥啓四紙共七行真率孝武不規不矩氣有餘髙體無所主若露滋蔓草風送驟雨孝武帝諱曜字昌明簡文子今見行書一紙又兩帖等雜批六處共有二十一行也赳赳道叔逺淳邇俗全姓名而孰多議風度而不足元子憚其威武吾徒遵其軌䠱武陵王諱晞字道叔明帝弟今見具姓名正書一紙三行道子雅薄綿密纎潤露輕藏沈假曲躡峻猶尺水之含衆象小山之擬萬仞㑹稽王道子孝武帝子今見具姓名行書一紙凡七行季初則隠姓名展纎勁寫搨共𫝊賞能之盛猶鋸牙鉤爪超越陷穽楊肇字季初滎陽人晉荆州刺史今見草書一紙十行有古署榜無姓名今共𫝊搨之巨源正書朴略仍餘染翰忘筌寄情得魚若披堅草澤匿鋭茅廬山濤字巨源河内人晉侍中司徒今見正書帶名一帖四行叔夜才髙心在幽憤允文允武令望令問精光照人氣格凌雲力舉巨石芳逾衆芬嵇康字叔夜譙國人晉中散大夫今見帶名行書一紙五行季鷹有聲古貎磅礴雖無名驗攀附張索芝靖如凝隂斷雲垂翅一鶚張翰字季鷹吳郡人晉大司馬掾今見草書一帖三行有古榜口滿騫押尾子尼簡約片月孤峰千歲之下森森古容蔡克字子尼陳郡人晉成都王掾子謨過江食蟹遇毒者本朝尚書僕射今見帶名草書一帖四行彦先尚質無而不有猶崆峒之上世俗誰偶顧榮字彦先吳郡人晉驃騎將軍今見草書帶名三帖共有一十二行越石偉度粃糠翰墨如伐樹而愛人似問鼎而在徳劉琨字越石中山人晉太尉今見行書半紙具姓名五行敬思敬康二孔殊芳思行則輕利峭峻類驚虬逸駿康草則古質鬱紆如落翮摧枯孔偘字敬思會稽人晉大司農今見具姓名行書一紙七行孔瑜字敬康㑹稽人車騎將軍今見具姓名一紙三行雍容士行季孟公旅肌骨閑媚精神慢舉如辭山登朝混迹雜處陶侃字士行秣陵人晉侍中大將軍今見帶名正書一紙十行孝文剛斷謹正援毫古雖拙利今稱且髙如貴胄之躍駿武賁之操刀熊逺字孝文豫章人晉大將軍長史今見具姓名正書啓七紙思逺則藁草懸解筆墨無在真率天然忘情罕逮猶羣雀之飛廣厦小魚之戲大海應詹字思逺汝南人晉鎮南大將軍今見草表帶名二紙共一十七行望之之草𦂳古而老落紙筋槃分行羽抱如充仞多士交連雜寶卞壼字望之濟隂人晉侍中驃騎大將軍今見帶名草書一紙共六行體大法殊實推世踰禀天然而自強亂帝札而見拘猶朝廷㝛舊年徳相趨劉超字世踰瑯琊人晉衛尉零陵忠侯今見帶名正書一帖三行超手筆與元帝相類自職居近密遂絶其與外人所交之書也叔文法鍾纎薄精練用筆雖巧結字未善似漸陸之遵鴻等窺巢之乳鷰謝藻字叔文㑹稽人晉中書侍郎今見具姓名正書啓兩叚合為一紙五行其半先在官半在外及得之勘合如一得新故異也博哉四庾茂矣六郗三謝之盛八王之奇至如強骨慢轉逸足難追斷蓬征蔓葛垂任縱盤薄是稱元規庾亮字元規潁川人晉太尉今見草書五紙行帖共八行具姓名草書又一紙十一行遺古效鍾叔豫髙蹤雖穏密而傷浮淺猶葉公之愛畵龍庾懌字叔豫潁川人晉衛將軍今見正行書帶名一紙四行積薪之美更覽稚恭名齊逸少墨妙所宗善草則鷹搏隼擊工正則劍鍔刀鋒愧時譽之未盡覺知音而罕逢其荒蕪快利彦祖為容似較狡於大野任平陂之所從庾翼字稚恭晉車騎將軍今見草書四紙共二十六行具姓名正書一帖三行懌與翼並是亮弟庾凖字彦祖希子亮孫晉豫州刺史今見具姓名草書一紙凡八行道徽之豐茂宏麗下筆而剛决不滯揮翰墨而厚實深沉等漁父之乗流鼓枻髙平奕葉盛徳遺能方囘重熙接翼嗣興囘則章健草逸發體廉稜若冰釋泉湧雲奔龍騰密壯奇姿撫蹟重熙若投石㧞距怒目揚眉景興當年曷云世乏正草輕利脱略古法蹟因心而謂何為吏士之所多惜森然之俊爽嗟薎爾於中和處約道允家之後俊狂草勢而兄優謹正書而弟潤俱始登於學次慙一虧於九仞郗鑒字道徽髙平人也晉太宰今見草書三紙共十七行郗愔字方囘曇字重熙並鑒子愔晉司空見章草書寫父雜表一首四十三行草書八紙曇晉中郎將今見具姓名草書一紙四行郗超字景興愔子晉臨海太守今見具姓名行草書共四紙郗儉之字處約晉太子率更令今見具姓名草書兩紙郗恢字道允晉鎮軍將軍今見具姓名草書及行書共兩紙處約道允並是曇子謝氏三昆尚草特峻猶注飛澗之瀑溜投全牛之虚刃達士逸蹟乃推無奕毫翰云為任興所適能事雅量末歸安石至夫藴虚靜善草正方圓自窮禮法拘性猶恒徳之仁智應物之龜鏡恨其心懼景興書輕子敬塞盟津而捧土損智力有餘病謝尚字仁祖陳郡人晉散騎常侍今見具姓名草書一紙六行謝奕字無奕晉鎮西將軍今見帶名行書一紙六行謝安字安石尚弟晉侍中太傅今見具姓名正書二紙三十行安得獻之書時斷作紙夾焉業盛瑯琊茂宏厥初衆能之一乃草其書將以潤色前範遺芳後車風稜載蓄髙利有餘類賈勇之武士等相驚之戲魚有子敬倫蹟存目驗以古窺今調渉浮豔尚期羽翼鴻漸芝蘭香染與兄搨而弟真將奢也而寧儉繩繩宜爾傑出季琰露鋒芒而豁懐傍禮樂而無撿猶摶扶揺而坐致超峻極而非險王𨗳字茂宏瑯琊人晉丞相謚曰文獻公今見具姓名草書兩紙共六行王劭字敬倫即導子晉車騎將軍今見具姓名草書一紙六行兄即恬洽不見真蹟洽子珉字季琰晉中書令今見具姓名草書一紙凡八行然則窮極奧㫖逸少之始虎變而百獸跧風加而衆草靡肯綮遊仞神明合理雖興酣蘭亭墨仰池水武未盡善韶乃盡美猶以為登泰山之崇髙知羣阜之迤邐逮乎作程昭彰褒貶無方穠不短纎不長信古今之獨立豈末學而能揚幼子子敬創草破正雍容文經踴躍武定態遺妍而多狀勢繇已而靡罄天假神憑造化莫竟象賢雖乏乎百中偏悟何慙乎一聖斯二公者能知方祁氏之奚午天性近周家之文武誠一字而萬殊且含規而孕矩然而真蹟之稱獨標俁俁忘本世心余所不取何哉且得于書法失于背古是知難與之渾樸言可以為礲斲主矣王羲之字逸少晉右軍將軍前後多見行草書唯正書世上稀絶幼子獻之字子敬晉中書令今世上多見行書獨歩不可具舉蹟書之書稱二王輙加真字之餘雖超越者並通謂之絶跡盖俗學之意也温温伯輿亦扇其風風流之表軒冕之中骨體慢正精彩冲融已髙天然恨乏其功如承奕葉之貴胄備夙訓之神童王廞字伯輿即導孫薈子晉司徒左長史今見帶名草書一紙七行奧若太原之英二子間生仲祖慕元常之則懐祖通文獻之情方言慕而我愧言慕鍾繇比叔文而彼榮比叔文即謝藻習所通而不及言通王導叅放之而先鳴叅温放之結束體正肆力專成猶棟梁富於合抱巧匠斲而未精即王濛也髙利迅薄連屬欹傾猶鳥避羅而勢側泉激石而分横即王述也王濛字仲祖太原人晉金紫光禄大夫今見具姓名正書一紙二行王述字懐祖太原人晉尚書令藍田侯今見具姓名草書一紙三行若夫反古不忘吾推世康似無逸少如禀元常猶落太階之蓂莢掇祕府之芸芳丁潭字世康會稽人固孫彌子晉散騎常侍今見正草書各一紙共十行次道淳實寡於風彩自是雄姿翰墨具在如士大夫之京華遊處叅貴胄而膚質未改何充字次道廬江人庾亮舅晉侍中司空今見帶名行書三行行仁靡雜唯鍾是師悦端閑於髙軌能終始於清規雖帶偏薄亦能隣幾若鳳雛始備於五彩長松僅攀乎一枝劉訥字行仁瑯琊人晉散騎常侍今見康帝啓四紙共有三十五行也真長則草含稚恭之厚爽正邇越石之羈束輕浮森峭穠媚藻縟落衆木於秋杪狎群鷗於水曲劉惔字真長沛郡人晉丹陽尹今見具姓名行書及草各一帖共六行國明勵躬鍾氏餘風壯利纎薄守雌知雄如道門之子仙路時通張澄字國明吳郡人嘉之子晉光禄大夫今見咸康八年帶名正書上成帝啟一紙七行猗歟子成徇蹟過名正𨽻敦實藁草沈輕元常髙風雖疎復呈猶不考擊之鐘鼓含律吕之音聲劉璞字子成南陽人晉光禄勲即得道南岳魏夫人之子夫人魏舒女父義晉河内修武令今見具姓名行書及草兩紙共二十行君祖馳馭藝忝令譽窮正驗草而罕逮其能作偽亂真而未可為據正企鍾而悠邈草師王而莫著與夫敬仁道群王修江灌或㧞茅以連茹猶鋭意鵬舉致身鷹翥張翼字君祖下邳人晉東海太守時穆帝令翼寫王右軍手表帝自批後右軍殆不能别久乃悟云小人幾欲亂真今見具姓名正草書總三帖共十六行元子正草厚而不倫若遺翰墨猶帶真淳似山林之樂道非玉帛之能親桓温字元子譙國人彛子晉丞相大司馬南郡宣武公今見具行草書帶名四紙共三十行敬道耽翫鋭思毫翰依憑右軍志在淩亂草狂逸而有度正疎澀而猶憚如浴鳥之畏人等驚波之泛岸桓𤣥字敬道温子厯晉義興太守自署丞相僣號曰楚今見帶名正行草書總十紙共六十行道群閑慢氣格自充始習新制全移古風與伯輿之合極王廞若子敬之童蒙猶富禮樂之世胄備神彩於厥躬江灌字道群陳留人晉侍中中䕶軍今見帶名行書一紙七行長茂草勢既㨗而疎慕王不及獨斷所如猶鷙鳥擊搏而失中因蹭蹬於古墟沈嘉字長茂吳郡人晉吳興太守今見具姓名草書共三行元寶剛直兩王之次骨正力全軌範宏麗淩突子敬病於輕肆同變武而習文若訪龍而獲驥劉瓌之字元寶沛國人晉御史中丞義城伯今見帶名行書九行季舒纎勁循古有禮遇稀難評唯署一啓劉廞字季舒㑹稽人晉光禄大夫今見書名啓一紙也順陽筆精吾見𤣥平近瞻元常俯視國明張澄利且掩薄能多似生如班輸之運斧乏棟梁以經營范汪字𤣥平順陽人晉安北將軍今見具姓名正書謝䁑𤓰啓四行矣武子正筆頗全古質去凡忘情任樸不失猶髙人之與釋子志繇道而秉律范寗字武子汪子晉中書侍郎今見帶名正書啓三紙共二十一行長民則全效子敬便於性分宏逸生於天機衆妙總而獨運凌所師而小薄壯若已而不紊猶豁其流而氷開殷其響而雷奮諸葛長民瑯琊人晉輔國將軍宣城内史今見具姓名行書一紙六行道和閑雅離古躡真慢正繇徳髙蹤絶塵若昂藏博逹之士謇諤朝廷之臣劉穆之字道和東莞人晉侍中司徒今見具姓名行書一紙六行放之率爾草健筆力豈忘保持足見凖則猶片錦呈巧細流不極温放之太原人嶠子晉黄門侍郎今見草書具姓名二行楊真人之正行兼淳熟而相成方圓自我結構遺名如舟楫之不繫混寵辱以若驚真人諱羲𢎞農人今見行書帶名六行宋珽訛𦂳足光利用習古者或以為輕日新者必因而重猶樸散而分形器務成而立賦頌宋珽廣平人晉相府參軍今見行書具姓名凡四行宋武徳輿法含古初見荅道和之啓未披有位之書觀其逸毫巨麗載兆虎變髙躅莫究其涯雄風於焉已扇猶金玉鑛璞包露貴賤劉裕字徳輿彭城人翹子晉太尉中書監封宋公後受禪稱宋武帝今見帶名批劉穆之啓兩紙共六行矣皇矣文帝天知正𨽻舉已逹於縱横攀王媚於𦂳細獻之向精専而習熟幾可與之興替尚瞻擊水之鵬摶且並聞天之鶴唳文帝諱義隆武帝第三子今見帶名正行書兩帖共七行雜批五處共有二十行也孝武則武威戡難翰墨馳聲雖禀訓而已髙恨一簣而未成徒忌人之賢已異及父之令名王僧䖍書用拙筆以自容與思話而雄強追彦琳而愧耻蕭思話孔琳之若夷狄之佳麗慕顔容於桃李孝武帝諱駿字休龍文帝第三子今見帶名正書啓十行又行書都四紙共十三行太宗徽音用壯之心遺棄鄙野不無髙深快突俗工匠古隣今冠柤梨之下果怯鸞鳳之珍禽明帝諱彧字休炳孝武帝弟今見帶名行書四紙并批雜啓等共八行也南平休𤣥筆力自全幼齒結構老成天然比夫鳥在鷇龍潜泉符彩卓爾文詞粲然南平王鑠字休𤣥文帝第四子今見帶名啓正書兩行休茂尚冲已工法則長於用筆結字短於精神骨力性靈可觀運用未極猶鳬雛鵠子初備羽翼海陵王休茂文帝第十四子今見正書帶名啓四行姚懐珍押尾後見三謝兩張連輝並俊若夫小王風範骨秀靈運快利不拘威儀或擯猶飛湍激矢電注雷震謝靈運陳郡人宋侍中秘書監今見帶名行書七行方明寛和隠媚且潤如幽閑女徳禮教士𦙍謝方明陳郡人惠連父宋㑹稽太守今見帶名正書籖三行也茂度逸翰景初清規或大言而峻薄景初對文帝云臣恨二王不得臣之體或寡譽而﨑奇王僧䖍書用拙筆以自容並心輕兩王蹟及宗師擬鶴鳴而子和殊鯉退而學詩張茂度吳郡人敞子宋㑹稽太守今見具姓名行草書兩紙共十行張永字景初茂度子宋征西將軍今見正行草書五紙共三十行矣敬元則親得法於子敬雖時移而間出手稽無方心敏奧術虚薄而不忘本分縱横而粗得師骨遇其合時髣髴唐突猶圖騏驥而莫展塑真仙而非實爾後王羊謬同衆靡餘風彦琳敬叔允執厥中孔則愈於𦂳速病於乾偏超舉之餘窺羊及肩猶蓬瀛心想濩武風𫝊競其豐利又覩薄氏纎圓克成骨力猶稚精彩潤密乃誠莫貳掩友凌師抑亦其次雖鍮無金價而珉實玉類羊欣字敬元泰山人不疑子宋中散大夫與邱道䕶同授獻之筆法今見正行草具姓名書二十餘紙凡六七卷所言王羊謬同諺云買王得羊不失所望言虚也孔琳之字彦琳㑹稽人宋太常卿今見具姓名正行書三紙共二十行薄紹之字敬叔丹陽人宋給事中與楊孔並師小王今見具姓名行書四紙共二十八行淮水茂族敬𢎞不墜故朝餘風翰墨兼至既約古而任逸亦遺能而獨駛猶剙埏埴於昔人全朴畧而成器王敬𢎞瑯琊人導孫桓元姊夫宋侍中左光祿大夫今見具姓名草書一紙四行也蔓衍枝派思𤣥不忘穏厚而無法度淳和而蓄鋒芒猶君子自適順時行藏王思𤣥瑯琊人宋南康太守今見具姓名行書三行顔氏儒門士遜墨妙大令典則中散氣調薄首孔肩體格惟肖如驚弦履險避地膺峭顔竣字士遜瑯琊人延之子宋右將軍東揚州刺史今見具姓名行書一紙五行言薄首孔肩則獻之羊欣紹之琳之垣公䕶之神凝筆遲富雅景乏士規猶門寒道髙衣薜言時垣䕶之字彦宗洛陽人宋寧朔將軍今見具姓名行書一紙四行翩翩正祖恭已法則師資小王深入閫域安知逸氣未詳筆力猶驥異真龍紫非正色駱簡字正祖丹陽人宋鉅野令今見行書一紙五行有姚懐珍徐僧權等押尾思話綿宻緩歩娉婷任性工𨽻師羊過青似鳬鷗雁鶩游戲沙汀蕭思話蘭陵人宋征西將軍丹陽尹今見帶名正書啓兩紙共十三行具姓名行書三行二王變古法有所屬兢兢秀之斂翰謹束如仙童樂静不見可欲龎秀之宋江州刺史今見正書具姓名啓一紙十行仲逺循常繇𠂻邇俗企彦琳之牆仞遵茂度之軌躅張茂度豈聞一而得三同出吳而入蜀巢尚之字仲逺魯國人宋寧朔將軍今見帶名行書七行世期旁通崛強斷利叅方囘之章法郗愔得敬元之草意羊欣匪庖丁之解牛同君子之不器裴松之字世期河東人宋散騎常侍太中大夫今見具姓名章草書慰勞文一卷二十四行長玉靡慢神閑態穠荷小王之偉質錯明帝之髙蹤執徳而風塵不雜發言而禮儀攸從徐爰字長玉瑯琊人本名瑗避傅亮諱除玉宋太中大夫今見正書具姓名上明帝啓一紙五行江矦僧安揵利而乾貌兼輕媚體出多端猶廣庭之卉木小苑之峰巒江僧安陳留人宋太子中庻子今見真姓名行書一紙八行道力草雄圓轉不窮壯自躬之體格疲逸少之遺風猶立言而逍遥出世驗迹乃夙夜在公賀道力㑹稽人宋吴興令今見具姓名章書二紙共二十行齊髙則文武英威時來運歸挺生紹伯墨妙翰飛觀乎吐納僧䖍擠排子敬昂藏鬱拔勝草負正猶力稽牛刀水展龍性蕭道成字紹伯蘭陵人永之子宋右僕射太尉封十郡為王及受禪即位稱齊髙帝今見具姓名行草書及雜批三十餘紙世祖宣逺象賢豈敢仰英規而無功超筆力而有膽莫顧程式率繇胸襟能騁逸氣未忘童心若横波束薪泛濫淺深武帝諱頤字宣逺髙帝長子今見帶名行草書及雜批等十餘紙子良則能知未善心逺蹟邇家風若遺古則翻鄙雖有力而無體將從真而自美猶土階茅茨儉徳之始竟陵王子良武帝子今見帶名行書四行彦囘無節筆翰亦爾決利不拘足用而已如拔楓栁抑亦杞梓褚淵字彦囘河南人宋末與髙帝同掌樞密後齊臺建以佐命功受司徒中書監今見具姓名草書二紙共一十三行蔚先忠良自我名揚老成不虧和雅允臧若窮隠肥遁志傲侯王褚賁字蔚先淵之子齊秘書監因父憂免職便不仕時人以為耻父失節於宋室遂爾屏居今見正書啓具姓名一紙凡八行非禮不言從容始昌如碩徳君子道義難量而盛徳有素筆精源長徐孝嗣字始昌東海人齊太尉尚書令今見正書啓共二紙簡穆父子載茂餘芳僧䖍則密緻豐富得能失剛鼓怒駿爽阻圓任強然而神髙氣全耿介鋒芒發卷伸紙滿目輝光才行兼而䨇絶名實副而特彰如運籌決勝威震殊方伯寶次道並資義訓兄則雜太祖髙帝而外兼禀家君於已分弟則纎薄無滯過庭益俊並能寛閑墨妙逸速毫奮比逹士與君子人不知而不愠仲寶同夫季舒署名莫窺牆仞王僧䖍瑯琊人曇首子齊尚書令簡穆公今見正書具姓名啓二併行書共十五紙王慈字伯寶王志字次道並僧䖍子慈齊侍中冠軍今見具姓名行書兩紙共二十五行弟志齊侍中吏部尚書今見具姓名行書三帖共七行王儉字仲寶僧綽子齊尚書令今見署名啓行字而已與孔廞同廞字季舒茂謙則壯而不密騁志恒俗輕師模任縱欲如勇夫格獸徑越林麓劉撝字茂謙彭城人齊太子洗馬御史中丞今見行書兩紙共二十行寶光楷之同調合韻差池去就羽翮齊振依蕭附王道成僧䖍俱曰慕藺論骨氣而胡壯驗精神而顧峻猶栁岸之先春得地連於河潤顧寶光吳郡人齊司徒左西掾今見具姓名行書兩紙共二十行胡諧之南昌人齊度支尚書今見帶名行書一紙八行希秀之蹟敬叔之倫薄紹之正則謹促有度草則拘撿靡伸如儉徳君子清朝士人徐希秀瑯琊人齊驍騎將軍今見具姓名行書草書兩紙共十二行思光逸才揮翰無滯超寶光之力從僧䖍之制越恒規而渉徃出衆格而靡繼如塞路蓬轉摩霄鳶唳張融字思光呉郡人齊司徒左長史今見具姓名草書一紙九行梁則髙祖叔達恢𢎞厥躬泯規矩合童蒙文勝質而辭寡明察衆而理窮猶巧匠琢玉心愜雕蟲蕭衍字叔逹蘭陵人順之子齊左僕射征東將軍封梁王及受禪即位稱梁武帝今見帶名行書及制草雜批等四十餘紙簡文慕鍾不瑕有害慠景喬而含古蕭子雲肩邵陵而去泰簡文帝諱綱字世纘武帝第三子今見帶名正書啓四紙并寫禪師碑文六紙及行書四行世調則氣吞元常若置度内方之惠達蕭特㫖趣猶昧擅時譽而徒髙考遺蹤而罕逮邵陵王綸字世調武帝第六子今見帶名行書三紙孝元不拘快利睢盱習寛疎於一體加緊薄而小殊惟數君之翰墨穪去聲天倫之友于皆可比蘭菊殊芳鴻鴈異軀孝元帝諱繹字世誠武帝第七子今見具姓名行書一十五行仲正則寛而壯賖而密婆娑蹣跚綽約文質禀庭訓而微過任天然而自逸若衆山之連峰探仙洞而不一蕭確字仲正綸子梁廣州刺史永安侯今見具姓名行草書兩紙一十五行景喬則潤色鍾門性情勵已豐媚輕巧纎慢旖旎詩雖易其國風賜豈賢於夫子猶鸞窺鏡而鼓翼虎不咥而履尾蕭子雲字景喬蘭陵人梁侍中國子祭酒今見正書具姓名啓及臨右軍書共三十行又見草書六十餘紙名劣筆健乃逢王克通流未精疎快不忒猶腐儒㝛士運用自得王克瑯琊人梁尚書僕射今見具姓名草書四行有胡昂印尾陸杲迅熟騁揵遺能任縱便無風稜如郊坰羽獵􅞡䎉奔騰陸杲吳郡人梁光祿大夫揚州大中正今見具姓名草書九行體雜閑利覩夫彦昇構牽掣而無法任胸懐而足憑猶注懸泉咽凝氷任昉字彦昇樂安人梁吏部侍郎掌著作今見具姓名草書五行茂逺㨗鋭足以自給彦和連環迅不可及如過雨之奔簷霤飛燎之赫原隰傅昭字茂逺北地人梁秘書監金紫光禄大夫貞子今見具姓名草書一紙一十一行朱异字彦和呉郡人中領軍右僕射今見具姓名草書一紙十三行文海緊快勢逸氣髙未忘俗格鋭意操刀猶樂成名於朝野嗤遁迹於蓬蒿王籍字文海瑯琊人僧䖍子梁左塘令今見具姓名草書凡八行季和慢速風規所屬圓轉頗通骨氣未足殷鈞字季和陳郡人梁國子祭酒今見行草書兩帖共有一紙三行文機纎潤穏正利草輭媚横流姿容美好若其抑阮褒殷庻幾同塵似泉激溜於懸磴木垂條於晩春阮研字文機陳留人梁交州刺史今見具姓名正行草書五十餘紙惟子深與惠達總景喬之幼志俱親拂毫同陪結字深正穏而寡力達草寛而豐意或比父而疎省或過師而巧媚誰與别其羅紈且欲同乎篋笥王褒字子深瑯琊人規子梁尚書僕射蕭特字惠逹子雲子梁海鹽令今見正行草書具姓名共有二十六紙肩吾通塞併乏天性工歸文華拙見草正徒聞師阮阮研何至遼夐使鉛刀之均鋒穪並利而則佞庾肩吾字子慎新野人梁度支尚書今見具姓名行書三紙通明髙爽緊密自然擺闔宋文峻削阮研載窺逸軌不讓真仙猶龍髯鶴頸奮舉雲天陶宏景字通明丹陽人隠居山林武帝追諡貞白先生今見具姓名正行書一十二行彦淵氣懦任力或滯猶翮短風髙昇沉靡制江蒨字彦淵濟陽人梁吏部侍郎今見具姓名行書一紙三行𢎞讓迅快放誕可觀利疾速著輕乾若星居僻陋木蔓樛盤周𢎞讓汝南人𢎞正弟今見草書七行有胡昂押尾蠢蠢懐約任己作制若孤陋儒生辛勤一藝范懐約吳郡人梁東宫侍書今見正書寫正覽一卷并具姓名行書一紙一宋本上卷從此止爰及陳氏霸先剙業盤桓有威牢落無則等王師憑怒挫䘐攻刼嗟文煬而不知徒染毫而敗法陳霸先潁川人文讚子厯梁司空丞相封為陳公後受禪即位稱陳武帝今見批沈格啓行書四行文帝諱蒨字子華武帝子見批陸瓊行書三行煬帝諱叔寶字元秀宣帝子今見帶名行書一紙沈氏后徳名標婺華允光親署獨美可嘉如晩晴陣雲傍日殘霞煬帝后沈氏呉興人君理之女今見署啓一紙婺華后字叔齊鬱然署押而已伯仁軟慢尺牘近鄙欽榮之之勁舉雖師心而入流髙疎壯浪復覩伯謀並如策馬馳逐葦航泛浮新蔡王叔齊字子肅煬帝弟官至侍中國子祭酒見署名書一紙廬陵王伯仁字夀之煬帝子官至光禄大夫中武將軍今見具姓名行書四行永陽王伯智字榮之廬陵王弟官至左翊將軍今見帶名行書七行桂陽王伯謀字深之永陽王弟官至丹陽尹今見帶名行書五行智永智果禪林筆精天機淺而恐泥志業髙而克成或拘凝重蕭索家聲或利凡通周章擅名猶能作緇門之領袖為當代之凖繩並如君子勵躬於有道髙人保志而居貞㑹稽永欣寺僧智永俗姓王氏右軍孫今見具真草千文數本并帶名草書二紙僧智果會稽人帶名草書一紙坡陁總持獨歩方外甘率性而衆異非接武於興㑹若時違隠淪卒不冠帶江總持濟陽人陳尚書令今見具姓名草書一紙三行孝穆鄙重剛毅任拙猶偏禆武夫膽勇智怯徐陵字孝穆東海人陳左僕射今見正書帶名啓一紙仲倫則快速無度馳突不疎尺題已終筆勢仍餘似逸籠檻之衆鳥恣飛鳴之所如沈君理字仲倫吳興人陳尚書吏部郎中駙馬都尉今見具姓名草書一紙徳章率爾流浪急速骨氣乍髙風神入俗符縱志而失道等潰河與顛木袁憲字徳章陳郡人陳右僕射今見具姓名草書兩行有胡昂印尾快哉伯武心空手敏古風若遺令範惟允如平郊逸驥晩景飛隼毛喜字伯武滎陽人陳吏部尚書今見具姓名草行書共有四紙翩翩濟陽茂世希祥任樸無聞適俗不忘父輕而迅子凛而剛蔡景厯字茂世濟陽人陳度支尚書今見具姓名行草書三紙子徴字希祥陳中書令今見具姓名草書二紙接武随波雷同野王如異磽肥之挺質俱竹柏之凌霜顧野王字希馮陳黄門侍郎領大著作今見具姓名草書二紙知道則寛疎弛慢無可取則削凡常病窒塞猶岸陸縱獺艱辛騁力伏知道昌平人陳鎮北長史今見具姓名草書三紙含茂悠悠荐臻同徳廹時季而陵替俱道䘮於翰墨徒麋鹿為後先非勝負可差忒謝嘏字含茂陳郡人陳中書令今見具姓名草書三紙賀氏曰朗雖非動人不事筆力猶阻學貧三者若宦游旅泊衣化風塵賀朗㑹稽人陳秘書監今見具姓名行書三紙文深孝逸獨慕前蹤至師子敬如欲登龍有宋齊之面貌無孔薄之心胸趙文深天水人後周為書學博士書蹟為時所重孝逸湯隂人隋四門助教深師右軍逸效大令甚有功業當平梁之後王褒入國舉朝貴胄皆師於褒唯此二人獨負二王之法俱入隋臨二王之迹人間徃徃為貨耳蕭條北齊浩汗仲寶劣充凡正備法緊草遐師右軍􅘒爾繇道究千變而得一乗薄俗而居老如海岳髙深青分孤島劉珉字仲寶彭城人彦英子北齊三公郎中今見具姓名草書十二紙隋則𤣥平嗣芳訛熟名揚彦謙草力浮緊循常糟粕右軍之化依稀夫子之牆皆如益星榆之衆象無月桂之孤光劉𤣥平珉之子髙道隋贈貞範先生今見具姓名行書二紙房彦謙清河人司𨽻刺史今見具姓名草書十紙昌衡跌宕率爾而作雖蔑法而或乖乃繇𠂻而不怍似野笋成竹長風隕籜盧昌衡字子均范陽人隋侍中贈司空父道䖍子均隋禮部待郎太子左庻子今見具姓名行書二紙法書要録卷五
