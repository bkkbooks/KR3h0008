  text: 欽定四庫全書巻子部八
  hash: sha256:3c982170563039846193d3082f85b9ad45e20353da27e098514e9cb82eb1093d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0008_WYG_000-1a, image: WYG0812/WYG0812-0101a.png}
body:
  text: 法書要録目録藝術類一書畫之屬卷一後漢趙一非草書晉王羲之論書王羲之教子敬筆論不録晉衛夫人筆陣圖王羲之題筆陣圖後宋羊欣采能書人名齊王僧䖍答太祖書王僧䖍論書宋王愔文字志目齊蕭子雲啟卷二梁虞龢論書表梁武帝論鍾書十二意梁武帝與陶隠居論書啓九首梁庾元威論書梁庾肩吾書品論梁袁昻古今書評陳釋智永題右軍樂毅論後後魏江式論書表卷三唐虞世南書㫖述褚遂良右軍書目李嗣真後書品武平一徐氏法書記徐浩論書徐浩古迹記何延之蘭亭記褚遂良榻本樂毅論記崔備壁書飛白蕭字記李約壁書飛白蕭字記大父相國髙平公蕭齋記蔡惲書無定體論不録卷四顔師古註急就章不録張懐瓘書話張懐瓘二王等書録張懐瓘書議張懐瓘文字論張懐瓘六體書不録唐朝敘書録韋述敘書録盧元卿法書録卷五竇臮述書賦上卷六竇臮述書賦下卷七張懐瓘書斷上卷八張懐瓘書斷中卷九張懐瓘書斷下卷十右軍書記臣等謹案法書要録十卷唐張彦逺撰書首有彦逺自序但題郡望而不著官爵郭若虚圖畫見聞志晁公武讀書志亦止稱其字曰愛賔而未詳其家世故明毛晉跋第以河東張氏目之今以新唐書世系表列傳與彦逺自序參考知彦逺乃明皇時宰相嘉貞之𤣥孫序稱髙祖河東公者即嘉貞其稱曽祖魏國公者為同平章事延賞稱大父髙平公者為同平章事𢎞靖稱先君尚書者為桂管觀察使文規唐書皆有傳而延賞封魏國公本傳不載惟見於彦逺之序本傳又稱彦逺博學有文辭乾符中至大理卿而世系表作祠部員外郎則當以傳為得實此書末載畫譜本傳乃謂彦逺大父名稔不知何據盖未攷唐書而附㑹之者也史又載𢎞靖家聚書畫侔秘府彦逺承其餘澤故聞見尤富是編集古人論書之語起於東漢迄於元和皆具録原文而如王愔文字志之未見其書者則特存其目編次極為詳贍其中不加論斷而李嗣真書品後之類間亦有注語者疑即彦逺所自附考藝文畧所紀法書一類自漢至唐凡六十餘家今多佚不傳而庾肩吾張懐瓘竇臮等著述獨賴此書以得顯於世則蒐羅裒輯之功為不可没矣乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張彦遠法書要録自序彦遠家傳法書名畫自髙祖河東公收藏珍祕河東公書迹俊異尤能大書本傳云不因師法而天姿䧺勁定州北嶽碑為好事所傳曽祖魏國公少禀師訓玅合鍾張尺牘尤為合作大父髙平公㓜學元常自鎮蒲陕迹類子敬及處台司乃同逸少書體三變為時所稱金帛散施之外悉購圖書古来名迹存於箧笥元和十三年憲宗累訪珍迹當時不敢緘藏遂皆進獻長慶初又於豳州散失傳家所有十無一二先君尚書少耽墨玅備盡楷模彦逺自㓜至長習熟知見竟不能學一字夙夜自責然而收藏鑒識有一日之長因採掇自古論書凡百萹勒為十巻名曰法書要録又别撰歴代名畫記十卷有好事者得余二書書畫之事畢矣豈敢言具哉
