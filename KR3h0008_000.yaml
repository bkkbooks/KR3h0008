  text: 欽定四庫全書卷子部八
  hash: sha256:b684327828a6ad29945b43be9d0ec98161dcd23fc175c0fba875627ce7d1cebd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0008_WYG_000-1a, image: WYG0812/WYG0812-0101a.png}
body:
  text: 法書要録目録藝術類一書畫之屬卷一後漢趙一非草書晉王羲之論書王羲之教子敬筆論不録晉衛夫人筆陳圖王羲之題筆陳圖後宋羊欣采能書人名齊王僧虔答太祖書王僧虔論書宋王愔文字志目齊蕭子雲啓卷二梁虞和論書表梁武帝論鍾書十二意梁武帝與陶隱居論書啓九首梁庾元威論書梁庾肩吾書品論梁袁昻古今書評陳釋智永題右軍樂毅論後後魏江式論書表卷三唐虞世南書旨述褚遂良右軍書目李嗣真後書品武平一徐氏法書記徐浩論書徐浩古迹記何延之蘭亭記褚遂良榻本樂毅論記崔備壁書飛白蕭字記李約壁書飛白蕭字記大父相國髙平公蕭齋記蔡惲書無定體論不録卷四顔師古注急就章不録張懷瓘書話張懷瓘二王等書録張懷瓘書議張懷瓘文字論張懷瓘六體書不録唐朝敘書録韋述敘書録盧元卿法書録卷五竇臮述書賦上卷六竇臮述書賦下卷七張懷瓘書斷上卷八張懷瓘書斷中卷九張懷瓘書斷下卷十右軍書記臣等謹案法書要録十卷唐張彥逺撰書首有彥逺自序但題郡望而不著官爵郭若虛圖畫見聞志朝公武讀書志亦止稱其字曰愛賔而未詳其家世故明毛晉跋第以河東張氏目之今以新唐書世系表列傳與彥逺自序參考知彥逺乃明皇時宰相嘉貞之玄孫序稱髙祖河東公者即嘉貞其稱曽祖魏國公者為同平章事延賞稱大父髙平公者為同平章事𢎞靖稱先君尚書者為桂管觀察使文規唐書皆有傳而延賞封魏國公本傳不載惟見於彥逺之序本傳又稱彥逺博學有文辭乾符中至大理卿而世系表作祠部員外郎則當以傳為得實此書末載畫譜本傳乃謂彥逺大父名稔不知何據蓋未考唐書而附會之者也史又載𢎞靖家聚書畫侔祕府彥逺承其餘澤故聞見尤富是編集古人論書之語起於東漢迄於元和皆具録原文而如王愔文字志之未見其書者則特存其目編次極為詳贍其中不加論斷而李嗣真書品後之類間亦有注語者疑即彥逺所自附考藝文略所紀法書一類自漢至唐凡六十餘家今多佚不傳而庾肩吾張懷瓘竇臮等著述獨賴此書以得顯於世則搜羅裒輯之功為不可沒矣乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張彥遠法書要録自序彥遠家傳法書名畫自髙祖河東公收藏珍祕河東公書迹俊異尤能大書本傳云不因師法而天姿雄徑定州北嶽碑為好事所傳曽祖魏國公少稟師訓妙合鍾張尺牘尤為合作大父髙平公幼學元常自鎮蒲陕迹類子敬及處台司乃同逸少書體三變為時所稱金帛散施之外悉購圖書古來名迹存於篋笥元和十三年憲宗纍訪珍迹當時不敢緘藏遂皆進獻長慶初又於豳州散失傳家所有十無一二先君尚書少耽墨妙備盡楷模彥逺自幼至長習熟知見竟不能學一字夙夜自責然而收藏鑒識有一日之長因採掇自古論書凡百萹勒為十卷名曰法書要録又别撰歷代名畫記十卷有好事者得余二書書畫之事畢矣豈敢言具哉
