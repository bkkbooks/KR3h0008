  - {type: page-break, offset: 0, content: '', id: KR3h0008_WYG_010-1a, image: WYG0812/WYG0812-0240a.png}
body:
  text: 法書要録卷十唐張彦逺撰右軍書記十七帖長一丈二尺即貞觀中内夲也一百七行九百四十二字是烜赫著名帖也太宗皇帝購求二王書大王艸有三千紙率以一丈二尺為卷取其書迹及言語以數相從綴成卷以貞觀兩字為二小印印之褚河南監装背率多紫檀軸首白檀身紫羅褾織成帶開元皇帝又以開元二字為二小印印之跋尾又列當時大臣等十七帖者以卷首有十七日字故號之二王書後人亦有取帖内一句語稍異者標為帖名大約多取卷首三两字及帖首三兩字也十七日先書郗司馬未去即日得足下書為慰先書以具示復數字吾前東粗足作佳觀吾為逸民之懐乆矣足下何以方復及此似夢中語耶無縁言面為歎書何能悉瞻近無縁省告但有悲歎足下小大悉平安也云卿當来居此喜遲不可言想必果言告有期耳亦度卿當不居京此既僻又節氣佳是以欣卿来也此信㫖還具示問龍保等平安也謝之甚遲見卿舅可早至為簡隔也知足下行至吳念違離不可居叔當西耶遲知問計與足下别廿六年於今雖時書問不解濶懐省足下先後二書但増歎慨頃積雪凝寒五十年中所無想頃如常冀来夏秋間或復得足下問耳比者悠悠如何可言吾服食乆猶為劣劣大都比之年時為復可耳足下保愛為上臨書但有惆悵省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉彼故為多竒益令其㳺目意足也可得果當告卿求迎少人足耳至時示意遲此期真以日為嵗想足下鎮彼土未有動理耳要欲及卿在彼登汶嶺峩睂而旋實不朽之盛事但言此心以馳於彼矣諸從竝數有問粗平安唯修載在逺音問不數懸情司州疾篤不果西公私可恨足下所云皆盡事勢吾無間然諸問想足下别具不復一一得足下旃罽胡桃藥二種知足下至戎鹽乃要也是服食所湏知足下謂湏服食方回近之未許吾此志知我者希此有成言無縁見卿以當一笑云譙周有孫髙尚不出今為所在其人有以副此志不令人依依足下具示嚴君平司馬相如揚子雲皆有後不天䑕膏治耳聾有驗否有驗者乃是要藥朱處仁今所在徃得其書信遂不取荅今因足下荅其書可令必達省别具足下小大問為慰多分張念足下懸情武昌諸子亦多逺宦足下兼懐竝數問不老婦頃疾篤救命恒憂慮餘粗平安知足下情至旦夕都邑動静清和想足下使還具時州將桓公告慰情企足下數使命也謝無奕外任數書問無他仁祖日徃言尋悲酸如何可言知有漢時講堂在是漢和帝時立此知畫三皇五帝以来備有畫又精妙甚可觀也彼有能畫者不欲摹取當可得不湏具告徃在都見諸葛顒曽具問蜀中事云成都城池門屋樓觀皆是秦時司馬錯所修令人逺想慨然為爾不信一一示為欲廣異聞青李来禽櫻桃日給藤已上四行子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之此種彼胡桃皆生也吾篤喜種果今在田里惟以此為事故逺及足下致此子者大恵也彼所湏此藥草可示當致虞安吉者昔與共事常念之今為殿中將軍前過云與足下中表不以年老甚欲與足下為下寮意其資可得小郡足下可思致之耶所念故逺及吾有七兒一女皆同生㛰娶以畢惟一小者尚未㛰耳過此一㛰便得至彼今内外孫有十六人足慰目前足下情至委曲故具示已上十七帖也𤣥度先乃可耳嘗謂有理因祠祀絶多感其夜便至此致之生而速之毎尋痛惋不能已已省君書増酸恐大分自不可移時至不可以智力救如此先生適書亦小小不能佳大都可耳此書因謝常侍信還令知問可令謝長史且消息數親問叔穆嘉賓竝有問為慰知道長不孤得力疾重而邇進退甚令人憂念遲信還知問婦安和婦故羸疾憂之焦心餘亦諸患君昨示欲見穆生叙讚今欲黙語興廢之格粗當書爾不𤣥度好佳君謂何似從事經過崔阮諸人昨旦與書疾故示毒愁當増其疾吾如今尚劣劣又晚熱未有定發日有定示足下興耳近書或欲畱吾甚欲與俱而吾疾患遲速無常其竟云何足下今知問適太常司州領軍諸人二十五六書皆佳司州以為平復此慶慶可言餘親親皆佳大奴以還吳也冀或見之司州供給寥落去無期也不果者公私之望無理或復是福得大等書慰心今因書也野數言疏平安定太宰中郎適州將十五日告徐一癰方尺許口四寸云數如来小如差然疾源如此憂怛尚深故遣信治徐舍人書以示徐還示足下也不堪縲疑事列上台周青州視事今以當至下耶甚是事宜無方身世而任事者疾患如此使人短氣六月十九日羲之白使還得八日書知不佳何爾耿耿僕日弊而得此熱忽忽解日爾力遣不具王羲之白白字只㸃成一見尚書書一二日遣信以具必宜有行者情事恐不可委行使耶遲還具問亦以與尚書諮懐今復遣諮吳興也逺近清和士人平安荀矦定住下邳復遣軍下城此間民事愚智長歎乃亦無所隱如之何又湏求雨以復為灾卿彼何似江生佳湏大活以始見之與人上蕭索可歎汝宜速下不可稽畱計日遲望今日亦語劉長史令速近因得里人書想至知故面腫今差不吾比日食意如差而骭玉篇下諫反堅也中故不差以此為至患至不可勞力數字令弟知聞耳姉適復二告安和郗故病篤無復他治為消息耳憂之深今移至田舍就道家也事畢當吾遣信視淑還母子平安為慰至恨不得暫見故未得下船道夷書云已得一宅想今安穩耳不政解此移趨知部兒不快何所在今已佳也耿耿信白與殷矦彼此格卿取卒喜慰氣滿無他治噉數合米来三日知足下哀感不佳耿耿吾下勢腹痛小差湏用女蔞丸得應甚速也在我而已誠無所多云與謝豫州共入河不乃煩劇得安萬送書云六日可至諸賢云朝廷失之轉覺闕然與卿書同此四字注不有君子其能國乎此言深也但云卿當入何以如夢恐卿表將復經年想仁祖差時還内鎮慰人情耳皆在卿懐矣産婦兒萬畱之月盡遣甚慰心得袁二謝書具為慰袁生暫至都已還未此生至到之懷吾所盡也弟預湏遇之大事得其書無已已二謝云秋末必来計日遲朢萬羸不知必俱不知弟徃别停㡬日決其共為樂也尋分旦與江姚女和别殊當不可言也知庾丹陽差數深深致心致心得孔彭祖十七日具問為慰云襄經還蠡是反善之誠也於殷必得速還無復道路之憂比者尚懸悒得其去月書省之悲慨也上流近問不竟何日即路知謝定出居内所𢎞故重是不情廢情存大朙或就卿圍棊邑今雨寒未可以治謝江表付還此四字一行得書知足下問吾骯髂上下黨反下口亞反腰骨拘闕痛俛仰欲不得此何理耶願輒與相見無盡治宜足下得益使之不疑也但月又未陰沈沈恐不可針不知何以教目前甚憂顇王羲之比信尋知足下有書可道知足下未能得果朢近為然知得家問賢子動疾念甚憂慮懸得後問不分張何可久幼小故疾患無賴野大皆當以至不得還問懸心大得善悉也野當不能遏卿竝轉茂清談足下小大佳也諸疾苦憂勞非一如何復得都下近問不吾得敬和二十三日書無他重熙住定為善謝二矦此三字又一行山下多日不得復意問一昨晩還未得遣書得告知中冷不解更壯溼甚耿耿服何藥耶僕此日差勝尋知問王羲之頓首羲之頓首向又慘慘自舉哀乏氣勿勿知便當西且不相知来想熊能更言問力遣不次王羲之頓首此二帖帶行七日告期痛念𤣥度未能闕心汝臨哭悲慟何可言言及惋塞夜闕市器俱不合用令摧之也吾平平但昨来念𤣥度體中便不堪之耶告汝當湏過殯還恒有悲惻王延期省此四字一行妹轉佳慶不及啼不憶念奴殊不可言凉當迎之昨即得丹陽水上書與足下書同故不送昨諸書付還去冬遣使想乆至乖離忽四年言之歎慨豈言所喻悠悠數十卒當何期汝等將慎為上知復何云念足下竆􅋠兼至不可居處雨氣無已卿復何似耿耿善將息吾故劣力知問王羲之吾何當還此四字一行汝尚小愁思兼至不可居處多疾足下前許嵗未今暫還想必可爾故復白十一月十三日告期等得所髙餘姚并吳興二十八日二疏知並平安慰吾平平比服寒食酒如似為佳力因王㑹稽不一一阿耶告知想大小皆佳丹陽頃極佳也云自有書不附此信耳大小問多患懸心想二奴母子佳遲卿問也吾去日盡欲畱女過吾去自當送之想可垂許一出未知還期是以白意夫人渉道康和足下小大皆佳度十五日必濟江故二日知問湏信還知定當近道迎足下也可令時還遲面以日為嵗去冬臨臨安事近便欲決去而何侯不許事聞以有小㓂今未便得果然故有移南意尚未可倉卒復信更具信汝也六日昨書信未得去時尋復逼或謂不可以不恭命遂不獲已䖏世之道盡矣何所復言丹陽旦送吾體氣極佳共在卿故䖏増􅋠詠若可得耳要當湏吾自南但増感塞十四日諸問如昨云西有伐蜀意復是大事速送袍来遂當發詔催吾帝王之命是何等事而辱在草澤憂歎之懷當復何言見足下一一昨送諸書令示卿想見之恐殷矦必行義朢雖宜爾然今此集信為未易卿若便西者良不可言安復後問不想必停君諸舍疾若差也便疾綿篤了不欲食轉側湏人憂懷㴱小妹亦故進退不孤得㪚力煩不得眠食至少疾患經日兼燋勞不可言迎集中表親疏畧盡實朢投老得盡田里骨肉之歡此一條不謝二疏而人理難知此不知小却得遂本心不交衰朽羸劣所憂營如此君視是頤養之功當有何理今都絶􅋠此事也冀疾患差末秋初冬必􅋠與諸君一佳集遣無益快共為樂欲省補頃者之慘蹙也追尋前者意事豈可復得且當率目前及當此急要願諸君各保愛以俟此期未近見君有諸結力聊以當面各各間意必欲省安西如今意無前却也想君必俱賊勢可之者必進許洛無可不果相遇于一世豈可度之尋常以此至終故當極盡志氣之所託也君此意𢎞足然決在必行當面止似為一帖未復知問晴快卿轉勝向平復也猶耿耿想上下無恙力知問不具王羲之敬問日月如馳一㛐弃背再周去月穆松大祥奉瞻廓然永惟悲摧情如切割汝亦増慕省疏酸感延期官奴小女病疾不救痛愍貫心吾以西夕情愿所鍾唯在此等豈圗十日之中二孫夭命惋傷之甚未能喻心可復如何此有两帖語小異敬親今在剡其後復亡甚不可言穰鐵不知已得一行短書行近遣書想即至此雨汝佳不得懸心吾之劣力數字七月十三日告鄱陽兄弟大降制終去悔悼甚永絶悲傷痛懷切割心情也諸葛吝者君識之不才幹好佳徃為錢塘著績又入僕府有以盡悉宰民之至也甚欲自託於明徳云臨安春當闕爾者君能請不僕必欲言得佳長史亦當是君所湏既得里人共事異常故乃爾湏還告之人理不可得都絶毎至屬致使人多歎十五日羲之報近甚倉卒得十三日音知卿佳慰之力及陽主書不一一羲之報㑹稽亦復與選論卿否吾誠勅勅於論事然于弟尚不惜小宜謂選官前意已佳可不復煩重卿更􅋠必謂宜論者必有違矣上下安也和緒過見之欣然敬豫乃成委頓令人深憂江生亦連病今已差知阮生轉佳甚慰甚慰㑹稽近患下始差諸謝粗佳足下差否甚耿耿㗋中不復燥耳故知問具示王羲之白冷過足下夜得眠不祗差也復何治甚耿耿長史復何似故問具示王羲之白遂無雨候使人歎得諸孫書髙田皆欲了得書知足下患癤念卿無賴􅋠見足下冀脫果力不一一王羲之白此賢懷所禮也面一一五月十四日羲之近反至也得七日書知足下故爾耿耿善將息吾腫得此霖雨轉劇憂㴱力不一一羲之適萬石去月五日書為慰尋得彭祖送萬九日露版再破賊有所獲想足摧㓂越逸之勢宜適許司農書為慰無人未能得重故向餘杭間此注三行短因縁示致問非書能悉想君行有㫖信伯熊上下安和為慰可令知問叔夷子前恨不見可令熊知消息羊叅軍還朝論長見敦恕其為慶慰無物以喻今又告誠先靈以文示足下感懐慟心又以表書示卿政當亦不痛念𤣥度立如志而更速禍可惋可痛者省君書亦増酸服食故不可乃將冷藥僕即復是中之者腸胃中一冷不可如何是以要春秋輒大起多腹中不調適君宜㴱以為意省君書亦比得之物養之玅豈復容言直無其人耳許君見驗何煩多云矣袁彭祖何日過江想安穩耳失此諸賢至不可言足下分離如何可言此叚不見足下乃甚乆遲面朙行集冀得見卿得申近不問此五字一行謝矦此二字一行四月五日羲之報建安靈柩至慈陰幽絶卅年永惟崩慕痛徹五内永酷奈何無由言告臨紙摧哽羲之報此一帖真艸書十一月十八日羲之頓首頓首從弟子夭沒孫女不育哀痛兼傷不自勝奈何奈何王羲之頓首此一帖行書二蔡過葬来居此親親集事而君復出為因耳此一帖草書九月十八日羲之頓首茂善晚生兒不育痛之惻心奈何奈何轉寒足下可不可不不得問多日懸情吾故劣力不具王羲之頓首此一帖行艸十月十一日羲之敬問得旦書知佳為慰吾為轉差力不一一羲之敬問行草二十七日告姜汝母子佳不力不一一耶告此一帖行艸羲之頓首二孫女夭殤悼痛切心豈意一旬之中二孫至此傷惋之甚不能已已可復如何羲之頓首真行廿八日羲之白得昨告承飲動懸情想小爾耳還㫖不具王羲之再拜艸書庾新婦入門未㡬豈圗奄至此禍情愿不遂緬然永絶痛之深至情不能已况汝豈可勝任奈何奈何無由叙哀悲酸此帖行書君服前賢弟逝沒一旦奄至痛當奈何當復奈何臨紙咽塞王羲之頓首頓首此一帖真行雪候既不已寒甚盛冬平可苦患足下亦當不堪之轉復知問王羲之此一帖行書書末云得諸為慰知汝姨欲西情事難處然今時諸不易得東安書甚不欲令汝姨出懇至想自思之行書上下可耳産行徃當迎慶􅋠之不可言此一帖行書今付吳興酢二器真行一日不暫展至恨叱而不已便懐不果東至可恨􅋠叙想閒暇必顧也適都使還諸書具一一湏直具懷得征西近書委悉為慰不得安西許有問不知何久長風書平安今知殷矦不久畱之甚善甚善舍内佳不中書何似家中疾篤􅷳救旦夕比知覺有省書想至義興何似懸情慕容遂来據鄴可深憂官復遣軍可以示義興中書昨得殷矦荅書今寫示君承無怒意既而意謂速􅋠順從或有怨理大小宜盤桓或至嫌也想復㴱􅋠復征許也此四字一行八月二十四日羲之頓首闕竟増哀感奈何奈何两足下可耳不得問闕日懸心吾故劣劣王羲之頓首此雨足何耳故當收佳云彼甚快大事吳義興吳闕是蕩然可歎知諸患耿耿今差也華母子佳時行皆遍事輕耳彼云何道祖㿃下乃危篤憂怛憂怛賊勢可見此云方軌萬萬如志但守之尚足令智者勞心此回書恒懐湯火處世不易豈惟公道此两字行也下側書諸人十二日書云慕容乃抄梁下得數闕目下疾疫非常乃以至京極有傷此憂之下者想君勤勤之復委篤恐無興理諸人書亦云爾也憂之怛怛得停乃公私大計也君頃以何永日憶去冬不可得知如何如何桓公以江州還臺選毎事勝也不可當在誰耳源書以發吾欲路次見之亦不欲停甚闕官舍佳也得諸舍問不不知遮何日西言及辛酸卿不可懐期等故勿憂勿憂㴱近書及至也瞻朢不逺而未期蹔直如之何遲得問也謝矦數不在歎此一行至底皆缺前知足下欲居此常喜遲知定不果悵恨未知見卿期當數音問也得都近問清和為慰云劉生近欲舉君為山陰以中當為最君期於未獲供養處相為慨然仕宦殆是想也君學書有意今相與草書一卷小大佳不可得司馬問懸情適安以中軍出鎮有避賢意乃云行得言直不知公私此理卒當之耶甚憂真夲無集之者想今與君書一一見此當何言但恐今婦必門首有出四字注復有將来之弊耳此願盡珍御理想彼人士平安二郗數闕也敬豫諸人近来停數日悉佳安石已南遷其諸兄弟此改殊命蕭索聞君以復入相府何時當應命未得坐䖏亦當愁㒺􅋠得為鄰豈常情恐君方處務此命難期如之何不一一小佳復意問也源遂差不云尚未恭命終之何聞真長知吳興想必如意南道差不君大小佳不松廬善斲也僕信還秦州將去月十二日告甚慰如曹失䕶語此君甚康壯常是肥渇耳實尋還遲之不可言二妹差佳慰問心期中冷頃時行可畏愁人不得司馬近問懸情近所送書即至也君信朙早令得後得鄙書未至即想東不久耳此鄙問無恙諸從皆佳比諸數耳知劉阮數闕温公在此前東北直還此復初闕㪚為慰便乞良不可言卿得知之復共一快樂武妹小大佳也闕一字知郡荒吾前東周旋五千里所在皆爾可歎江東自有大頓勢不知何方以救其弊民事自欲歎復為意卿示聊及闕一字數得桓公問疾轉佳也毎懸胡云征事未有日佳也以逼勢不知卒云何爾君大小佳不至此乃知熙徃覺少不得同萬恨萬恨云出便當西念逺别何可言遅見𤣥度今或以在道賓如人徃不堪致心憶之不忘懐之妹不快憂勞餘平安未得安西問𤣥度忽腫至可憂慮得其昨書云小差然疾候自恐難耶與安石俱佳還七日増想投命積日不復知問弟佳寜善然復憂之不去懐吾遂沈滯兼下如近數日分無復理昨来増服陟釐丸得下不知遂斷不了無所噉而藥得停不知當復見弟二字注理不獨下便長歎小蘇息更知問二奴庶諸人何以謝之已上九字注两行想清和士人皆佳彭祖諸人得足下慰旦夕也此諸賢平安毎直粗有嘆慨追恨近日不得夲善㪚無已已度足下還期不乆耳此者數令知問懐足下可謂禮之闕今以志心寄卿想必至到論之救命不暇此事於今為奢逺耳要是事其本心所欲論事今付今與馮公論何産足下可􅋠助朙清談至是舉今又語真道今宣㫖矣臣羲之言寒嚴不審聖體御膳何如謹付承動静臣羲之言召表皇太后一臣羲之言伏惟陛下天縱聖哲徳齊二儀自哲以下則注應期承運踐登大祚普天率土莫不同慶臣抱疾遐外不獲隨例瞻朢宸極屏營一隅臣羲之言劉氏平安也梅妹可得袁妹腰痛冀當小爾耳汝母故若以不安食疾久憂憒當􅋠平理也神意不同前者也今付北方脯二夾吳興鮓二器蒜條四千二百司馬雖篤疾久頃轉平除無他感動奄忽長逝痛毒之甚驚惋摧慟痛切五内當奈何奈何省書感哽雨寒卿各佳一字注不諸患無賴力書不一一羲之問想官舍無恙吾必果二十日後乃徃遲喜㪚恙比爾自相聞也九月三日羲之報敬倫遮諸人去晦祥禫情以酸割念卿傷切諸人豈可堪䖏奈何奈何及書不既羲之批九月二十五日羲之頓首便陟冬日時速感歎兼哀傷切不能自勝奈何得七月末時書為慰始欲寒足下常疾比何似毎耿耿吾故不平復憂悴力困不一一王羲之頓首旦極寒得示承夫人復小欬不善得眠助反側想小爾復進何藥念足下猶悚息卿可否吾昨暮復大吐小噉物便爾旦来可耳知足下念王羲之頓首延期官奴小女竝得㬥疾遂至不救愍痛心奈何吾以西夕至情所寄唯在此等以禁慰餘年何意旬日之中二孫夭命日夕左右事在心目痛之纒心無復一至於此可復如何臨紙咽塞六月二十七日羲之報周嫂弃背再周忌日大服終此晦感摧傷悼兼情切劇不能自勝奈何奈何穆松埀祥除不可居處言以酸切及領軍信書不次羲之報頓首頓首亡嫂居長情所鍾奉始獲奉集冀遂至誠展其情愿何圗至此未盈數旬奄見背弃情至乖喪莫此之甚追尋酷恨悲惋深至痛切心肝當奈何奈何兄子荼毒備嬰不可忍見發言痛心奈何奈何王羲之頓首頓首君頃復以何㪚懐鐵云秋當解褐行復分張想君比爾快為樂彥仁書云仁祖家欲至蕪湖單弱伶俜何所成君書得載停郡迎喪甚事宜但異域之乖素已不可言何時可得發六日告姜復内始晴快情汝一字注母子平安二十七日告姜汝母子佳不力不一一耶告前使還有書哀猥不能敘懐情痛兼哀若割當奈何奈何省弟累紙哀毒之極但報書難為心懐况卿處之何可具忍有始有卒自古而然雖當時不能無情痛理有大斷豈可以之致弊何由寫心絶筆猥咽不知何言也十二月六日羲之報一昨因暨主簿不悉昨得去月十五日二十三日二書為慰两書夜無解夜来復雪弟各可也此日中冷患之始小佳力及不一一羲之報羲之死罪前得雲子諸人書竝毁頓胡之惟分推難為心當有分西者否羲之死罪七月五日羲之頓首昨便斷艸葬送期近痛傷情㴱奈何奈何得去月二十八日告具問慰懐力還不次王羲之頓首七月十六日羲之報凶禍累仍周嫂弃背大賢不救哀痛兼傷切割心情奈何奈何遣書感塞羲之報二十三日發至長安云渭南患無他然云苻健衆尚七萬苟及最近雖衆由匹夫耳即今尅此一叚不知嵗終云何守之想勝才𢎞之自當有方耳隔以乆諸懐既不可言且今多慘戚遲君果前蹔得一㪚懐知以多疾不果乃當秋事省告同此歎恨如何可言葬事不可倉卒當在九月初過此故欲一與吳興集冀無不尅耳然事来萬端不知如人意不非書能悉君數告以慰之耳六月十六日羲之頓首秋節垂至痛悼傷惻兼情切割奈何奈何此雨過得十日告知君如常吳興轉勝甚慰想得此凉日佳患㪚乃委煩耿耿且以佳興消息僕故是常耳劣劣解日力不次王羲之頓首歌章輒付卿或有寫書人者可寫一道與吾也羲之死罪去冬在東鄮因還使白牋伏想至自頃公私無信便故不復承動静至於詠徳之深無日有隧省告可謂眷顧之至尋翫三四但有悲慨民年以西夕而衰疾日甚自恐無蹔展語平生理也以此忘情將無其人何以復言惟願珍重為國為家時埀告慰絶筆情塞羲之死罪六月十一日羲之報道䕶不救疾惻怛傷懐念弟聞問悲傷不可勝奈何奈何曹妹累䘮兒女不可為心如何得二十三日書為慰及還不次王羲之報追尋傷悼但有痛心當奈何奈何得吾慰之吾昨頻哀感便欲不自勝舉旦服㪚行之益頓乏推理皆如足下所誨然吾老矣餘願未盡唯在子輩耳一旦哭之埀盡之年轉無復理此當何益冀小却漸消㪚耳省卿書但有酸塞足下念故言㪚所豁多也王羲之頓首向遣書想夜至得書知足下問當逺行諸懐何可言一十必早發想足下如向期也阮矦止於界上耳向書已具不復一一王羲之白宿息想足下安書吾猶不勝能佳一十早徃遲王羲之頓首二十九日羲之報月終哀摧傷切奈何奈何得昨示知弟下不斷昨紫石㪚未佳卿先羸甚羸甚好消息吾比日極不快不得眠食殊頓勿令合陽冀當佳力不一一王羲之報九月二十八日羲之頓首頓首昨者書想至叅軍近有慰阮光禄信在耳許中郎家欲因書比去報知庾君遂不救疾摧切心情不得自塗两三字甚痛當奈何㴱當寛勉以不忘先心臨紙但有酸惻王羲之頓首羲之白不復直有勞得示足下佳為慰吾却遽又睡甚勿勿力不具王羲之白十一月五日羲之報適為不吾悉不適弟各佳不吾至勿勿力數闕羲之報兄弟上下逺至此慰不可言嫂不和憂懐㴱期等殊勿勿燋心桓公不得敘情不可居處雲子諸人何似耿耿能數省否彥仁數問也修載蹔来忻慰六月十九日羲之白使還得八日書知不佳爾何耿耿僕日弊而得此熱勿勿解白耳力遣不具王羲之白十二月一日羲之白昨得還書知極不加疾人甚憂耿耿消息比佳耳吾至乏劣為爾日日力不一一羲之報想明日可謝諸子十四日羲之白近反不悉闕两足下佳不不得近問問無殊不佳頓劣因不一一羲之白羲之頓首何貺知意至諸君皆困乏常想無之何縁作此煩損今付還王羲之長高當暫還耶范公書如此今示君湏庾見故當勸果之告㫖語君遲而不可言一日多恨知足下㪚動耿耿䕶䕶吾至不佳劣劣不一一王羲之頓首司馬疾篤不果西憂之㴱公私無所成知比得丹陽書甚慰乖離之歎當復可言尋荅其書足下反事復行便為索然良不可言此亦分耳遲靣一一比日尋省卿文集雖不能悉周徧尋翫以為佳者名固不虚序述髙士所𫝊小有異同見卿一一問應止楊王孫前以共及意同可誠述敘之耶暇日無為想不忘之初月一日羲之白忽然改年新故之際致歎至深君亦同懐近過得告故云腹痛懸情災雨比復何似氣力能勝不僕為耳力不一一王羲之旦書至也得示為慰云小大多患念勞心遲見足下未果為两字注結力不一一王羲之白三日先疏未得去得四日疏為慰兄書已具不復一一鎮軍昨至尚未見也尋見之悲欣不可言上下近問慰馳情不知何似絶不得松問汝得㫖問馳白宜豫知分春事也吾日東可語期令知消息復數橘子即云乃好可噉乆得新栗此院冬桃不能得多送觸事何當不存徃恒語然獨折知書有去縣犇去誠意義官至也有禮制恐不必果耶且君在彼縣常以為得意宜􅋠之耶意至故示兄子發尚未有定日當送至瀾逺乖不可復言適欲遣書㑹得足下示十九日羲之報迎書反至也得八日書知吳故羸敬倫動氣發耿耿想得冷此為佳也敬文佳不一一羲之報省足下前後書未嘗不憂欲與事地相與有㴱情者何能不恨然古人云行其道忘其為身真卿今日之謂政自當豁其胸懐然得公平正直耳未能忘已便自不得行然此皆在足下懐願卿為復廣求於衆所悟故多山之髙言次何能不十一月七日羲之報近因闕子卿書想行至三字注霜寒弟可不頃日了不得食至為虚劣力及數字羲之報二十三日羲之報一日得書皆在計書所不得有反轉熱卿各佳否定何可得来遲直不一一羲之報知須果裁便可遣取視君勢陳欲欲無出理近書至也得十八日書為慰雨蒸比各一字注可不叅軍轉差也懸耿吾胛痛劇炙不得力至患之不得書自力數字尊夫人向来復何如為何所患甚懸情念卿累息具至羲之欲問想諸舍人小大皆佳弟摧之可為心且得集目下此慰多矣姉累告安和梅妹大都可行袁妹極得石㪚力然故不善佳疾久尚憂之想野久恙至善分張諸懐可云不知其期何時可果永嘉競逐者有力恐難冀得大柿當種之篤不喜見客篤不堪煩事此自死不可化而人理所重如此都郡江東所聚自非復弱幹所堪足下未知之耳給領與卿同殊為過差交人士因開門以勉待之無所復言君逺在此乃受恩来今畱之朙晩共親親集想君未便至餘姚爾云殷生得快罔大事數謝生書但有藥耳云彥仁或宣城甚佳情事實宜今有云想㴱復征許也寂不得都問知卿云曰問故未知西審問使人憂耿得問示信使甚數而無還者似書疏不可得得問宜示告之知長翔田舍比卿還當知何候湏得音副民朢甚善羲之白霧氣足下各何如長素轉佳甚耿耿冀行直遣知問王羲之白昨道諸書今示卿相見之恐殷矦必行義朢雖宜爾然今此集信為未易卿者便西者良不可言也晴快足下各佳不長素轉佳也甚耿耿故知問具示王羲之白足下晚可耳至劣劣力不一一王羲之白十二月二十四日羲之報嵗盡感歎得十二日書為慰大寒比可不吾故羸乏力不一一王羲之報藥湯諸人佳也今知問朱博士何當還君可致意令速還想無稽畱吾至今目欲不復見字見君小大佳不過此乃知熙佳覺少不得同萬恨萬恨云出便當西念逺别何可云遲見𤣥度今或以在道賓諸人佳不皆致心憶之不忘懐妹不快憂勞餘平安初月十二日羲之累書至得去月二十六日書為慰比可不僕下連連不斷無所一欲噉輒不化消諸弊甚不知何以救之罔極然及不一一義之白昨近有書至此故不多也遲書不悉耳知尚書中郎差為慰不得吴興問懸心數吴中聞耳小奴在此忽患瘧比數發今日最為大都輕瘧耳尚小停今在吾廐中念猶懸心小患耳無所埀心湏佳乃去此言不可乏得知足下問吾忽忽力數字直遣軍使者可各差十五人耶合三十人足周事足下知消息今故遣問使至具示之力書不一一王羲之白方回遂舉為侍中都下書云殷生議論殊異處憂之道故􅋠同嵗寒盡對此書還論亦不能佳體懐省無所乏然卿供給人士及使役吏人論者亦謂大任意在世中政自不得不小俯仰同異卿復為意卿此懐亦當𤣥同不能勉人耳見尚書一日遣信以具必宜有行者情事恐不可委行使耶遲還具問亦以與尚書諮懐今復遣諮吴興也官舍佳也節氣不適可憂彼云何昨得羲書比佳甚慰甚慰得官奴晉寜書賓平安念懸心此粗佳一日書此一一民以頃情事不可不勤􅋠自補節勤以食噉為意乃勝前者而氣力所堪不如自䘮初不哭不能不有時惻愴然便非所堪哀事損人故最㴱益知不可不豁之知足下數祖伯諸人問助慰絶不得兄子問懸念可言此於南北旨使無理比欲歎乆也亦同失人竝欲勿勿羣從書皆佳道冲書平安汝當改葬不可云勞冲遇此事或復連畱省告一一足下此舉由来吾所具卿所云皆是情言然權事慮之重則當廢情以從宜非書所悉見卿一一吾陟冬節便覺風動日日増甚至去月十日便至委篤事事如去春但為輕微耳尋得小差固爾不能轉勝沈滯進退體氣肌肉便大損憂懐甚湥今尚得坐起神意為復可耳直疾不除晝夜無復聊賴不知當塗一字得蹔有間還得闕其寫不如今忽忽日前耳手亦惡欲不得書示令足下知問七月十五日羲之白秋日感懐㴱得五日告甚慰晚熱盛君比可不遲復後問僕平平力及不一一王羲之白知君患隱何以及爾是為疲之極也一知此事恐不可以不絶骨肉之愛無論人事也乃甚憂君若自量過歎患不以輕心者一事不爾當何理鄙故勿勿飲日三㪷小行四升至可憂慮如桓公書旨闕其不去恐不能平此信過不得熙書想其書一一也小大佳不賓轉勝皆謝之賢妹大都勝前至不欲食篤羸􅷳令人憂餘粗佳阿刁近来到卞上下皆佳姜夫數白得書知足下且欲顧何以不進耶向與謝生書說欲徃知登停山停山非所辯故可共集謝生䖏登山可他日耶王羲之白不得君家書疏多徃来皆平安耳今年此夏節氣至惡當令人危幼小疾苦故爾憂勞不可言七月二十一日羲之白昨十七日告為慰極有秋氣君比可耳力及不一一王羲之頓首近復因還信書至也得九日問亦云鄙平平想得凉轉勝以疾乃服法必解此意来月必欲就到家而得其問云尚多溪毒當復小却耳僕故有至臨州意尚未定自更有果南行者還乃得至夀春耳得都九日問無他得豫章書為慰想以具問昨得都十七日書賊徑還蠡臺不攻譙是其反善之誠也想殷生得過此者猶令人憂期諸處分猶未定羊㕘軍旦夕至也遲一一殷廢責事便行也令人歎悵無已安石定目絶令人悵然一爾恐未䘚有散理期諸處分猶未定憂縣益㴱念君馳情又遣從事發遣君無復坐理交疾患何以堪此何以堪此恐屬無所復厝懐即乖大小不可言且憂君以疾他曵不易得司州書轉佳此慶慰可言云與君數數或採藥山崖可願樂遥想而已云必欲剋餘杭之遲期此不可言要湏君㫖問僕事中乆宜蹔東復令白便行還便行當至剡槌上二十日後還以示政當與君前期㑹耳遲此情兼二三昨暮得無奕阿萬此月二日書甚近清和耳羌賊故在許下自當了也桓公未有行日阿萬定闕吴興未復宏道近書見與宏逺書恐卿不得乆坐何如休稚𤣥佳不想數得足下㫖令知問曚風膠今年似晩来年其主不起首者想或可得借乎得反又獲示知足下發動脅腫卿此疾苦甚似期一一想消一當轉佳為何治也吾為亦劣大都復是平平隔耳許日前後有其効何喻冀凉日晩㪚耳尋復知問王羲之羲之頓首賢女殯斂永畢情以傷惋不能已己兄足下愍悴㴱至何可為心奈何奈何不能無時之痛憂卿便㴱今何如患湥達既徃吾志勿勿力知問臨書惻惻王羲之頓首賢室何如何可為心唯絶難於人理耳諸患猶爾憂勞㴱似闕江矦關到行底足下遺臨惙次冷取書得謝范六日書為慰桓公威勲當求之古令人歎息比當集姚襄也斷酒事終不見許然守之尚堅弟亦當􅋠同此懐此郡斷酒一年所省百餘萬斛米乃過於租此救民命當可勝言近復重論相賞有理卿可復論知數致苦言於相時弊亦何可不耳頗得應對不吾書未被荅得桓䕶軍書云口米増運皆當停為善問董祥吾亦問之冀必来兵時得之甚佳頃日憒憒不暇復此省示及乃復憶之耳周公東征四國是遑誠心欵著謂之累積頻頻書想至隂寒想自勝常皇矣漢祖纂堯此四字真後闕羲之死罪荀葛各一國佐命宗臣觀其轍迹實竒士也然荀獲譏於憂䘚意長恨恨謂其𢎞濟之心宜被大道諸葛經國達治無間然處事而無玷累獲全名於數代至於建鼎足之勢未能忘己所謂命世大才以天下為心者容得爾乎前試論意乆欲呈多疾憒憒遂忘致今送願因暇日可垂試省大期賢達興廢之道不審謂粗得阡陌不信所懐願告其中并爾郎子意同異復云何邈然無諮敘之期毎賜翰墨使如蹔展羲之死罪此一帖真行足下行穰乆人還竟應快不大都當任縣量宜其令闕二字因便任耳立俟王羲之白足下各可不都五日書今送謝即至想源得免豺狼耳王羲之羲之死罪近因周𠫭筆白牒伏想必達此春以過時速與㴱兼哀傷摧切割心情奈何奈何湏㬰寒食節不審尊體何如不承問以經月馳企民疾根治滯了無差候轉乆憂㴱叔闕遣信自力粗白不宣備羲之死罪墳墓在臨川行欲改就吳中終是所㱕中軍徃以還田一頃烏澤田二頃吳興想弟可還以與吾故示想弟居意故如徃言忠終髙也是以􅋠同之此三頃田樂呉舊耳云卿軍府甚多田也已上八字注宐須一用心吏可差次忠良十九日羲之頓首明二旬増感切奈何奈何得十二日書知佳為慰僕左邊大劇且食少至虚乏力不一一王羲之頓首十二日告李氏甥得六日書為吾劣劣力不一一羲之書行書羲之死罪復蒙殊遇求之本心公私愧歎無言以喻去月十一日發都違逺朝廷親舊乖離情懸兼至良不可言且轉逺非徒無諮覲之由音問轉復難通情慨湥矣故㫖遣承問還願具告羲之死罪羣從彫落將盡餘年幾何而禍痛至此舉目摧喪不能自喻且和方左右時務公私所賴一旦長逝相為痛惜豈惟骨肉之情言及摧惋永往奈何袁妹委篤示致問荒憒不得此熱不能不取給腹中便復惡無賴羲之死罪累白想至雨快想比安和遲復承問下官劣劣日前可力白不具王羲之死罪皆以具示復自耳羊叅軍尋至具一一子期諸人何似耿耿心制行終不可居處餘皆平安也此五字一行闕及以令弟食後來想必如期果之小晚恐不展也故復㫖示羲之報増運白米來者云必行此無所復云吾於時地甚疏卑致言城不易然太老子以在大臣之末要為居時任豈可坐視危難今便極言於相并與殷謝書皆封示卿勿廣宣之諸人皆謂盡當今事宜直恐不能行耳足下亦不可思致若言耶人之至誠故當有所面不爾坐視死亡耳當何當何已下闕吾復五六日至東縣還復至問想官舍佳見䕶軍近書甚慰仁祖轉嘉然疾根不除尚令人憂復得問未復反書甚慰入月共至窟山看甘橘􅋠君宜深想鐵已還旦夕展也故復㫖示羲之報小大佳也不得尚書中書問耿耿得業書慰之亦得業書為慰今付還安方決去不言言即卿書致適阮兒書其氣㪚㬥處便危篤憂之怛怛貴奴差不想不成大病傷寒可畏令人憂當盡消息地蚶二斛厲二斛前示噉蚶得味今㫖送此想噉之故以為佳比來食日幾許得味不具示所欲示之一行若治風教可𢎞今忠著於上義行於下雖古之逸士亦將眷然况下此者觀頃舉厝君子之道盡矣今得䕶軍還君屈以申時𤣥平頃命朝有君子曉然復謂有容足地常如前者雖患九天不可階九地無所逃何論於世路萬石僕雖不敏不能期之以道義豈苟且豈苟且若復以此進退直是利動之徒耳所不忍為所不以為上方寛愽多通資生有十倍之覺是所委息乃有南眷情足謂何以密示一勿宣此意為與卿共思之省以付火諸暨始寧屬事自可得如教丹陽意簡而理通屬所無復逮録之煩為佳想君不復須言謝丹陽亦云此語君諸暨始寧古之辭世者或被髪徉狂或汚身穢迹可謂艱矣今僕坐而獲免遂其宿心其為幸慶豈非天賜違天不祥四字注頃東遊還修治桑果今盛敷榮率諸子抱孫遊觀其間有一味之甘割而分之以娯目前雖植德無殊邈猶欲教養子孫以敦厚退讓戒以輕薄庶令舉䇿數馬彷彿萬石之風君謂此何如遇重熙去當與安石東遊山海并行田盡地利頤養閒暇衣食之餘欲與親知時共歡讌雖不能興言高詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡於此也君察此當有二言不真所謂賢者志於大不肖志其小無縁見君故悉心而言五字注以當一面想大小皆佳知賔猶伏爾耿耿想得夏節佳也念君勞心賢妹大都轉差然以故有時嘔食不已是老年衰疾更亦非可倉卒大都轉差為慰以大近不復服㪚當將陟釐也此藥為益如君告大都夏冬自可可春秋輒有患此亦人之常期等平安姜此羸少差先生至其歡慰且卿女一而已大㛰定芳勢道也先生頃可耳今日略至遲委埀知樂公可為之慰桃膠易得可以少耶専一物不移乃不忠也充迎不致意知陽意事迎願人之善行政五十日不復得問懸情皆佳也闕何貽云得潁陽書平安慰意不得呉諸人問懸遲之古之御世者乃志小天下今封域區區一方任耳而恒憂不治為時耻之但今卿重熙之徒必得申其道更自行有餘力相𢎞也甲夜羲之頓首向遂大醉乃不憶與足下别時至家乃解尋憶乖離其為歎恨言何能喻聚㪚人理之常亦復何云唯願足下保愛為上以俟後期故㫖遣此信期取足下過江問臨紙情塞王羲之頓首足下識先日之言信信具此一帖似闕前得君書即有反想至也謂君前書是戲言耳亦或謂君當是舉不失親在安石耳省君今示頗知如何老僕之懷謂君體之方復致斯言愧誠心之不著若僕世懷不盡前者自當端坐觀時直方其道或將為世大明耶政有救其弊算之熟悉不因放恕之㑹得期於奉身而退良有已良有已此共得之心不待多言又餘年幾何而逝者相尋此最所懷之重者頃勞服食之資如有萬一方欲思盡頤養過此以往未知敢聞言止於今也知諸賢往數見范生亦得其近書為慰又得孔生書亦云不能數何爾耶江生可耳斷絶冀涼集也得司州十六日書諸疾患至憂之至深矣有斷未想桓公數便亦知謝生大得情和至慰安以當至呉興遲見之也知須米告求常如雲此便大乏勑以米五十斛與卿有無當共何以論借今有教勑付米可送之數上下問如常何可得集耶念馳情未異果為結念致問不得東陽問想卿婦遂平復耳聾佳不謝之幼小頃可行華母子平安知足下故望暫還嵗内何理過嵗必有理不思存足下復得一叙平生當可言得卿書尋省反復但有悲慨比者且當數致年知闕一字畢力果思遲言面不可復得此與范期後月五日遂乃剋耳還遣㫖進頃猶小差欲極遊目之娯而吏卒守之可歎耳陽化果似小可何日得卿諸人鄙疾進退憂之甚深使自表求解職時以許乃當是公私大計然此舉不深又不宜是之於始二三無所成可以示從女其劣欲知消息足下所欲餘姚地輒勑驗所須輒告此雨過將為受想彼不必同苗稼好也比見敬祖小大可耳念孫阮諸人皆何似耿耿尚書中郎諸人皆佳比面雖近隔殊思卿度還旦夕吾頃胸中惡不欲食積日勿勿五六日來小差尚甚虚劣且風大動舉體急痛何耶賴力及足下家信不能悉王羲之永和九年嵗在癸丑暮春之初㑹于㑹稽山隂之蘭亭修禊事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懐足以極視聼之娱信可樂也夫人之相與俯仰一世或取諸懷抱悟言一室之内或因寄所託放浪形骸之外雖趨舍萬殊静躁不同當其欣于所遇蹔得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俛仰之間以為陳蹟猶不能不以之興懐况脩短隨化終期於盡古人云死生亦大矣豈不痛哉每攬昔人興感之由若合一契未嘗不臨文嗟悼不能喻之於懷固知一死生為虚誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列叙時人録其所述雖世殊事異所以興懷其致一也後之覽者亦將有感於斯文纒利害未若任所遇逍遙良辰㑹其一三春啓群品五字草寄暢在所因仰眺望天際俯瞰緑水濱寥朗無涯觀寓目理自陳大矣造化功萬殊莫不均群籟雖參差適我無非新其二猗歟二三子莫非齊所託造真探𤣥退涉世若過客前世非所期虛室是我宅自前字至宅字注逺想千載外何必謝曩昔相與無所與形骸自脱落其三鑑明去塵垢止則鄙郄生體之周未易三觴解天形方寸無停主務伐將自平雖無絲與竹𤣥泉有清聲雖無嘯與歌詠言有餘馨取樂在一朝寄之齊千齡其四合㪚固有常修短定無始造新不蹔停一往不再起於今為神奇信宿同塵滓誰能無慷慨散之在推理言立同不折河清非所俟其五十一月四日右將軍㑹稽内史瑯琊王羲之敢致書司空高平郗公足下上祖舒散騎常侍撫軍將軍㑹稽内史鎮軍儀同三司夫人右將軍劉闕女誕晏之允之允之建威將軍錢塘令㑹稽都尉義興太守南中郎將江州刺史衛將軍夫人散騎常侍苟文女誕希之仲之及尊叔廙平南將軍荆州刺史侍中驃騎將軍武陵康侯夫人雍州刺史濟隂郄說女誕頤之胡之耆之美之内兄胡之侍中丹陽尹西中郎將司州刺史妻常侍譙國夏侯女誕茂之氶之羲之妻太宰高平郗鑒女誕元之凝之肅之徽之操之獻之肅之授中書郎驃騎諮議太子左率不就徽之黄門郎獻之字子敬少有清譽善𨽻書咄咄逼人仰與公宿舊通家光隂相接承公賢女淑質直亮確懿純美敢欲使子敬為門閭之賓故具書祖宗職諱可否之言進退惟命羲之再拜此是郗家論婚書書迹似夫人良深路滯乆矣况今季末無所多怪足荒何卹於此足下志嶠外有由來及然以勢觀之卿入貴於不令耳書政當爾王羲之白知以智之所無奈何不復稍憂此誠理也然闕之懐何能已已乎未能得面書何所悉怛深得近期蹔還故因教初日月吾湖孰縣須水田卿都可遣僦之墓不知處去年僦之者似是俞進可問之卿不出停此親往為慰思後諸能數不想昨咁兄以日此粗佳二謝叔喪興公近便索然𤣥度來數日有疾患便復來阿萬小差大事問有重慮安佳行來遇大蕩然阮公政散耿懐祖可呼賀祭酒俱足下欲同至上虞一宿還無所廢吾初至便與長史俱行無不可不吾為卿任此聲者但此懐自不復得闕之於時小大皆佳也度有近問不得上虞甚佳足下當能相就不思面卿前云當來何能果也遲㪚無喻吾後月當出以省念示下近欲麻紙適成今付三百寫書竟訪得不得其人示之省書知定疑來汝君長臈所飬雖小要為喪玉劉夫人靈坐在堂政爾逺來於禮誠不可違所以狼狽逺迎汝情地信難忍交恐有性念慮得來想慰釋實引是以下復思此耳若汝能割遣無益得過喪制遂來居此乃事宜也若自量不能違哀念須呉等旦夕相喻者當來汝當自若呉意盡此也若來大小祥當復出者殊更良昌若汝不出農當單出汝能遣農速行不諸宜皆當自詳計審日遲望而更未定殊更悵恨不可言此乃為汝求宅謂汝來居止理軍千何可乆處而情事不得從意可歎可歎終果來居者故當為汝求也以書示農初月二日羲之頓首忽然此年感逺兼傷情痛切心奈何奈何念君哀窮奄經新故仰慕崩絶豈可堪忍比各何似相憂不忘當深消息以全勉為大僕衰老殆是日不如日力知問王羲之頓首思率府朝得書知問足下差但尚頓極之不一一初月一日羲之報忽然改年感思兼傷不能自勝奈何奈何異更寒諸疾此復何似不得問多日懸心不可言吾猶小差甚尚劣力遣不知羲之報卿各何罪似先羸而處至痛憂涕深重得之思寛遣吾並乏劣自力不報息此上下可耳出外解小分張也須產往迎慶思之不可言知静婢面猶爾甚懸心袁妹當來悲慰不言下家當慰意令知之期小女四嵗暴疾不救哀敏痛心奈何奈何吾衰老情之所寄惟在此等失此女痛之纒心不能已已可復如何臨紙情酸知静婢猶未佳懸心可小須留爾十月十五日羲之頓首月半哀傷切心奈何奈何不可居忍得十三日書知問此何似恒耿耿吾至勿勿小佳更致問王羲之頓首謝范新婦得闕富春還諸道路安穩甚慰心比日涼即至平安也上下集聚欣慶也華等佳不自新婦母子去寂寞難言思子輩不可言羲之死罪伏想朝廷清和稚恭遂進鎭東西齊舉想尅定有期也羲之死罪死罪羲之白乖違積年毎惟乖苦痛切心肝惟同此情當可居處羲之脚不踐地十五年無由奉展比欲奉迎不審能垂降不豫唯哽闕故先承問羲之再拜再昔來熱如小有覺然晝故難堪知足下患之云故以圍棊是不為患吾其爾無佳自得此熱顦顇終日未果如何王羲之頓首五月二十七日州民王羲之死罪死罪此夏復便半闕惟違離衆情兼至時増傷悼頃雨水未知有不審尊體如何得疾除也不承近問馳企民自服橡屑下斷體氣便自差强此物益人斷下去陟釐刼樊逺也以為良方出何是真此之謂謹及因青州白牒不備羲之死罪死罪寒伏想安和小大悉佳奉展乃具羲之死罪見子卿具一一荒民惠懐塗一字最要也甚以欣慰惟愿不倦為善承畱此生當廣陵任佳此生處事以驗海陵江闕間殊令人有懐也羲之死罪死罪想元道𢎞廣平安道充當得還不羲之頓首凉君可不女差不耿耿想比能果力不王羲之頓首頓首阮信止於界上耳向書已具不復一一王羲之頓首昨得殷侯答書今寫示君承無怒詔連思順從或有怨望其不宜盤桓或順從至嫌也想復深思驗同罪一行十二月十日羲之白近復追付期想先後三字注皆至昨得二十七日告知君故乏劣腹痛甚懸情灾雨比日復何似善消息遲後問復平平不一一王羲之白知尋遣家信遲具問向遣書想夜至得書知足下問當逺行諸懐何可言十一必早發想至足下如向期也行當是防民流逸不以為利耶此於郡為由上守郡更尋詳若不由上命而斷中求絶者此為以利卿絶之是也縱民所之恐有如向者流㪚之患可無善詳具聞君欲船輒勑給所須告之得君戲詠承念至此年乃未見太保思一㪚知足下歸乃至孔建安家熱乃爾徃還以十實非乏所堪若之不復兩字注更尅近道唯命是徃矣恐有簿書之煩益屬所事可立制縣不給下貧二字注而給饒有之家開令治國别許為盛田不平者嚴制如此事省而虚實可知其或非所樂而絶付給者今為不賦得里人遂安黄籍前年皆斯人非復一條可歎今便獨坐令白郄侯求官邈等想必可得君亦當得見書若萬一不樂想可共思得州二字注數十家見經營不爾無坐此理也别當以具慰深共思不待煩言十二月二十二日羲之白節近感歎情深得去月二十三日書知君故苦日耿耿善䕶之往不僕得大寒疾不堪甚力還不具王羲之白十四口疏昨信未即取遣適得孔彭祖書得其弟都下七日書説雲子暴霍亂亡人理乃當可耳惋惋桓公周生之痛豈可為心禇映農敬親同日至至數日耳道路平安為慰妹且停為大慶懷充知弟不果行吾不佳面近也玠適書至也知足下明還行復剋面王羲之白小大佳也賢兄如猶當小佳然下不斷尚憂之僧權近所示欲依上虞别上申一期尋案臺報不聴上當戮力於事不可但役解散君縣乃是今勝縣而復以為難耶知足下以界内有此事便欲去縣豈有此理此縣弊乆因足下始有次第耳必無此理便當息意今勑諸處事及縣者省馳書於臺中論必釋然故遣㫖信示意羲之頓首白雨無已不兒猶小差力不一一王羲之頓首省告攝功曹事一一屬以所求寛逋廢守命必欲肅之是以間意其志既立不得不必行普通三年三月徐僧權一十五紙天寳十載三月二十八日安定胡英裝朝議郎檢挍尚書金部員外郎徐浩與殷侯物示當爾不可不卿定之勿疑下字注李母猶小小不和馳情伏想行平康郗新婦大都小差卿大小佳四字别行縫有僧權字近書至也得十八日書為慰雨蒸各可不參軍轉差也懸耿吾胛痛劇灸不得力至患之不得書自力數字縫上僧權字不全開元十五年跋尾其折處非本卷翰印楷處足下當為逺慮不可計日前僧權省示知足下奉法轉到勝理極此此故蕩滌塵垢研遣滯慮可謂盡矣無以復加四字注漆園比之殊誕謾如下言也吾所奉設教意政同但為形迹小異耳方欲盡心此事所以重增辭世之篤今雖形係於俗誠心終日常在於此足下試觀其終懷充褚映適都十五日問清和傳賦問定寂寂當是虚也然始興郡奴屯結不肻出恐成令人邑邑想官吏長制之耳褚映雨寒卿各佳一字注不諸患無賴力無不一一羲之問君清庾雖篤疾謂必得治力豈圖凶問奄至痛惋情深半年之中禍毒至此尋念相摧不能已已况弟情何可任遮等荼毒備盡當何可忍視言之酸心奈何奈何可懷君懷此公立德由來而嬰斯疾毎以惋惋常冀積善之慶當獲濳佑契同㫺人尋億闕事緬然永絶哀惋深至未能喻心省足下書固不可言已矣可復奈何絶筆流涕足下各可耳復雨可厭若吾所噉日去不復辭此意想足下明必顧之遲㪚羲之頓首范公及阮公既并㣲㫖足下謂合損益之耳不謝羲之死罪累白至也辱十四日告慰情念轉塞想善平和下官至匆匆自力白羲之死罪諸人何似耿耿遣令使白恐不時至耳奉黄柑二百不能佳想故得至耳船信不可得知前者至不云停雲子代萬頃桓公至今令荀臨淮權領其府懷祖都共事已行前僧權月十三日羲之頓首追傷切割心不能自勝奈何奈何昨反想至向來快雨想君佳方得此雨為佳深為欣喜信既乏劣又頭痛甚無闕力不一一王羲之頓首兄靈柩埀至永惟崩慕痛貫心膂痛當奈何計慈顔幽翳十三年而吾勿勿不知堪臨始終不發言哽絶當復奈何吾頃至劣劣比加下昨羲之頓首想創轉差僕其爾未欲佳憂憒力知問王羲之頓首長史劉信三月十三日羲之頓首近反亦至念足下哀悼之至不可勝更寒外足下何如吾劣劣力遣知問王羲之頓首書雖備至聚宜有以宣事情今遣羊參軍西諸懷所具必欲一字注今觀想可思今得時面克令得還也僧權徐浩羲之白一日殊不叙闊懐得書知足下咳劇甚耿耿䕶之冀以㪚力不一一王羲之白知德孝故平平想當轉得㪚力毎耿耿不忘懷足下大小佳不忽然夏中感懷冷冷不適足下復何似耿耿吾故不佳得逺近問不虞生何當來遲一集昨見無奕十九日三字注書二十六日西也云仁祖服石㪚一齊不覺佳酷羸至可憂力知問王羲之書白書成得十一日疏甚慰三舍動静馳情先書已具不得一一知汝表出便去不得見汝此何可言想秋必還恐此書不復及汝不一一滉後有四行字是韓晉公章草批九家真慰鸞開鶴瑞集客登秦望書一紙孔侍郎著作闕三字朝當時侍從庾參軍兄弟三人輒承命參軍弟至都孫道常約孔東遷駒承命長曹言切勑侍從承命謝功曹長旭故夫謝輶死罪死罪奉命輒侍從塗三字孔孝亷前吏孔琨死罪命違輒侍從王征東郎最言輒當侍從孫參軍定伯承命王逸少字注頓首謝七日登秦望可俱行當早也僧權闕字諸患者復何如懸心比疏已具不復一一桓安西觀自代蜀五書勿勿未得遣信又不知足下問吾既不快弱小疾苦甚無賴損尚小停有定定字注去日更與足下相聞還不具王羲之白兒故未至不知何父知足下念適書至也此人須當令埿想足下可為停之故示王羲之頓首徐僧權徐浩六月三日羲之白徂暑此嵗已半載慨深可得二十七日書知足下安頃耿耿愁増患耶善消息吾至勿勿常恐一夏不可過不一一王羲之白賊以還不知遇官軍云何可深憂之欲依上虞初到别上令勑聴之縣事不同直不相連耳旦奉祠感思悲慟得書知問吾之劣力不一一王羲之問僧權重熙去具今子日與曹諭謝嶧吾又不下蔡書一一足下清談四字注想必有理耳長任比得解未吾與二字注江生論書荅如此足下思所向示之要至懷也須卿示王逸少頓首敬謝各可不欲小集想集後能果想曹叅軍疾者已往必能同來得告慰為妹下斷以為至慶吾比日至未果殊有邑想王羲之頓首見𢎞逺二書皆以逺也動㪚即佳為慰足下晚各何似恒灼灼吾坦之欲不復堪事内然力不一一王羲之頓首前邊僧權後邊珍足下各復何似恒灼灼故問王羲之白足下似有董仲舒開閉隂陽法可勑令料付不雨憂之深珍重曹庾王六君别六字别行僧權羲之頓首君可不語差也耿耿力之問王羲之頓首上下無恙從妹佳也得敬和近問不人有至憂其疾者令人深憂隔乆何日能來六字别行曹叅軍三字别行珍哲弟僧權開元五年闕十五日倍戎副尉臣張善慶裝云云累書想至君比各可不僕近下數日勿勿腫劇數爾進退憂之轉㴱亦不知當復何治下由食榖也自食榖小有肌肉氣力不勝更生餘患去月盡來停榖噉麫復平平耳知𤣥度在彼善悉也無由見之此何可言今與王㑹稽丘山隂書借人想故當有所得又語丘令臨𦵏兩字注必得耳縫上僧權知劉公差甚慰甚慰知前乃爾委頓追以怛然今轉平復也阮公近聞不萬轉差也已上右軍書語都計四百六十五帖大令書語得諸慰意吾故冀惡㝷視汝又告未復東近動静馳情昨即遣行為不至耶如省此二字一行僧權二十三日獻之問得十九日書之間後何如吾故劣力不一一王獻之問向聞遊諸縣作今退念時事闕覽之後復慨然縫上起居郎臣禇遂良姜珍五月十二日獻之白節過感懷深至念痛傷難勝得五日告知君轉勝甚慰甚慰雨過此復何如想消息日平復也謹僕近暴不佳如惡氣當時極惡賴即退耳故虚劣勿勿還不多王獻之白知祖希佳為慰慰數不得書其云至水門増深款之思想轉思省告知君亦同如今未知面期近逺此慨可言惟深保愛數音問尋故㫖取君消息適得元直二十三日疏送白鮓今送十裹似並猶堪噉獻之白信明還東有還書願送來已今分明至著都上慰之吾故沈頓思見之故想時能問疾得來先報之不能得自致者㫖取車王獻之答獻之白兄静息應佳何以復小惡耶復想比消息理盡轉勝耳礐石深是可疑事兄憙患㪚輒發癰熱積乃不易願復更思惟賴消息獻之内外二字注極生冷而心腹中恒無他此一事是差但疾源不得佳論事當隨宜思之也獻之白又一行屈猶存湏見出欲獻之白奉承問近雪寒患面疼腫脚中更急痛兼少下甚馳情轉和佳不審尊體復何如得此諸患少差不復思何如幸能復㪚故鎮益乆藥何以不更將之遲尋復㫖若獻之弊於淡飰飲得春風氣惽亂言故欲熱復食酒為腹可耳獻之白縫上紹宗㸃處各闕一字獻之白承姉故常惡不審得春氣復何如冬馳情餘安和至寧此故耳獻之白育等可不轉思見之知恩慕不中鍾紹京僧權忽動小行多晝夜十三四起所去多又風不差脚更腫轉欲書疏自不可已惟絶歎於人理耳二妹復平平昨來山下差静岐當還知汝決欲來下是至願然嫂當得供養冀郡固有理若宣城瑯琊不果南有空缺可作者計信還具白當與在事論為不可須留者便可決作來下記也上方大枋想汝不過數枋足彼故當足合偶此耳人方當粗足不果耳可白吾當託桓江州助汝此不辨得遣人船迎汝當具東改枋枋三四吾小可三字注當自力蕪湖迎汝故可得五六十人小枋諸謝當有便是見今當語之大理盡此信還一一白胛痛不可堪而比作書欲不能成之張彦逺河東人能文工字學𨽻書喜作八分其家既出累世縉紳之後且復好事故藏積圖書如鍾張衛索王羲獻而下每至成軸其大父稔已有書名初得鍾繇筆意壯嵗遂倣獻之莫年人許有羲之風度葢凡三變而後成此其遺風餘澤沾馥後人者特非一日彦逺既世其家乃富有典刑而落筆不愧作者觀其為論以謂書非小道本以助人倫窮物理神化不能以藏其秘靈怪不能以遁其形則知盤礴胸次者固已吞雲夢者八九矣其流於筆端自應過人矧夫歴代竒觀一一到眼而心傳手受處復有家學耶嘗作法書要錄一十卷具載古人論書語且以傳列之又以九等品第書學人物自漢至唐上下千百載間其大筆名流幾不逃彀中矣更撰歴代名畫記為十卷自序其右云得此二書則書畫之事畢矣觀其編次之善果非虚論又嘗以八分録前人詩什數章至其倣古出奇亦非凡子可到出畫譜本傳法書要録卷十
