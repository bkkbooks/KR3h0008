body:
  text: 法書要録卷四唐張彦逺撰顔師古注急就章不録張懐瓘書估張懐瓘二王等書録張懐瓘書議張懐瓘文字論張懐瓘六體書論不録唐朝敘書録韋述敘書録盧元卿法書録唐張懐瓘書估有好事公子頻紆雅顧問及自古名書頗為定其差等曰可謂知書矣夫丹素異好愛惡罕同若鑒不圓通則各守封執是以世議紛糅何不製其品格豁彼疑心哉且公子貴斯道也感之乃為其估貴賤既辨優劣了然因取世人易解遂以王羲之為標凖如大王草書字直一百五字乃敵一行行書三行行書敵一行真正偏帖則爾至如樂毅黄庭太師箴畵贊累表告誓等但得成篇即為國寶不可計以字數或千或萬惟鑒别之精麤也他皆倣此近日有鍾尚書紹京亦為好事不惜大費破産求書計用數百萬錢惟市得右軍行書五紙不能致真書一字崔張之跡固乃寂寥矣惟天府之内僅有存焉如小王書所貴合作者若藁行之間有興合者則逸氣盖世千古獨立家尊纔可為其弟子爾子敬年十五六時常白逸少云古之章草未能宏逸頗異諸體今窮偽畧之理極草縱之致不若藁行之間於往法固殊大人宜改體逸少笑而不荅及其業成之後神用獨超天姿特秀流便簡易志在驚奇峻險髙深起自此子然時有敗累不顧疵瑕故减於右軍行書之價可謂子為神俊父得靈和父子真行固為百代之楷法然文質相㳂立其三估貴賤殊品置其五等三估者篆籀為上估鍾張為中估羲獻為下估上估但有其象盖無其蹟中估乃曠世奇蹟可貴可重有購求者宜懸之千金或時不尚書薫蕕同器假如委諸衢路猶可字償千金其杜度崔瑗可與伯英價等然志乃尤古力亦微大惟妍媚不逮於張芝衛瓘可與張為弟索靖則雄逸過之且如右軍真書妙極又人間切須是以價齊中估古逺稀世非無降差崔張玉也逸少金也大賈則貴其玉小商乃重其金膚淺之人多任其耳但以王書為最真草一槩畧無差殊豈悟右軍之書自有十等黄帝史周宣史鍾繇張芝王羲之崔瑗衛瓘索靖王獻之以上九人第一等蔡邕張昶荀朂皇象韋誕鍾㑹度徳比義並崔張之亞也可微劣右軍行書之價以上六人第二等曹喜邯鄲淳羅暉趙襲崔湜劉徳昇師宜官梁鵠胡昭荀爽張彭祖張宏傅元魏武帝曹植吳孫皓孫權應璩徐幹張昭嵇康何曾衛覬杜預楊肇樂廣劉恢司馬攸衛恒衛夫人衛玠李式王敦郗鑒郗愔韋昶桓元王翼王𨗳王洽王珉謝安庾翼等或奇材見㧞或絶世難求並庻幾右軍草書之價以上四十三人第三等張嘉庾亮郗超王珣戴若思衛瓘僧惠式王修張翼戴安道王元之王凝之王徽之王操之孫興公王允之宋文帝宋孝武康昕王僧䖍謝靈運羊欣薄紹之孔琳之蕭思話張永蕭子良齊髙帝蕭子雲等互有得失時見髙深絶長續短智永力勁可敵右軍草書三分之一以上二十九人第四等張越張融陶𢎞景阮研毛喜僧智永虞世南歐陽詢褚遂良等可敵右軍草書四分之一以上九人第五等以上率皆估其甚合者其不㑹意數倍相懸大凡雖則同科物稀則貴今妍古雅漸次陵夷自漢及今降殺百等貴逺賤近淳漓之謂也凡九十六人列之如右五等之外盖多賢哲聲聞雖美功業未遒空有望於屠龍竟難成於畵虎不入流品深慮遺材天寶十三載正月十八日唐張懐瓘二王等書録夫翰墨之美多以身後騰聲二王之書當世見貴獻之嘗與簡文帝十紙題最後云下官此書甚合作願聊存之此書為桓𤣥所寶𤣥愛重二王不能釋手乃選縑素及紙書正行之尤美者各為一帙常置左右及南奔雖甚狼狽猶以自随將敗並投于江晉代裝書真草渾雜背紙皺起范曅裝治微為小勝宋孝武又使徐爰治䕶十紙為一卷明帝科簡舊祕并遣使三吳鳩集散逸詔虞和巢尚之徐希秀孫奉伯等更加編次咸以二丈為度二王縑素書珊瑚軸二帙二十四卷紙書金軸二帙二十四卷又紙書玳瑁軸五帙五十卷並金題玉躞織成帶又扇書二卷又紙書飛白章草二帙十五卷並旃檀軸又紙書戲字一帙十二卷並書之冠冕也自此以下别有二品書凡五十二帙五百二十卷並旃檀軸其新購獲者為六帙一百二十卷既經䘮亂多所遺失齊髙帝朝書府古跡惟有十二帙以示王僧䖍仍更就求能者之迹僧䖍以帙中所無者得張芝索靖衛伯儒吳大皇帝景帝歸命侯王𨗳王洽王珉張翼桓𤣥等十卷其與帙中所同者王恬王珣王凝之王徽之王允之並奏入祕閤梁武帝尤好圖書搜訪天下大有所獲以舊裝堅強字有損壊天監中勑朱异徐僧權唐懐允姚懐珍沈熾文㭊而裝之更加題撿二王書大凡七十八帙七百六十七卷並珊瑚軸織成帶金題玉躞侯景簒逆藏在書府平侯景後王僧辯搜括並送江陵承聖末魏師襲荆州城陷元帝將降其夜乃聚古今圖書十四萬卷并大小二王遺迹遣後閤舎人髙善寶焚之吳越寶劍並將斫柱乃嘆曰蕭世誠遂至於此文武之道今夜窮乎厯代祕寶並為煨燼矣周將于謹普六茹忠等捃拾遺逸凡四千卷將歸長安大業末煬帝幸江都祕府圖書多將從行中道船没大半淪棄其間得存所餘無幾弑逆之後並歸宇文化及至聊城為竇建徳所破並皆亡失留東都者後入王世充世充平始歸天府貞觀十三年勑購求右軍書並貴價酬之四方妙蹟靡不畢至勑起居郎褚遂良挍書郎王知敬等於𤣥武門西長波門外科簡内出右軍書相共參挍令典儀王行真裝之梁朝舊裝紙見存者但裁剪而已右軍書大凡二千二百九十紙裝為十三帙一百二十八卷真書五十紙一帙八紙随本長短為度行書二百四十紙四帙四十卷四尺為度草書二千紙八帙八十卷以一丈二尺為度並金縷雜寶裝軸織成帙其書每縫皆用小印印之其文曰貞觀大令書不之購也天府之内僅有存焉古之名書厯代帝王莫不珍貴齊宋已前大有散失及梁武帝鳩集所獲尚不可勝數並珊瑚軸織成帙金題玉躞二王書大凡一萬五千紙元帝狂悖焚燒將盡文皇帝盡價購求天下畢至大王真書惟得五十紙行書二百四十紙草書二千紙並以金寶裝飾今天府所有真書不滿十紙行書數十紙草書數百紙共有二百一十八卷張芝一卷張昶一卷並旃檀軸錦褾而已既所不尚散在人間或有進獻多堆於翰林雜書中玉石混居薫蕕同器然書惟不易不以寶之則工棄之則拙豈徒書也人亦如之用舎行藏言行之間不可玷缺亦猶蘭桂雖在幽隠不以無人知而不芳也徃在翰林中見古鐘二枚髙二尺圍尺餘上有古文三百許字記夏禹功績字皆紫磨金鈿光彩射人似大篆而神彩驚人非其時不敢聞奏然棄於泥土中久與瓦礫同也然濫吹之事其來久矣且如張翼及僧惠式效右軍時人不能辯近有釋智永臨寫草帖幾欲亂真至如宋朝多學大令其康昕王僧䖍薄紹之羊欣等亦欲混其臰味是以二王書中多為偽迹好事所蓄尤宜精審儻所寶同乎燕石翻為有識所嗤也乾元三年五月日唐張懐瓘書議昔仲尼修書始自堯舜堯舜王天下煥乎有文章文章發揮書道尚矣夏殷之世能者挺生秦漢之間諸體間出𤣥猷㝠運妙用天資追虚捕微鬼神不容其潜匿而通微應變言象不測其存亡奇寶盈乎東山明珠溢乎南海其道有貴而稱聖其迹有祕而莫𫝊理不可盡之於詞妙不可窮之於筆非夫通𤣥逹微何可至於此乎乃不朽之盛事故敘而論之夫草木各務生氣不自埋没况禽獸乎况人倫乎猛獸鷙鳥神彩各異書道法此其古文篆籀時罕行用者皆闕而不議議者真正藁草之間或麟鳳一毛龜龍片甲亦無所不録其有名迹俱顯者一十九人列之於後崔瑗張芝張昶鍾繇鍾㑹韋誕皇象嵇康衛瓘衛夫人索靖謝安王導王敦王廙王洽王珉王羲之王獻之然則千百年間得其妙者不越此數十人各能聲飛萬里榮擢百代雖逸少筆跡遒潤獨擅一家之美天質自然風神盖代且其道微而味薄固常人莫之能學其理隠而意深固天下寡於知音昔為評者數家既無文詞則何以立説何為取象其勢彷彿其形似知其門而未知其奧是以言論不能辨明夫於其道不通出其言不斷加之詞寡典要理乏研精不述賢哲之殊能况有邱明之新意悠悠之説不足動人夫翰墨及文章至妙者皆有深意以見其志覽之即令了然若與面㑹則有智昏菽麥混白黑於胷襟若心悟精微圖古今於掌握𤣥妙之意出於物類之表幽深之理伏於杳㝠之間豈常情之所能言世智之所能測非有獨聞之聽獨見之明不可議無聲之音無形之相夫誦聖人之語不如親聞其言評先賢之書必不能盡其深意有千年明鏡可以照之不疲琉璃屏風可以洞徹無礙今雖録其品格豈獨稱其材能皆先其天性後其習學縱異形奇體輙以情理一貫終不出於洪荒之外必不離於工拙之間然智則無涯法固不定且以風神骨氣者居上妍美功用者居下真書逸少第一元常第二世將第三子敬第四士季第五文靜第六茂宏第七行書逸少第一子敬第二元常第三伯英第四伯玉第五季琰第六敬和第七茂宏第八安石第九章書子玉第一伯英第二幼安第三伯玉第四逸少第五士季第六子敬第七休明第八草書伯英創立規範得物象之形均造化之理然其法太古質不剖斷以此為少也有椎輪草意之妙後學得漁獵其中宜為第一草書伯英第一叔夜第二子敬第三處仲第四世將第五仲將第六士季第七逸少第八或問曰此品之中諸子豈能悉過於逸少荅曰人之材能各有長短諸子於草各有性識精魄超然神彩射人逸少則格律非髙功夫又少雖圓豐妍美乃乏神氣無戈㦸銛鋭可畏無物象生動可奇是以劣於諸子得重名者以真行故也舉世莫之能曉悉以為真草一槩若所見與諸子雷同則何煩有論今製品格以代權衡於物無情不饒不損惟以理伏頗能面質冀合規於𤣥匠殊不顧於聾俗夫聾俗無眼有耳但聞是逸少必闇然懸伏何必須見見與不見一也雖自謂髙鑒旁觀如三載嬰兒豈敢斟量鼎之輕重哉伯牙子期不易相遇造章甫者當售衣冠之士本不為於越人也然草與真有異真則字終意亦終草則行盡勢未盡或煙收霧合或電激星流以風骨為體以變化為用有類雲霞聚散觸遇成形龍虎威神飛動增勢巖谷相傾於峻險山水各務於髙深囊括萬殊裁成一相或寄以騁縱横之志或託以散鬱結之懐雖至貴不能抑其髙雖妙筭不能量其力是以無為而用同自然之功物類其形得造化之理皆不知其然也可以心契不可以言宣觀之者似入廟見神如窺谷無底俯猛獸之牙爪逼利劍之鋒芒肅然危然方知草之微妙也子敬年十五六時嘗白其父云古之章草未能宏逸今窮偽畧之理極草縱之致不若藁行之間於往法固殊大人宜改體且法既不定事貴變通然古法亦局而執子敬才髙識逺行草之外更開一門夫行書非草非真離方遁圓在乎季孟之間兼真者謂之真行帶草者謂之行草子敬之法非草非行流便於行草又處其中間無藉因循寧拘制則挺然秀出務於簡易情馳神縱超逸優游臨事制宜從意適便有若風行雨散潤色開花筆法體勢之中最為風流者也逸少秉真行之要子敬執行草之權父之靈和子之神俊皆古今之獨絶也世人雖不能甄别但聞二王莫不心醉是知徳不可偽立名不可虚成然荆山之下玉石參差或價賤同於瓦礫或價貴重於連城其八分即二王之右也子敬殁後羊薄嗣之宋齊之間此體彌尚謝靈運尤為秀傑近者虞世南亦工此法或君長告令公務殷繁可以應機可以赴速或四海尺牘千里相聞迹乃含情言惟敘事披封不覺欣然獨笑雖則不面其若面焉妙用𤣥通鄰于神化然此論雖不足搜索至真之理亦可謂張皇墨妙之門但能精求自可意得思之不已神將告之理與道通必然靈應有志小學豈不勉歟古之名手但能其事不能言其意今僕雖不能其事而輙言其意諸子亦有所不足或少運動及險峻或少波勢及縱逸學者宜自損益也異能殊美莫不備矣然道合者千載比肩若死而有知豈無神交者也逸少草有女郎材無丈夫氣不足貴也賢人君子非愚於此而智於彼知與不知用與不用也書道亦爾雖賤於此或貴於彼鑒與不鑒也智能雖定賞遇在時也嵇叔夜身長七尺六寸美音聲偉容色雖土木形體而龍章鳳姿天質自然加以孝友温恭吾慕其為人常有其草寫絶交書一紙非常寶惜有人與吾兩紙王右軍書不易近於李造處見全書了然知公平生志氣若與面焉後有逹志者覽此論當亦悉心矣夫知人者智自知者明論人才能先文而後墨羲獻等十九人皆兼文墨乾元元年四月日張懐瓘述唐張懐瓘文字論論曰文字者總而為言若分而為義則文者祖父字者子孫察其物形得其文理故謂之曰文母子相生孳乳寖多因名之為字題於竹帛則目之曰書文也者其道煥焉日月星辰天之文也五嶽四瀆地之文也城闕朝儀人之文也字之與書理亦歸一因文為用相須而成名言諸無宰制羣有何幽不貫何逺不經可謂事簡而應博範圍宇宙分别川原髙下之可居土壤沃瘠之可殖是以大荒籍矣紀綱人倫顯明君父尊嚴而愛敬盡禮長幼班列而上下有序是以大道行焉闡典墳之大猷成國家之盛業者莫近乎書其後能者加之以𤣥妙故有翰墨之道光焉世之賢逹莫不珍貴時有吏部蘇侍郎晉兵部王員外翰俱朝端英秀詞場雄伯謂僕曰文章雖久遊心翰墨近甚留意若此妙事古來少有知者今擬討論之欲造書賦兼與公作書斷後序王僧䖍雖有賦王儉製其序殊不足動人如陸平原文賦實為名作若不造其極境無由伏後世人心若不知書之深意與文若為差别雖窮其精微麤知其梗槩公試為薄言之僕荅曰深識書者惟觀神彩不見字形若精意𤣥鑒則物無遺照何有不通王曰幸以木石言之僕曰文則數言乃成其意書則一字已見其心可謂簡易之道欲知其妙初觀莫測久視彌珍雖書已緘藏而心追目極情猶眷眷者是為妙矣然雖考其法意所由從心者為上從眼者為下先其草創立體後其因循著名雖功用多而有聲終性情少而無象同乎糟粕其味可知不由靈臺必乏神氣其形顇者其心不長狀貌顯而易明風神隠而難辨有若賢才君子立行立言言則可知行不可見自非㝠心𤣥照閉目深視則識不盡矣可以心契非可言宣别經旬月後見乃有愧色云書道亦大𤣥妙翰與蘇侍郎初並輕忽之以為賦不足言者今始知其極難下語不比於文賦書道尤廣雖沉思多日言不盡意竟不能成僕謂之曰員外用心尚疎在萬事皆有細微之理而况乎書凡展臂曰尋倍尋曰常人間無不盡解若智者出乎尋常之外入乎幽隠之間追虚捕微探奇掇妙人縱思之則盡不能解用心精麤之異有過於是心若不有異照口必不能異言况有異能之事乎請以此理推之後見蘇云近與王員外相見知不足賦也説云引喻少語不能盡㑹通之識更共觀張所商㩁先賢書處有見所品藻優劣二人平章遂能觸類比興意且無限言之無涯古昔已來未之有也若其為賦應不足難蘇且説之因謂僕曰看公於書道無所不通自運筆固合窮於精妙何為與鍾王頓爾遼濶公且自評書至何境界與誰等倫僕荅曰天地無全功萬物無全用妙理何可備該常歎書不盡言僕雖知之於言古人得之於書且知者博於聞見或能知得者非假以天資必不能得是以知之與得又書之比言俱有雲塵之懸所令自評敢違雅意夫鍾王真行一今一古各有自然天骨猶千里之跡邈不可追今之自量可以比於虞褚而已其草諸賢未盡之得惟張有道創意物象近於自然又精熟絶倫是其長也其書勢不斷絶上下鈎連雖能如鐵並集若不能區别二家尊幼混雜百年撿探可知是其短也夫人識在賢明用在斷割不分涇渭餘何足云僕今所制不師古法探文墨之妙有索萬物之元精以筋骨立形以神情潤色雖跡在塵壤而志出雲霄靈變無常務於飛動或若擒虎豹有彊梁拏攫之形執蛟螭見蚴蟉盤旋之勢探彼意象如此規模忽若電飛或疑星墜氣勢生乎流便精魄出於鋒芒如觀之欲其駭目驚心肅然凛然殊可畏也數百年内方擬獨歩其間自評若斯僕未審如何也蘇笑曰令公自評何乃自飾文雖矜耀理亦兼通達人不已私盛徳亦微損其後僕賦成徃呈之遇褚思光萬希莊包融並會衆讀賦訖多有賞激蘇謂三子曰晉及王員外俱造書賦歴旬不成今此觀之固非思慮所際也萬謂僕曰文與書被公與陸機已把斷也世應無敢為賦者蘇曰此事必然也包曰知音省文章所貴言得失其何為競悦耳而諛面也已賦雖能豈得盡善無今而乏古論書道則妍華有餘考賦體則風雅不足纔可共梁已來並轡未得將宋已上齊驅此議何如褚曰誠如所評賦非不能然於張當分之中乃小小者耳其書斷三卷實為妙絶猶蓬山滄海吐納風雲禽獸魚龍于何不有見者莫不心醉後學得漁獵其中實不朽之盛事唐朝敘書録貞觀六年正月八日命整理御府古今工書鍾王等真蹟得一千五百一十卷至十年太宗嘗謂侍中魏徴曰虞世南死後無人可與論書徴曰褚遂良下筆遒勁甚得王逸少之體太宗即日召令侍書嘗以金帛購求王羲之書蹟天下爭齎古書詣闕以獻當時莫能辨其真偽遂良備論所出一無舛誤十四年四月二十二日太宗自為真草書屏風以示羣臣筆力遒勁為一時之絶初購求人間書凡真行二百九十紙裝為七十卷草二千紙裝為八十卷每聼覽之暇得臨翫之嘗謂朝臣曰書學小道初非急務時或留心猶勝棄日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳朕少時為公子頻遭陣敵義旗之始乃平冦亂執金鼓必自指揮觀其陣即知其強弱每取吾弱對其強以吾強對其弱敵犯吾弱追奔不踰百數十歩吾擊其弱必突過其陣自背而反擊之無不大潰多用此制勝思得其理深也今吾臨古人之書殊不學其形勢唯在求其骨力及得其骨力而形勢自生耳然吾之所為皆先作意是以果能成也初置𢎞文館選貴臣子弟有性識者為學士内出書命之令學又人同有善書者追徴入舘十數年間海内從風矣至十八年二月十七日召三品已上賜宴於𤣥武門太宗操筆作飛白書衆臣乗酒就太宗手中競取散騎常侍劉洎登御牀引手然後得之其不得者咸稱洎登御牀罪當死請以付法太宗笑曰昔聞媫妤辭輦今見常侍登牀龍朔二年四月上自為書與遼東諸將謂許敬宗曰許圉師常自愛書可於朝堂開示圉師見甚驚喜私謂朝官曰圉師見古跡多矣魏晉以後唯稱二王然逸少多力而少妍子敬多妍而少力今觀聖跡兼絶二王鳳翥鸞廻實古今書聖也神功元年五月上謂鳳閣侍郎王方慶曰卿家多書合有右軍遺跡方慶奏曰臣十代再從伯祖羲之書先有四十餘紙貞觀十二年太祖購求先臣並以進訖惟有一卷見在今進臣十一代祖導十代祖洽九代祖珣八代祖曇七代祖僧綽六代祖仲寶五代祖騫高祖規曾祖褒并九代三從伯祖晉中書令獻之已下二十八人書共十卷並進上御武成殿示羣臣仍令中書舍人崔融為寶章集以敘其事復以集賜方慶當時舉朝以為榮也唐韋述敘書録開元十六年五月内出二王真跡及張芝張昶等真跡總一百五十卷付集賢院令集字搨進尋且依文搨兩本進内分賜諸王後屬車駕入都却進真本竟不果進自太宗貞觀中搜訪王右軍等真跡出御府金帛重為購賞由是人間古本紛然畢進帝令魏少師虞永興褚河南等定其真偽右軍之跡凡得真行二百九十紙裝為七十卷草書二千紙裝為八十卷小王及張芝等亦各随多少勒為卷帙以貞觀字為印印縫及卷之首尾其草跡又令河南真書小字帖紙影之其古本亦有是梁隋官本者梁則滿騫徐僧權沈熾文朱异隋則江總姚察等署記其後太宗又令魏褚等卷下更署名記其後蘭亭一時相𫝊云將入昭陵𤣥宫長安神龍之際太平安樂公主奏借出外搨寫樂毅論因此遂失所在開元五年勑陸元悌魏哲劉懐信等撿校換褾分一卷為兩卷總見在有八十卷餘並墜失元悌等又削去前代名賢押署之跡惟以己之名氏代焉上自書開元二字為印以印記之右軍書凡一百三十卷小王二十八卷張芝張昶書各一卷右軍真行書唯有黄庭告誓等四卷存焉蕭令尋奏滑州人家藏右軍扇上真書宣示及小王行書白騎遂等二卷勑命滑州給驛齎書本赴京其書扇有貞觀舊褾織成題字奉進上書本留内賜絹一百疋以遣之竟亦不問得書所由唐盧元卿法書録晉平南將軍荆州刺史瑯琊王廙字世將書一卷沈熾文滿騫徐僧權貞觀十三年十二月十九日起居郎臣褚遂良司空許州都督趙國公臣無忌開府儀同三司尚書左僕射太子少師梁國公臣𤣥齡特進尚書右僕射申國公臣士廉特進鄭國公臣徴吏部尚書公逆人侯君集名初同署犯法後揩名尚書字已不似有而暗中書令駙馬都尉安徳郡開國公臣楊師道左衛大將軍武陽縣開國公臣李大亮光禄大夫户部尚書莒國公臣唐儉光禄大夫禮部尚書河間郡王臣李孝恭刑部尚書彭城縣開國公臣劉徳威兼太常卿扶陽縣開國男臣韋挺少府監安昌縣開國男臣馮長命銀青光禄大夫行尚書左丞濟南縣開國男臣康皎齊髙帝姓蕭氏諱道成字紹伯書一卷開元五年十一月五日陪戎副尉臣張善慶裝文林郎直祕書省臣王知逸監宣義郎行左司禦率府録事參軍臣劉懐信監宣徳郎行左驍衛倉曹參軍臣陸元悌監承議郎行右金吾衛長史臣魏哲監右散騎常侍崇文館學士上柱國舒國公臣褚無量祕書監侍讀昭文館學士上柱國常山縣開國公臣馬懐素開府儀同三司上柱國梁國公臣姚崇銀青光禄大夫行中書侍郎同中書門下平章事監修國史上柱國許國公臣蘇頲銀青光禄大夫守吏部尚書兼侍中監修國史上柱國廣平郡開國公臣宋璟右按工部侍郎韋公云貞觀中搜訪王右軍等真跡出御府金帛重為購賞人間古本紛然畢集太宗令魏少師虞永興褚河南等定其真偽右軍之跡凡得真行二百九十紙裝為七十卷草書二千紙裝為八十卷小王張芝等亦合少多勒為卷帙以貞觀字為印印縫及卷之首尾其草跡又令河南真書小字帖紙影之其古本亦有是梁隋官本者梁則滿騫徐僧權沈熾文朱异隋則江總姚察等署記太宗又令魏褚等卷下更署名記開元五年勑陸元悌魏哲劉懐信等撿挍換褾分一卷為兩卷總見在有八十卷餘並墜失元悌等又割去前代名賢押署以已名氏代焉上自書開元二字為印記之王右軍書凡一百三十卷小王二十八卷張芝張昶書一卷徐㑹稽云太宗大購圖書内庫有鍾繇張芝張昶王羲之父子書四百卷及漢魏晉宋齊梁雜跡三百卷貞觀十三年十二月裝成部帙以貞觀字印縫命起居郎褚遂良排署元卿見建中已後翰林中雜跡用翰林印印縫茹蘭芳等署名又云貞元十一年正月於都官郎中竇臮興化宅見王廙書鍾會書各一卷武都公李造押名又兩卷並古錦褾玉軸每卷十餘人書内一卷開皇十八年押署有内史薛道衡署名前後所見貞觀十三年及開元五年書法跋尾題署人名或人數不同今具如前建中二年正月二十一日知書樓直官臣劉逸江賀遂奇等撿挍副使掖庭令臣茹蘭芳副使内寺伯臣宋遊瓌是雜迹卷上録元和三年四月五日晉右將軍㑹稽内史贈金紫光禄大夫瑯琊王羲之字逸少書一卷四帖貞觀十四年三月二十三日臣蔡撝裝特進尚書右僕射上柱國申國公臣士廉特進鄭國公臣徴逆人侯君集犯法後揩印中書令駙馬都尉安徳郡開國公臣楊師道右屯衛將軍上柱國通川縣開國男臣姜行本起居郎臣褚遂良開府儀同三司尚書左僕射太子少師上柱國梁國公臣𤣥齡右前件卷是官庫目録第三十共四帖都一百六十一字玳瑁軸古錦褾有貞觀印字及李氏印謹具跋尾如前元和三年四月六日盧元卿記法書要録卷四
