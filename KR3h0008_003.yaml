body:
  text: 法書要録卷三唐張彥逺撰唐虞世南書㫖述唐褚遂良右軍書目李嗣真後書品武平一徐氏法書記徐浩論書徐浩古跡記何延之蘭亭記褚遂良搨本樂毅論記崔備壁書飛白蕭字記李約壁書飛白蕭字贊大父相國髙平公蕭齊記蔡惲書無定體論不録唐虞世南書㫖述客有通𤣥先生好求古迹為余知書啓之發源審以臧否曰豫不敏何足以知之今率以聞見隨紀年代考究興亡其可為元龜者舉而敘之古者畫卦立象造字設教爰置形象肇乎蒼史仰觀俯察鳥跡垂文至于唐虞煥乎文章暢於夏殷備乎秦漢洎周宣王史史籀循科斗之書採蒼頡古文綜其遺美别署新意號曰籀文或謂大篆秦丞相李斯改省籀文適時簡要號曰小篆善而行之其蒼頡象形傳諸典䇿世絶其跡無得而稱其籀文小篆自周秦以來猶或參用未之廢黜或刻於符璽或銘於鼎鍾或書之旌鉞往往人間時有見者夫言篆者𫝊也書者如也述事契誓者也字者孳也孳乳寖多者也而根之所由其來逺矣先生曰古文籀篆曲盡而知之愧無隱焉隸草攸止今則未聞願以發眀用祛昏惑曰至若程邈隸體因之罪隸以眀其書朴略微而歷祀增損亟以湮淪而淳善之流亦稱𫝊習首變其法巧拙相㳂未之超絶史游制於急就創立草藁而不之能崔杜㭊理雖則豐妍潤色之中失於簡約伯英重以省繁飾之銛利加之奮逸時言草聖首出常倫鍾太傅師資德升馳騖曹蔡倣學而致一體真楷獨得精妍而前輩數賢遞相矛盾事則恭守無捨儀則尚有瑕疵失之斷割逮乎王廙王洽逸少子敬剖㭊前古無所不工八體六文必揆其理俯於衆美會滋簡易制成今體乃窮奧㫖先生曰於戲三才審位日月燭明固資異人一敷而化不然者何以臻妙無相奪倫父子聮鑣軌範後昆先生曰書法𤣥微其難品繪今之優劣神用無方小學疑迷惕然將寤而㫖述之義其可聞乎曰無讓繁詞敢以終序晉右軍王羲之書目正書行書褚遂良撰正書都五卷共四十帖第一樂毅論四十四行書付官奴第二黃庭經六十行與山隂道士第三東方朔贊書與王循第四周公東征十一行年月日朔小字十四行自誓文尚想黃綺七行墓田丙舍五行第五羲之死罪前因李叔夷四行琅邪臨沂三行羲之頓首頓首一日相省四行行三一之法四行尚書宣示孫權所求八行臣言琅琊新廟四行晉侯侈六行草書都五十八卷第一永和九年二十八行蘭亭序纒利害二十二行第二爰有猗人九行庾新婦五行九月二十三日羲之八日書八行十一月七日羲之報知少麛五行十二月六日羲之報一昨因暨主簿書六行臣羲之言伏惟皇太后七行臣羲之言嚴寒不審四行臣羲之言伏惟陛下五行雨凉佳得書五行問庶子哀摧四行第三闕第四七月二十五日羲之頓首期晚生不有六行五月二十四日羲之頓首二旬哀悼行羲之報曹妹五行羲之頓首違逺亡嫂積年八行昨殊不散三行殷中軍奄忽哭之三行第五羲之死罪亡兄靈柩七行五月七日羲之頓首頓首昨便斬草亡嫂尚停此十行期小女四嵗暴疾不救五行秋中諸感切懷五行第六羲之白不審尊體比復如何五行得示慰吾頻以服散三行二十三日發至長安八行羲之死罪不審何定尚扶持四行適遠告承如常五行第七羲之頓首舅夭殁四行羲之頓首奄承遘難五行羲之頓首君眼目五行六月十五日羲之頓首大行皇帝崩四行大行皇帝五行月半增感傷奈何四行第八謝新婦春日感傷七行羲之死罪無亦永往七行謝范新婦得富春還疏十行向書至也須君至射堂四行第九五月二十七日州民王羲之死罪比夏交十一行羲之死罪荀葛各一國佐命之宗十七行君須復以何散懷七行第十七月十三日告離得兄弟五行延期官奴小女七行不圖禍痛乃將至此二行日月如馳㛐棄背五行行近遣書想即至二行比書慰也汝不可六行第十一羲之頓首快雪時晴六行未復知問晴快即轉勝七行去血有損不堪耿三行月行復半痛傷兼摧三行第十二六月十七日告循紀四行栁匏比問賊五行足下猶未佳四行羲之頓首卿佳不家中猶爾八行第十三遍熱既穸一且盛農五行知齡家祖可悲慰九行山下多日不復意問十行晚復熱想足下八行第十四都下二十六日書云中郎五行近絶不得新婦諸叔問十行九月十七日羲之報且行因孔侍中八行既逼近羸劣六行第十五想大小悉佳十行謝新婦賢從弟八行隔日不知問二旬哀傷七行第十六省書知定疑來二十六行痛惜敬和寢息在心九行羣從雕落將盡十行第十七報恆何如七行有一帖云羲之報恆何如二月二日汝歸母二行雖問和篤疾十一行此粗平安第十八二十二日羲之報近得書五行毒熱瘧斫未甚耿耿五行足下可不吾眼少劣四行再昔來熱如小有覺十行第十九官奴小女十行一月二十五日四行大熱得告五行汝中冷褚侯遂至薨二行第二十過此燥鷦肉四行去龍牙復下七行向欲力視汝五行姊告慰馳情五行晚來復何如三行兄安厝情事長畢五行第二十一十九日羲之頓首眀二旬增感七行十月十五日羲之頓首月半哀傷八行得示知羲之報五行第二十二安西復問二十六行忽然夏中九行第二十三得阿遮書七行二十五日告期六行二十日告姜三行知慶等三行二十七日告姜氏母子五行得書知卿四行第二十四初月一日羲之報忽然改年六行卿各何以先羸四行此上下不可耳出外六行六日告姜復雨始晴五行書未去得疏為慰五行第二十五行復二旬傷悼情深五行羲之死罪難信非箋五行九月二十五日羲之頓首便涉冬六行夫人遂善平康也三行羲之頓首節至逺感五行過一旬尋念傷悼四行五月九日羲之頓首頓首雖未敘五行第二十六敬祖足下如常慰之五行羲之頓首頓首從兄雖篤疾五行轉熱想足下耳七行王逸少頓首晚佳也七行第二十七八月十七日羲之報五行三十日告姜九行二十二日告姜五行三十日羲之頓首報五行信還之夜下七行第二十八曹丁妹七行未審大周㛐七行劫事當速五行第二十九二十九日告仲宗五行十四日告劉氏女六行人理之故四行十一月二十六日已摧退二行月行復旬感傷七行有哀慘七行送此鯉魚二行諸婦小兒輩三行第三十羲之愛報七行復想㛐安和九行得書知汝問九行第三十一十一月十三日羲之頓首六行三月十九日羲之頓首末春哀痛羲之自想上下悉佳五行八月十五日具疏羲之再拜六行第三十二羲之頓首月半感慕抽切五行改月感慕抽痛當奈何六行昨歡宴可謂意五行向得信知足下瘧五行第三十三張博士定何日去四行八月二十六日告仲宗十行雨無復解足下可耳五行六月羲之報至節哀感四行初月一日告姜忽此年四行第三十四極有眷意四行九月十八日羲之報近問七行司州葬送六行第三十五十四日告期眀月半十三行十三日羲之報月向半四行承上下不和反側六行過一旬哀痛兼至八行昨暮遣信值足下以行七行諸哀毒兼至終日切心七行乃復送麞勞汝第三十六闕第三十七得示慰之吾迎不快五行九月二十五日羲之報禍出不圖六行隂寒足下各可不八行五月二日告胡母甥幸六行夏中節除感逺兼傷四行第三十八四月五日羲之報五行七日告期痛念𤣥度十行妹轉佳慶不乃啼不三行知靜婢猶未佳懸心二行治墓下皆以集也三行第三十九三月十三日羲之頓首頓首過二旬哀悼六行羲之頓首頓首想冬盛念一旦感歎並哀窮十行十一月十八日羲之頓首頓首冬月感歎兼傷六行第四十十月二十二日羲之頓首頓首賢從隕逝四行想家悉佳九行吾未得便得效四行吏轉輒與寬休六行第四十一二月州民王羲之死罪六行向書至也得示承尊夫人轉平和七行五月十日羲之報夏中感逺六行時見賢子君家平三行前郡內及兄子家比有五行第四十二四月二日羲之頓首初月感懷七行得示慰之足下克致六行羲之白服見仲熊七行知汝故爾欲食三行第四十三紙一千五行僧逺遂佳也三行脯五夾七行羲之死罪不當有桂第四十四不知逺姝定何當至八行從兄弟一旦哀窮四行昨遣書今日至也四行第四十五知足下得吾書七行前比遣信七行想應妹普平安七行臘遂佳也懸念八行比承至也得二書四行得二日書具足下問四行足下在蕪湖九行不圖哀禍頻仍五行第四十六闕第四十七道祖重能行二行十月二十日羲之頓首節近嵗終六行節除諸感兼哀四行四月二十日羲之頓首二旬期等小祥五行新嵗月感傷第四十八羲之頓首一旦公除四行羲之頓首從弟子四行嵗盡諸感五行第四十九四月九日羲之頓首報臘日七行得二謝書司州喪六行二月六日羲之報昨書悉四行上下如常不五行承都開清和五行第五十二月二十五日羲之頓首一日有書九行事情無所不至惟有長歎五行雨後無已不審體中各何如九行知賢弟並毁頓三行第五十一羲之頓首頓首何圖禍痛五行繇白張白騎遂自猜疑七行晴便寒想轉勝七行六月十九日羲之報仲熊夭折三行仲熊雖篤疾豈圖奄忽四行第五十二汝母子比佳不六行十八日羲之頓首四行敬祖雖久疾謂其年少八行五月二十七羲之報五行五月十一日羲之敬問得旦書三行吾賢之常事耳四行第五十三閏二月二十五日羲之白四行向書想至四行八月十四日告父四行許𤣥度昨宿四行七月六日羲之頓首五行省告猶示三行修年雖篤七行第五十四六月十六日羲之頓首八行羲之死罪告終十一行二十九日羲之頓首九行九月二十八日羲之頓首昨六行第五十五前使還有書猥九行羲之頓首二孫女四行四日羲之頓首昨感寒五行八月二十五日羲之白頓首五行得書為慰汝轉平復六行第五十六周氏上下悉佳六行亡王等便以去十月􅎭四行卿汝母子粗平安八行九月十三日羲之頓首追傷切割六行第五十七羲之頓首尋念痛惋八行長風一日哀窮五行得信知問五行敬祖雖久疾四行初月五日羲之頓首忽然此年六行第五十八省别具懷五行阿康少壯四行范中書奄至此三行妹復小進退五行羲之頓首昨暮兒疏十一行晉右軍王羲之正書行書目貞觀年河南公褚遂良中禁西堂臨寫之際便録出唐初有史目實此之標目蓋其類也未見草書目唐李嗣真書後品張彥逺以李公之品甚有當處過事詞米不如直置評品量效袁品之作又不具人代為淺學者未深曉昔蒼頡造書天雨粟鬼夜哭亦有感矣蓋德成而上謂仁義禮智藝成而下謂射御書數吾作詩品猶希聞偶合神交自然冥契者是才難也及其作畫評而登逸品數者四人故知藝之為末信矣雖然若超吾逸品之才者亦當敻絶於終古無復繼作故斐然有感而作書評雖不足對揚王休𢎞闡神化亦名流之美事與夫飽食終日博奕猶賢不其逺乎項籍云書足記姓名此狂夫之言也嗟爾後生必乏經國之才又無干城之略庶幾勉夫斯道近代虞祕監歐陽銀青房褚二僕射陸學士王家令髙司衛等亦並由此術無所間然其中亦有更無他技而俯拾朱紱如此則雖君之盛烈苟非莘野之器箕山之英亦何能作戒凌雲之臺拂衣碑石之際今之馳騖去聖逾逺徒識方圓而迷㸃畫猶莊生之歎盲者易象之談日中終不見矣太宗與漢王元昌褚僕射遂良等皆受之於史陵禇首師虞後又學史乃謂陵曰此法更不可教人是其妙處也陸學士柬之受於虞祕監虞祕監受於永禪師皆有體法今人都不聞師範又自無鑒局雖古迹昭然永不覺悟而執燕石以為寶玩楚鳯而稱珍不亦謬哉其議於品藻自王愔以下王僧䖍袁庾諸公已言之矣而或未周今採諸家之善聊指同異以貽諸好事其前品已定則不復銓列素未曽入有可措者亦後云爾太宗髙宗皆稱神扎吾所伏事何敢寓言始於秦氏終唐世凡八十一人分為十等逸品五人李斯小篆右小篆之精古今妙絶秦望諸山及皇帝玉璽猶夫千鈞强弩萬石洪鐘豈徒學者之宗匠亦是傳國之遺寶張芝草鍾繇正羲之三體及飛白獻之草書行書半草右四賢之迹揚庭效技䇿勳底績神合契匠冥運天矩皆可稱曠代絶作而鍾張則筋骨有餘膚肉未贍逸少則加減太過朱粉無設同夫披雲覩日芙蓉出水求其盛美難以備諸然伯英章草似春虹飲澗落霞浮浦又似渥霧沾濡繁霜搖落元常正隸如郊廟既陳爼豆斯在又比寒澗􅂒壑秋山嵯峨右軍正體如隂陽四時寒暑調暢巖廊宏敞簮裾肅穆其聲鳴也則鏗鏘金石其芬郁也則氛氲蘭麝其難徴也則縹眇而已仙其可覿也則昭彰而在目可謂書之聖也若草行雜體如清風出袖眀月入懷瑜瑾爛而五色黼繡摛其七采故使離朱喪眀子期失聽可謂草之聖也其飛白猶霧縠卷舒烟雲照灼長劒耿介而倚天徑矢超忽而無地可謂飛白之仙也又如松巖㸃黛蓊鬱而起朝雲飛泉潄玉灑散而成暮雨既離方以遁圓亦非絲而異帛趣長筆短差難縷陳子敬草書逸氣過父如丹穴鳯舞清泉龍躍倐忽變化莫知所成或蹴海移山或翻濤簸嶽故謝靈運謂云公當勝右軍誠有害名教亦非徒語也而正書行書如田野學士越參朝列非不稽古憲章乃時有漢體處舊說稱其轉研去鑒疏矣然數公者皆有神助若喻之制作其雅頌之流乎評曰元常每㸃多異羲之萬字不同後學者恐徒傷筋膐耳然右軍肇變古質理不應減鍾故云或謂過之庾翼每不服逸少曽得伯英十紙喪亂遺失常恨妙迹永絶及逸少與亮書曰今見足下答家兄書煥若神眀頓還舊觀方乃大服羲之又曽書壁而去子敬密拭之而更别題右軍還觀之曰吾去時真大醉子敬乃心服之然右軍終無敗纍子敬往往失落及其不失則神妙無方亦可謂之草聖矣贊曰蒼頡造書鬼哭天廩史籀湮滅陳倉藉甚秦相刻銘爛若舒錦鍾張羲獻超然逸品上上品二人程邈隸崔瑗小篆右程君首創隸則模範煥於丹青崔氏爰效李斯㸃畫皆如鐵石傳之後裔厥功亦茂此外鐫勒去之無乃敻乎若挍之文章則三都二京之比上中品七人蔡雍索靖梁鵠鍾㑹衛瓘韋誕皇象右自王崔以降更無超越此數君書雅徑於韋蔡皇衛草迹殆亞於二王鍾索遺迹雖少吾家有小鍾正書洛神賦河南長孫氏雅所珍好用子敬草書數紙易之索有月儀三章觀其趣況大為遒竦無愧圭璋特達猶夫聶政相如千載凛凛為不亡矣又毌丘興碑云是索書比蔡石經無相假借蔡公諸體惟范巨卿碑風華艷麗古今冠絶王簡穆云無可以定其優劣亦何勞品書者乎上下品一十二人崔實章郗鑒王廙衛夫人正王洽郗愔李式庾翼羊欣歐陽詢虞世南褚遂良右逸少謂領軍弟書不減吾吾觀可有十紙信佳作矣體裁用筆全似逸少虛薄不倫右軍藻鑒豈當虛發蓋欲假其名譽耳前品措之中下豈所謂允僉望哉崔衛素負髙名王庾舊稱拔萃崔章書甚妙衛正體尤絶世將楷則逺類羲之猶有古制稚恭章草頗推筆力不謝子真郗李縱邁過於羊欣歐陽草書難與競爽如旱蛟得水饞兔走穴筆勢恨少善於鐫勒及飛白諸勢如武庫矛㦸雄劒森森虞世南蕭散灑落真草惟命如羅綺嬌春鵷鴻戲沼故當子雲之上褚氏臨寫右軍亦為髙足豐艷雕刻盛為當今所尚但恨乏自然功勤精悉耳評曰蟲篆者小學之所宗草隸者士人之所尚近代君子故多好之或時有可觀耳然許靜之迹殆不減小令常歎云小鍾書初不留意試作之乃不可得研之彌久如有髣佛乃知有畫龍之感耳安可厚誣乎此羣英允居上流三品其中銓鑒不無優劣贊曰程邈隸體崔公篆勢梁李蔡索郗皇韋衛羊習獻規褚𫝊羲制邈乎天壤光厥來裔中上品七人張昶文舒衛恆杜預張翼郗嘉賔阮研漢王元昌右文舒西嶽碑文但覺妍冶殊無骨氣庾公置之七品張翼代羲之草奏雖曰小人幾乎亂真更乃編之乙科涇渭混淆竒難品㑹至於衛杜之筆流傳多矣縱任輕巧流轉風媚剛健非有餘便媚少儔匹嘉賔與王庾相將是則髙手顔黃門有言阮交州蕭國子陶隱居各得右軍一體故稱當時之冠絶然蕭公力薄終不逮阮漢王作獻之氣勢或如舞劒往無鄰幾中中品十二人謝安康昕桓𤣥丘道護許靜蕭子雲陶𢎞景釋智永劉珉房𤣥齡陸柬之王知敬右謝公縱任自在有螭盤虎踞之勢康昕巧密精勤有翰飛鶯哢之體桓𤣥如驚蛇入草銛鋒出匣劉珉比顛波赴壑狂澗爭流隱居頴脫得書之筋髓如麗景霜空鷹隼初擊道護謬登髙品迹乃浮漫陸柬之學虞草體用筆則青出於藍故非子雲之徒正隸功夫恨少不至髙絶也智永精熟過人惜無竒態矣房司空雕文抱質王家令碎玉殘金房如海上雙鵷王比雲間孤鶴評曰古之學者皆有師法今之學者但任胸懷無自然之逸氣有師心之獨往偶有能者時見一㸃忽有不悟者終身瞑目而欲乘欵假度越驊騮其亦難矣吾嘗告勉夫後生曰古歎知音希可為絶絃者也贊曰西嶽張昶江東阮研銀鷹貞白鐵馬桓𤣥衛杜花散安康綺鮮元昌陸柬名後身先中下品七人孫皓張超謝道韞宋炳宋文帝齊髙帝謝靈運右孫皓吳人酣暢驕其家室雖欲矜豪亦復平矣張如郢中少年乍入京輦縱有才辨蓋亦可知謝韞是王凝之之妻雍容和雅芬馥可玩宋文帝有子敬風骨超縱狼藉翕煥為美康樂往往驚遒髙帝時時合興知慕韓彭之豹變有異張桓之拾青宋炳放逸屈攝頗效康許量其直置孤梗是靈運之流下上品十三人陸機袁嵩李夫人謝朓庾肩吾蕭綸王褒斛斯彥明房彥謙殷令名張大隱藺靜文錢毅右士衡以下時然合作蹖雜不倫或類蚌質珠胎乍比金沙銀礫陸平原李夫人猶帶古風謝吏部庾尚書創得今韻邵陵王王司空是東陽之亞房司𨽻張益州參小令之體藺生正書甚為鮮緊殊有規則錢氏小篆飛白寬博敏麗太宗貴之斛斯筆勢咸有由來司𨽻宛轉頗稱流悅皆藉名美殷氏擅聲題署代有其人嗟乎有天才者或未能精之有神骨者則其功虛棄但有佳處豈忘存録下中品十人范曄蕭思話張融思光梁簡文帝劉逖王晏周顒王崇素釋智果虞綽右范如寒雋之士亦不可棄蕭比遁世之夫時或堪採思光要自標舉蓋無足褒簡文拔羣貴勝猶難繼作劉黃門落花從風王中書竒石當徑彥倫意則甚髙迹少俊鋭崇素時象麗人之姿智果頗似委章之質虞綽鋒頴迅健亦又次之矣下下品七人劉穆之禇淵梁武帝梁元帝沈君理陳文帝張正見右數君亦稱筆札多類效嚬猶枯林之青秀一枝比衆石之孤生片琰就中彥回輕快練倩有力孝元風流君理放任亦後來之所習非先達之所營吾黨論書有異於是評曰前品云蕭思話如舞女低腰仙人嘯樹亦則仙矣又云張伯英如漢武學道憑虛欲仙終不成矣商榷如此不亦謬乎吾今品藻亦未能至當若其顛倒衣裳白圭之玷則庶不為也後來君子儻為鑒焉贊曰蚌質懷珠銀瓌藴礫陸謝參蹤蕭王繼迹思話仙才張融賞擊如彼枯秀衆多羣石唐武平一徐氏法書記先賢所評子敬之比逸少猶士季之比元常言去之逺矣故二王之迹歷代寶之梁大同中武帝勑周興嗣撰千字文使殷鐵石模次羲之之迹以賜八王右軍之書咸歸梁室屬侯景之亂兵火之後多從湮缺而西臺諸宫尚積餘寶元帝之死一皆自焚歷周至隋初并天下大業之始後主頗求其書往往有獻之者及隋之季王師入秦又於洛陽擒二僞主兩亰祕閣之寶揚都扈從之書皆為我有太宗於右軍之書特留睿賞貞觀初下詔購求殆盡遺逸萬幾之暇備加執玩蘭亭樂毅尤聞寶重嘗令搨書人湯普徹等搨蘭亭賜梁公房𤣥齡已下八人普徹竊搨以出故在外傳之及太宗晏駕本入𤣥宫至髙宗又勑馮承素諸葛貞搨樂毅論及雜帖數本賜長孫無忌等六人在外方有洎大聖天后御極也尤為寶嗇平一齠齓之嵗見育宫中切覩先后閲法書數軸將搨以賜藩邸時見宫人出六十餘函於億嵗殿曝之多裝以鏤牙軸紫羅褾云是太宗時所裝其中有故青綾褾玳瑁軸者云是梁朝舊跡褾首各題篇目行字等數章草書多於其側帖以真字楷書每函可二十餘卷别有一小函可有十餘卷於所記憶者是扇書樂毅告誓黃庭當時私訪所主女學問其函出盡否答云尚有未知幾許至中宗神龍中貴戚寵盛宫禁不嚴御府之珍多入私室先盡金璧次及書法嬪主之家因此擅出或有報安樂公主者主於內出二十餘函駙馬武延秀久踐虜庭無功於此徒聞二王之跡强學寶重乃呼薛稷鄭愔及平一評其善惡諸人隨事答稱為上者登時去牙軸紫褾易以漆軸黃麻紙褾題云特健藥云是虜語其書合作者時有太宗御筆於後題之歎其雄逸太平公主聞之遽於內取數函及樂毅等小函以歸延秀之死側聞睿宗命薛稷擇而進之薛竊留佳者十數軸薛之敗也為簿録官所盜平一任郴州日與太平子薛崇𦙍堂兄崇允連官說太平之敗崇徹懷樂毅等七軸請崇允託其叔駙馬璥貽岐王以求免戾此書因歸邸第崇徹弟崇簡娶梁宣王女主家王室之書亦為其所有後獲罪謫五溪書歸御府而朝士王公亦往往有之豫州刺史東海徐公嶠之季子浩並有獻之之妙待詔金門家多法書見託斯題其篇目行字列之如後詹事張庭圭之家抑其次也唐徐浩論書周官內史教國子六書書之源流其來尚矣程邈變隸體邯鄲𫝊楷法事則朴略未有功能厥後鍾善真書張稱草聖右軍行法小令破體皆一時之妙近古蕭永歐虞頗𫝊筆勢褚薛已降自鄶不譏矣然人謂虞得其筋褚得其肉歐得其骨當矣夫鷹隼乏彩而翰飛戾天骨徑而氣猛也翬翟備色而翺翔百步肉豐而力沉也若藻曜而髙翔書之鳳凰矣歐虞為鷹隼褚薛為翬翟焉歐陽率更云蕭書出於章草頗為知言然歐陽飛白曠古無比浩自言余年在齠齔便工翰墨力不可强勤而愈拙區區碑石之間矻矻几案之上亦古人所恥吾豈忘情耶德成而上藝成而下則殷鑒不逺何學書為必以一時風流千里面目斯亦愈於博奕亞於文章矣初學之際宜先筋骨筋骨不立肉何所附用筆之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲疏亦不欲密亦不欲大亦不欲小小長令大大蹙令小疏肥令密密瘦令疏斯其大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側竪令平平竣使側捷則須安徐則須利如此則其大較矣張伯英臨池學書池水盡墨永師登樓不下四十餘年張公精熟號為草聖永師拘滯終著能名以此而言非一朝一夕所能盡美俗云書無百日工蓋悠悠之談也宜白首攻之豈可百日乎唐徐浩古蹟記自伏羲畫八卦史籀造籀文李斯作篆書程邈起隸法王次仲為八分體漢章帝始為章草名厥後流傳工能間出史籀石鼓文崔子玉篆吕望張衡碑李斯嶧山會稽山碑蔡雍鴻都三體石經八分西嶽光和殷華馮敦等數碑并伯喈章草並為曠絶及張芝章草鍾繇正楷時莫其先衛瓘索靖章草王羲之真行章草桓𤣥草謝安王獻之羊欣王僧䖍孔琳之薄紹之真行草永禪師蕭子雲真草虞世南歐陽詢禇遂良果師述師真行草陸柬之臨書臣先祖故益州九隴縣尉贈吏部侍郎師道臣先考故洺州刺史贈左常侍嶠之真行草皆名冠古今無與為比齊梁以後傳祕此書跋尾徐僧權唐懷充姚懷珍滿騫朱异等署名太宗皇帝肇開帝業大購圖書寶於內庫鍾繇張芝芝弟昶王羲之父子書四百卷及漢魏晉宋齊梁雜迹三百卷貞觀十三年十二月裝成部帙以貞觀字印印縫命起居郎臣禇遂良排署如後司空許州都督趙國公臣無忌開府儀同三司尚書左僕射太子少師梁國公臣𤣥齡特進尚書左僕射申國公臣士廉特進鄭國公臣徴逆人侯君集初同署犯法後楷印中書令駙馬都尉安德郡開國公臣楊師道左衛大將軍武陽縣開國公臣李大亮光祿大夫禮部尚書河間王臣孝恭光祿大夫民部尚書莒國公臣唐儉兼太常卿扶陽縣開國男臣韋挺從十三年書更不出外人莫見直至大定中則天太后賞納言狄仁傑能書仁傑云臣自幼以來不見好本只率愚性何由得能則天乃內出二王真迹二十卷遣五品中使示諸宰相看訖表謝登時將入至中宗時中書令宗楚客奏事承恩乃乞大小二王真蹟勑賜二十卷大小各十軸楚客遂裝作十二扇屏風以禇遂良閒居賦枯樹賦為腳因大人貴要張以示之時薛稷崔湜盧藏用廢食歎美不復宴樂安樂公主壻武延秀在坐歸以告公主曰主言承恩未為富貴適過宗令别得賜書一席觀之輟餐忘食及眀謁見頗有怨言帝令開緘傾庫悉與之延秀復會賔客舉匱令看分散朝廷無復寶惜太平公主取五帙五十卷别造胡書四字印縫宰相各三十卷將軍駙馬各十卷自此內庫真蹟散落諸家太平公主愛樂毅論以織成袋盛置作箱褁及籍沒後有咸陽老嫗竊舉袖中縣吏尋覺遽而奔趂嫗乃驚懼投之竈下香聞數里不可復得天寶中臣充使訪圖書有商胡穆聿在書行販古跡往往以織成褾軸得好圖書臣奏直集賢令求書畫𤣥宗開元五年十一月五日收綴大小二王真迹得一百五十八卷大王正書三卷黃庭經第一畫讃第二告誓第三臣以為畫讃是僞迹不近真行書一百五卷並不著名姓帖草書一百五十卷以前得君書第一小王書都三十卷正書兩卷論語一卷并注一卷寫成為第一跋尾排署如後右散騎常侍崇文館學士舒國公臣禇無量祕書監兼侍讀昭文館學士上柱國常山縣公臣馬懷素開府儀同三司上柱國梁國公臣姚崇銀青光祿大夫行中書侍郎同中書門下平章事監修國史上柱國許國公頲銀青光祿大夫守吏部尚書兼侍中監修國史上柱國廣平郡開國公臣璟至十七年出付集賢院搨二十本賜皇太子諸王學十九年收入內十八年十二月二十八日尚書左丞相集賢大學士燕國公張說薨眀年二月以中書令蕭嵩為大學士令訪二王書乃於滑州司法路琦家得羲之正書扇書一卷是貞觀十五年五月五日揚州大都督駙馬都尉安德郡開國公楊師道進其褾是碧地織成褾頭一行濶一寸黃色織成云晉右將軍王羲之正書卷第四兼小王行書三紙非常合作亦既進奉賜路琦絹二百匹蕭嵩二百匹其書還出令集賢院搨賜太子以下及潼關失守內庫法書皆散失初收城後臣又充使搜訪圖書收獲二王書二百餘卷訪黃庭經真蹟或云張通儒將向幽州莫知去處侍御史集賢直學士史惟則奉使晉州推事所在博訪書畫懸爵賞待之時趙城倉督隱沒公貨極多推案承伏遂云有好書欲請贖罪惟則索看遂出扇書告誓等四卷并二王真蹟四卷問其得處云祿山下將過向太原停於倉督家三月餘日某乙祗供稱意有懷悅之心乃留此書相贈惟則將至闕下肅宗賜絹百匹擢授本縣尉臣從中書舍人兼尚書右丞集賢學士副知院事改國子祭酒尋黜廬州長史承前僞迹臣所棄者盡被收買皆獲官賞不復簡退人莫知之及吐蕃入寇圖籍無遺往往市廛時有真迹代無鑒者詐僞莫分臣今暮年心惛眼暗恐先朝露敢舉所知其别書人謹録如右前試國子司業兼太原縣令竇蒙蒙弟檢校户部員外郎宋汴節度參謀竇臮並久遊翰苑皆好圖書辨僞知真無出其右臣長男璹臣自教授幼勤學書在於真行頗知筆法使定古迹亦勝常人其餘士庶之間應有精别之者臣所未見非欲自媒天髙聽卑伏希俯察建中四年三月日唐何延之蘭亭記蘭亭者晉右將軍㑹稽內史琅琊王羲之字逸少所書之詩序也右軍蟬聮美胄蕭散名賢雅好山水尤善草隸以晉穆帝永和九年暮春三月三日宦遊山隂與太原孫統承公孫綽興公廣漢王彬之道生陳郡謝安安石髙平郗曇重熙太原王藴叔仁釋支遁道林并逸少子凝徽操之等四十有一人修祓禊之禮揮毫製序興樂而書用蠶繭紙鼠鬚筆遒媚徑健絶代更無凡二十八行三百二十四字有重者皆搆别體就中之字最多乃有二十許箇變轉悉異遂無同者其時乃有神助及醒後他日更書數十百本無如祓禊所書之者右軍亦自珍愛寶重此書留付子孫傳掌至七代孫智永永即右軍第五子徽之之後安西成王咨議彥祖之孫廬陵王胄昱之子陳郡謝少卿之外孫也與兄孝賔俱捨家入道俗號永禪師禪師克嗣良裘精勤此藝常居永欣寺閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆滿凡三十年於閣上臨得真草千文好者八百餘本浙東諸寺各施一本今有存者猶直錢數萬孝賔改名惠欣兄弟初落髮時住會稽嘉祥寺寺即右軍之舊宅也後以每年拜墓便近因移此寺自右軍之墳及右軍叔薈已下塋域並置山隂縣西南三十一里蘭渚山下梁武帝以欣永二人皆能崇於釋教故號所住之寺為永欣焉事見㑹稽志其臨書之閣至今尚在禪師年近百嵗乃終其遺書並付弟子辨才辨才俗姓袁氏梁司空昻之𤣥孫辨才博學工文琴碁書畫皆得其妙每臨禪師之書逼真亂本辨才嘗於所寢方丈梁上鑿其暗檻以貯蘭亭保惜貴重甚於禪師在日至貞觀中太宗以德政之暇鋭志玩書臨寫右軍真草書帖購募備盡唯未得蘭亭尋討此書知在辨才之所乃降勑追師入內道場供養恩賚優洽數日後因言次乃問及蘭亭方便善誘無所不至辨才確稱往日侍奉先師實嘗獲見自禪師殁後荐經喪亂墜失不知所在既而不獲遂放歸越中後更推究不離辨才之處又勑追辨才入內重問蘭亭如此者三度竟靳固不出上謂侍臣曰右軍之書朕所偏寶就中逸少之迹莫如蘭亭求見此書營於寤寐此僧耆年又無所用若為得一智略之士以設謀計取之尚書右僕射房𤣥齡奏曰臣聞監察御史蕭翼者梁元帝之曽孫今貫魏州莘縣負才藝多權謀可充此使必當見獲太宗遂詔見翼翼奏曰若作公使義無得理臣請私行詣彼須得二王雜帖三數通太宗依給翼遂改冠微服至湘潭隨商人船下至於越州又衣黃衫極寬長潦倒得山東書生之體日暮入寺巡廊以觀壁畫過辨才院止於門前辨才遙見翼乃問曰何處檀越翼乃就前禮拜云弟子是北人將少許蠶種來賣歷寺縱觀幸遇禪師寒溫既畢語議便合因延入房內即共圍碁撫琴投壺握槊談說文史意甚相得乃曰白頭如新傾蓋若舊今後無形迹也便留夜宿設缸面藥酒茶果等江東云缸面猶河北稱甕頭謂初熟酒也酣樂之後請各賦詩辨才探得來字韻其詩曰初醖一缸開新知萬里來披雲同落莫步月共徘徊夜久孤琴思風長旅雁哀非君有祕術誰照不然灰蕭翼探得招字韻詩曰邂逅款良宵殷勤荷勝招彌天俄若舊初地豈成遙酒蟻傾還泛心猿躁似調誰憐失羣翼長苦葉風飄妍蚩略同彼此諷味恨相知之晚通宵盡歡眀日乃去辨才云檀越閒即更來此翼乃載酒赴之興後作詩如此者數四詩酒為務其俗混然遂經旬朔翼示師梁元帝自畫職貢圖師嗟賞不已因談論翰墨翼曰弟子先門皆傳二王楷書法弟子又幼來耽玩今亦有數帖自隨辨才欣然曰眀日來可把此看翼依期而往出其書以示辨才辨才熟詳之曰是即是矣然未佳善貧道有一真跡頗亦殊常翼曰何帖辨才曰蘭亭翼佯笑曰數經亂離真跡豈在必是響搨僞作耳辨才曰禪師在日保惜臨亡之時親付於吾付受有緒那得參差可眀日來看及翼到師自於屋梁上楹內出之翼見訖故駁瑕指纇曰果是響榻書也紛競不定自示翼之後更不復安於梁檻上并蕭翼二王諸帖並借留置于几案之間辨才時年八十餘每日於窗下臨學數遍其老而篤好也如此自是翼往還既數童弟等無復猜疑後辨才出赴靈汜橋南嚴遷家齊翼遂私來房前謂弟子曰翼遺却帛子在床上童子即為開門翼遂於案上取得蘭亭及御府二王書帖便赴永安驛告驛長凌訴曰我是御史奉勑來此有墨勑可報汝都督齊善行善行即竇建德之妹壻在僞夏之時為右僕射以用吾曽門廬江節公及隋黃門侍郎裴矩之策舉國歸降我唐由此不失貴仕遙授上柱國金印紱綬封真定縣公於是善行聞之馳來拜謁蕭翼因宣示勑㫖具告所由善行走使人召辨才辨才仍在嚴遷家未還寺遽見追呼不知所以又遣散直云侍御須見及師來見御史乃是房中蕭生也蕭翼報云奉勑遣來取蘭亭蘭亭今得矣故喚師來取别辨才聞語身便絶倒良久始蘇翼便馳驛而發至都奏御太宗大悅以𤣥齡舉得其人賞錦綵千段擢拜翼為員外郎加入五品賜銀瓶一金鏤瓶一瑪瑙碗一並實以珠內廄良馬兩匹兼寶裝鞍轡莊宅各一區太宗初怒老僧之祕吝俄以其年耄不忍加刑數日後仍賜物三千假縠三千石便勑越州支給辨才不敢將入已用回造三層寶塔塔甚精麗至今猶存老僧因驚悸患重不能强飯唯啜粥嵗餘乃卒帝命供奉搨書人趙模韓道政馮承素諸葛貞等四人各搨數本以賜皇太子諸王近臣貞觀二十三年聖躬不豫幸玉華宫含風殿臨崩謂髙宗曰吾欲從汝求一物汝誠孝也豈能違吾心耶汝意如何髙宗哽咽流涕引耳而聽受制命太宗曰吾所欲得蘭亭可與我將去及弓劔不遺同軌畢至隨仙駕入𤣥宫矣今趙模等所搨在者一本尚直錢數萬也人間本亦稀少代之珍寶難可再見吾嘗為左千牛時隨牒適越航巨海登㑹稽探禹穴訪竒書名僧處士猶倍諸郡固知虞預之著㑹稽典録人物不絶信而有徴其辨才弟子𤣥素俗姓楊氏華隂人也漢太尉之後六代祖佺期為桓𤣥所害子孫避難潜竄江東後遂編貫山隂即吾之外氏近屬今殿中侍御史㻛之族長安二年素師已年九十二視聽不衰猶居永欣寺永禪師之故房親向吾說聊以退食之暇略疏其始末庶將來君子知吾心之所存付永彭年眀察微溫抱直超令叔等兄弟其有好事同志須知者亦無隱焉于時嵗在甲寅季春之月上己之日感前代之修禊而撰此記主上每暇隙留神術藝迹逾華聖偏重蘭亭僕開元十年四月二十七日任均州刺史蒙恩許拜掃至都承訪所得委曲緣病不獲詣闕遣男昭成皇太后挽郎吏部常選騎都尉永寫本進其日奉日曜門宣勑內出絹三十匹賜永於是負恩荷澤手舞足蹈捧戴周旋光駭閭里僕局天聞命伏枕懷欣殊私忽臨沉疴頓減輒題卷末以示後代唐禇河南搨本樂毅論記貞觀十三年四月九日奉勑內出樂毅論是王右軍真跡令將仕郎直𢎞文館馮承素模寫賜司空趙國公長孫無忌開府儀同三司尚書左僕射梁國公房𤣥齡特進尚書左僕射申國公髙士廉吏部尚書陳國公侯君集特進鄭國公魏徴侍中護軍安德郡開國公楊師道等六人於是在外乃有六本並筆勢精妙備盡楷則禇遂良記唐崔備壁書飛白蕭字記壁書蕭字者梁侍中蕭子雲之所飛白也張懷瓘書斷云飛白書變楷制也宫殿題署勢大則徑文字宜輕微不滿韓晉公領浙西之嵗得於建鄴佛寺置之南徐官舍函以屋壁俯瞰坐隅及晉公入贊廟謨啓于私第朱方官吏俟其代者完葺舊府圬墁故堂吏人以壁字昏蒙方以堊掃塗上時故殿中李侍御士舉為部從事以晉公翰墨代無等儔自護壁書施搨于下耽玩研味略無己時士舉重焉紿而方得及士舉府除職停寓壁字於小吏之舍至甲申嵗士舉為江西從事通好江淮時李評事約盛閲圖書以示寮友士舉方以壁字言於座中李君因而求之士舉云得卿皇象羊欣蕭綸各一帖大鄭畫屏一扇即輟與之不爾當自持去李君富於圖書酷好遐異遂以所求三帖并法士畫屏一扇易焉後十餘日壁書自吳負來士舉於道病卒向若李君不閲雅跡士舉不言此書即壁字為朽壤於小吏之家逸品絶前賢之跡固知興亡繼絶後不乏人工極藝精中必有物加以子雲與國同姓所書蕭字圜卷側掠體法備焉信衆賢之妙門實後代之茂範其飛白書起於蔡中郎蔡雍待詔門下見役人以堊帚成字心有悅焉歸而為飛白書漢末魏初皆以題署宫闕蕭子良撰古今書體云飛白書熹平年節治鴻都門於時蔡雍方撰聖皇篇其後張敬禮王逸少子敬並稱妙絶子雲曲盡其法歐陽率更云蕭侍中飛白輕濃得中如蟬翼掩素其為前賢所重如此嗟乎景嶠此書今訪天下絶矣惟此蕭字在乎舊都三百年間竟無頽圯俾後之傳授似隂有保持余與李君寓家南徐鄰而友善獲覩妙跡感有將壞之壤晉公出之方絶之跡李君維之用徴其事故以字志之唐李約壁書飛白蕭字贊梁侍中蕭子雲書祖述鍾王備該衆體始變蔡張二王飛白古法妙絶冠時古法飛少白多其體猶拘八分故王僧䖍云飛白是八分之輕者自子雲變而飛多今但據飛多者即非子雲之前而不妨後人亦有效古飛少者子雲又作小篆飛白雖名存傳記而迹絶簡素惟建鄴古壁餘此蕭字焉韓晉公鑒古善書聞之嗟異遷之於南徐置于海榴堂座右之壁又獲齊竟陵王蕭子良龍爪書十五字置于招隱寺以侍中之迹妙極故留以親玩余後獲之載以入洛書之故實事之本末中書舍人張公崔監察備撰記詳焉余少好圖書耽嗜竒古由此雖志業不立而性莫能遷非不干求爵祿心懵時事以與名疏非欲乖時好尚養疴守獨所見遂僻僻則僻矣與夫酣湎聲妓并走權利者俱亡羊也亡則孰多余每閲玩此迹而圖書之光如逢古人似得良友加以琴酒靜暢書齊晝閒榮富賤貧是日何在至若尋翰墨輕濃之勢窮點畫分布之能與日彌深隨見逾妙嗟夫昔賢垂不朽之藝知傳寶於後世後人覩妙絶之迹見得意於當時名齊日月情契古今傳曰遊於藝藝可已乎知者相賀比獲蘭亭之書世情觀之未若野人之塊不闕於世在世為無用之物苟適余意於余則有用已多乃作贊曰昔創飛白蔡氏所得起於堊帚播於翰墨張王繼作子雲精極壁昏蜃素墨古池色翻飛露白乍輕乍濃翠箔映雪羅衣從風崩雲委地游霧縈空撥刺勢動蟉蟠氣雄昆池駭鯨時門鬭龍攢毫疊孔或橫或縱層層陳雲森森古松君子況德髙人比蹤抱素自潔含章內融逸疑方外縱在矩中密而不離疏而有容藝通造化比象無窮子雲臣梁蕭字逾貴㸃畫均豐姿形端異迹絶繭素名空傳記眀徴褒貶惟此一字唐髙平公蕭齊記隴西李君約於江南得蕭子雲壁書飛白蕭字以筆勢驚絶遂匣而寶之其遇之之由則君之贊序與崔監察備論之詳矣君與字俱載舟還洛陽仁風里第思所以盡其瞻玩藏置之宜謂箱櫝臨視不時又有緘啓動搖之變遂建精室陷列于垣復本書之意得遙覩之美寂對虛牖勢若飛驚雖烟霧交飛龍鸞縈動輕斾翻揚微雲卷舒不能狀也李君以至行雅操著名當時逍遙道樞脫落榮利識洞物表神交古人而風致之餘特精楷隸所得魏晉已降名書祕迹多矣以不越於尺素之間未為殊珍也蓋壁字竒蹤乃為希寶意象所得非常域也故異而室之文而志之夫蕭之為言也切然而清於文也蔚然而整宜乎銘壁宜乎命齊蕭齊之名於此字俱傳矣法書要録卷三
